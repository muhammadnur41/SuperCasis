<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daftar - Super Casis</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-dark: #0a0e1a;
            --bg-card: rgba(255,255,255,0.04);
            --glass-border: rgba(255,255,255,0.08);
            --primary: #8b5cf6;
            --primary-glow: rgba(139,92,246,0.35);
            --secondary: #3b82f6;
            --accent-emerald: #10b981;
            --accent-amber: #f59e0b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --input-bg: rgba(255,255,255,0.05);
            --input-border: rgba(255,255,255,0.1);
            --input-focus: rgba(139,92,246,0.5);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 14px;
            -webkit-tap-highlight-color: transparent;
        }

        /* Background effects */
        .bg-glow {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background:
                radial-gradient(ellipse 500px 500px at 20% 30%, rgba(139,92,246,0.12), transparent),
                radial-gradient(ellipse 400px 400px at 80% 70%, rgba(59,130,246,0.1), transparent);
        }

        /* Floating orbs */
        .orb {
            position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
            filter: blur(80px); opacity: 0.4;
        }
        .orb-1 {
            width: 300px; height: 300px; top: -100px; left: -100px;
            background: var(--primary); animation: orbFloat 8s ease-in-out infinite;
        }
        .orb-2 {
            width: 250px; height: 250px; bottom: -80px; right: -80px;
            background: var(--secondary); animation: orbFloat 10s ease-in-out 2s infinite;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -20px) scale(1.1); }
        }

        /* Container */
        .register-wrapper {
            position: relative; z-index: 10;
            width: 100%; max-width: 700px; margin: 0;
        }

        /* Back link */
        .back-link {
            display: inline-flex; align-items: center; gap: 8px;
            color: var(--text-muted); text-decoration: none;
            font-size: 0.8rem; font-weight: 500;
            margin-bottom: 10px; transition: all 0.3s;
            padding: 6px 14px; border-radius: 10px;
            background: var(--bg-card); border: 1px solid var(--glass-border);
        }
        .back-link:hover { color: white; border-color: rgba(255,255,255,0.2); transform: translateX(-4px); }

        /* Card */
        .register-card {
            background: linear-gradient(145deg, rgba(20,25,39,0.95), rgba(26,32,53,0.95));
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            backdrop-filter: blur(20px);
            overflow: hidden;
            box-shadow: 0 25px 80px rgba(0,0,0,0.4), 0 0 40px rgba(139,92,246,0.05);
        }

        /* Card header - compact inline */
        .card-header {
            background: linear-gradient(135deg, rgba(139,92,246,0.15), rgba(59,130,246,0.15));
            padding: 16px 28px;
            display: flex; align-items: center; gap: 14px;
            position: relative;
        }
        .card-header::before { display: none; }
        .card-header .logo-icon {
            width: 42px; height: 42px; border-radius: 14px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; flex-shrink: 0;
            box-shadow: 0 6px 18px var(--primary-glow);
        }
        .card-header h1 {
            font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px;
        }
        .card-header h1 span { color: var(--secondary); }
        .card-header p {
            color: var(--text-muted); font-size: 0.78rem; margin-top: 2px;
        }

        /* Form body */
        .card-body {
            padding: 20px 28px 16px;
        }

        /* 2-column grid for form */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 18px;
        }
        .form-grid .form-group-full {
            grid-column: 1 / -1;
        }

        /* Form group */
        .form-group {
            margin-bottom: 0;
        }
        .form-label {
            display: flex; align-items: center; gap: 5px;
            font-size: 0.68rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.8px;
            color: var(--text-muted); margin-bottom: 5px;
        }
        .form-label i { font-size: 0.65rem; color: var(--primary); opacity: 0.7; }

        .form-input {
            width: 100%; padding: 10px 14px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 12px; color: white;
            font-family: inherit; font-size: 0.9rem;
            transition: all 0.3s; outline: none;
        }
        .form-input::placeholder { color: #4a5568; }
        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--input-focus);
            background: rgba(255,255,255,0.07);
        }

        /* Password wrapper */
        .password-wrapper {
            position: relative;
        }
        .password-wrapper .form-input { padding-right: 42px; }
        .toggle-pass {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: var(--text-muted);
            cursor: pointer; padding: 4px; transition: color 0.3s;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem;
        }
        .toggle-pass:hover { color: var(--primary); }

        /* File upload */
        .file-upload-wrapper {
            position: relative;
        }
        .file-upload-label {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 14px; border-radius: 12px;
            background: var(--input-bg); border: 1.5px dashed var(--input-border);
            cursor: pointer; transition: all 0.3s;
        }
        .file-upload-label:hover {
            border-color: var(--primary); background: rgba(139,92,246,0.05);
        }
        .file-upload-icon {
            width: 34px; height: 34px; border-radius: 10px;
            background: rgba(139,92,246,0.12);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.9rem; color: #c4b5fd; flex-shrink: 0;
        }
        .file-upload-text h4 { font-size: 0.82rem; font-weight: 600; color: var(--text-main); }
        .file-upload-text p { font-size: 0.7rem; color: var(--text-muted); margin-top: 1px; }
        .file-upload-text .file-name { color: var(--accent-emerald); font-weight: 600; }
        .file-input-hidden {
            position: absolute; opacity: 0; width: 0; height: 0;
        }

        /* Submit button */
        .btn-register {
            width: 100%; padding: 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; border: none; border-radius: 14px;
            font-family: inherit; font-size: 1.2rem; font-weight: 700;
            cursor: pointer; transition: all 0.35s;
            box-shadow: 0 6px 20px var(--primary-glow);
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-register:hover:not(:disabled) {
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 10px 30px var(--primary-glow);
        }
        .btn-register:active:not(:disabled) { transform: scale(0.98); }
        .btn-register:disabled { opacity: 0.6; cursor: not-allowed; }

        /* Bottom area: button + payment side by side */
        .bottom-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-top: 14px;
        }
        .bottom-row .btn-register {
            align-self: stretch;
        }

        /* Payment info - compact */
        .payment-card {
            padding: 12px 14px;
            background: rgba(139,92,246,0.06);
            border: 1px solid rgba(139,92,246,0.15);
            border-radius: 14px;
            display: flex; flex-direction: column; justify-content: center;
        }
        .payment-card .pay-header {
            display: flex; align-items: center; gap: 6px;
            font-size: 0.68rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.8px;
            color: #c4b5fd; margin-bottom: 6px;
        }
        .payment-card .pay-body {
            font-size: 0.78rem; color: var(--text-muted); line-height: 1.6;
        }
        .payment-card .pay-body strong { color: var(--text-main); }
        .payment-card .pay-amount {
            display: inline-block;
            background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.25);
            padding: 2px 10px; border-radius: 50px;
            font-weight: 700; font-size: 0.75rem; color: #c4b5fd;
        }

        /* Footer links - inline compact */
        .card-footer {
            padding: 12px 28px 16px;
            text-align: center;
            display: flex; align-items: center; justify-content: center; gap: 20px;
        }
        .card-footer p {
            font-size: 0.82rem; color: var(--text-muted); margin: 0;
        }
        .card-footer a {
            color: var(--primary); font-weight: 700;
            text-decoration: none; transition: color 0.3s;
        }
        .card-footer a:hover { color: #a78bfa; }
        .card-footer .divider {
            width: 1px; height: 20px; background: var(--glass-border);
        }
        .card-footer .home-link {
            display: inline-flex; align-items: center; gap: 6px;
            color: var(--text-muted); font-size: 0.78rem; font-weight: 500;
            text-decoration: none; transition: all 0.3s;
            padding: 6px 14px; border-radius: 50px;
            background: var(--bg-card); border: 1px solid var(--glass-border);
        }
        .card-footer .home-link:hover {
            color: white; border-color: rgba(255,255,255,0.2);
            transform: translateX(-4px);
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .register-wrapper { animation: fadeInUp 0.5s ease; }

        /* Responsive */
        @media (max-width: 700px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .register-wrapper { max-width: 480px; }
            .bottom-row { grid-template-columns: 1fr; }
            .card-header { padding: 14px 20px; }
            .card-body { padding: 16px 18px 12px; }
            .card-footer { flex-direction: column; gap: 10px; padding: 12px 20px 16px; }
            .card-footer .divider { width: 60px; height: 1px; }
            .card-header h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="register-wrapper">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Kembali ke Beranda</a>

        <div class="register-card">
            <!-- Header -->
            <div class="card-header">
                <div class="logo-icon"><i class="fas fa-user-plus"></i></div>
                <div>
                    <h1>Super<span>Casis</span></h1>
                    <p>Buat akun untuk mulai berlatih</p>
                </div>
            </div>

            <!-- Form -->
            <div class="card-body">
                <form id="registerForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label"><i class="fas fa-user"></i> Nama Lengkap</label>
                            <input type="text" name="nama" required class="form-input" placeholder="Nama Lengkap">
                        </div>

                        <div class="form-group">
                            <label class="form-label"><i class="fas fa-envelope"></i> Email</label>
                            <input type="email" name="email" required class="form-input" placeholder="email@anda.com">
                        </div>

                        <div class="form-group">
                            <label class="form-label"><i class="fas fa-lock"></i> Password</label>
                            <div class="password-wrapper">
                                <input type="password" name="password" id="password" required class="form-input" placeholder="Minimal 6 karakter">
                                <button type="button" onclick="togglePassword('password')" class="toggle-pass">
                                    <i class="fas fa-eye" id="eyeIcon1"></i>
                                </button>
                            </div>
                        </div>                        

                        <div class="form-group">
                            <label class="form-label"><i class="fas fa-shield-halved"></i> Ulangi Password</label>
                            <div class="password-wrapper">
                                <input type="password" id="confirm_password" required class="form-input" placeholder="Ketik ulang password">
                                <button type="button" onclick="togglePassword('confirm_password')" class="toggle-pass">
                                    <i class="fas fa-eye" id="eyeIcon2"></i>
                                </button>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label"><i class="fab fa-whatsapp"></i> Nomor WhatsApp</label>
                            <input type="number" name="nomor" required class="form-input" placeholder="0812xxxxxxxx">
                        </div>

                        <div class="form-group">
                            <label class="form-label"><i class="fas fa-receipt"></i> Bukti Transfer</label>
                            <div class="file-upload-wrapper">
                                <label class="file-upload-label" for="bukti_bayar" id="fileLabel">
                                    <div class="file-upload-icon"><i class="fas fa-cloud-arrow-up"></i></div>
                                    <div class="file-upload-text">
                                        <h4 id="fileDisplayName">Pilih file (JPG/PNG)</h4>
                                        <p>Max 5MB</p>
                                    </div>
                                </label>
                                <input type="file" id="bukti_bayar" accept="image/*" required class="file-input-hidden">
                                <input type="hidden" name="fileData" id="fileData">
                                <input type="hidden" name="fileName" id="fileName">
                            </div>
                        </div>
                    </div>

                    <div class="bottom-row">
                        <button type="submit" id="btnRegister" class="btn-register">
                            <i class="fas fa-rocket"></i> DAFTAR SEKARANG
                        </button>

                        <div class="payment-card">
                            <div class="pay-header"><i class="fas fa-credit-card"></i> Info Pembayaran</div>
                            <div class="pay-body">
                                1 Bulan: <span class="pay-amount">Rp 50.000</span><br>
                                <strong>BRI:</strong> 2259 0100 5257 536<br>
                                a/n <strong>MUHAMMAD IRWAN NUR</strong>
                            </div>
                        </div>
                    </div>
                </form>
            </div>

            <!-- Footer -->
            <div class="card-footer">
                <p>Sudah punya akun? <a href="login.html">Login di sini</a></p>
                <div class="divider"></div>
                <a href="index.html" class="home-link"><i class="fas fa-home"></i> Beranda</a>
            </div>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyMDqapWZQnBPeqzkZThKcYUeImNNTTc2E1SPgIso1rvroMxcG9F2ugddSEcqNFQJ1G/exec';
        const form = document.getElementById('registerForm');
        const btn = document.getElementById('btnRegister');

        function togglePassword(id) {
            const el = document.getElementById(id);
            el.type = el.type === "password" ? "text" : "password";
        }

        // File upload display
        document.getElementById('bukti_bayar').addEventListener('change', function() {
            const name = this.files[0] ? this.files[0].name : 'Pilih file bukti transfer';
            const display = document.getElementById('fileDisplayName');
            if (this.files[0]) {
                display.innerHTML = '<span class="file-name"><i class="fas fa-check-circle"></i> ' + name + '</span>';
                document.getElementById('fileLabel').style.borderColor = 'rgba(16,185,129,0.4)';
                document.getElementById('fileLabel').style.background = 'rgba(16,185,129,0.05)';
            } else {
                display.textContent = 'Pilih file bukti transfer';
                document.getElementById('fileLabel').style.borderColor = '';
                document.getElementById('fileLabel').style.background = '';
            }
        });

        form.addEventListener('submit', e => {
            e.preventDefault();
            
            const pass = document.getElementById('password').value;
            const confirmPass = document.getElementById('confirm_password').value;

            if(pass !== confirmPass) {
                Swal.fire('Error', 'Konfirmasi password tidak cocok!', 'error');
                return;
            }

            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Memproses...";

            const fileInput = document.getElementById('bukti_bayar');
            if (fileInput.files.length === 0) {
                Swal.fire('Error', 'Harap unggah bukti transfer!', 'warning');
                btn.disabled = false;
                btn.innerHTML = originalText;
                return;
            }

            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.readAsDataURL(file);
            reader.onload = function() {
                const base64Data = reader.result.split(',')[1];
                document.getElementById('fileData').value = base64Data;
                document.getElementById('fileName').value = file.name;

                const formData = new FormData(form);
                formData.append('action', 'register');

                fetch(scriptURL, { method: 'POST', body: formData })
                .then(response => response.json())
                .then(result => {
                    if (result.status === "success" || result.result === "success") {
                        Swal.fire({
                            icon: 'success',
                            title: 'Berhasil!',
                            text: 'Pendaftaran sukses. Akun Anda akan diverifikasi admin.',
                            confirmButtonColor: '#1E3A8A'
                        }).then(() => { window.location.href = "login.html"; });
                    } else {
                        Swal.fire('Gagal', result.message || 'Terjadi kesalahan saat mendaftar.', 'warning');
                        btn.disabled = false;
                        btn.innerHTML = originalText;
                    }
                })
                .catch(error => {
                    console.error('Error!', error.message);
                    Swal.fire('Koneksi Error', 'Periksa koneksi internet atau setelan Apps Script Anda.', 'error');
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                });
            };
        });
    </script>
</body>
</html>
