<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Login - Super Casis</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-dark: #0a0e1a;
            --bg-card: rgba(255,255,255,0.04);
            --glass-border: rgba(255,255,255,0.08);
            --primary: #f59e0b;
            --primary-glow: rgba(245,158,11,0.35);
            --secondary: #ef4444;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --input-bg: rgba(255,255,255,0.05);
            --input-border: rgba(255,255,255,0.1);
            --input-focus: rgba(245,158,11,0.5);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 24px;
            -webkit-tap-highlight-color: transparent;
        }

        .bg-glow {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background:
                radial-gradient(ellipse 500px 500px at 20% 30%, rgba(245,158,11,0.1), transparent),
                radial-gradient(ellipse 400px 400px at 80% 70%, rgba(239,68,68,0.08), transparent);
        }

        .orb {
            position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
            filter: blur(80px); opacity: 0.4;
        }
        .orb-1 {
            width: 300px; height: 300px; top: -100px; left: -100px;
            background: var(--primary); animation: orbFloat 8s ease-in-out infinite;
        }
        .orb-2 {
            width: 250px; height: 250px; bottom: -80px; right: -80px;
            background: var(--secondary); animation: orbFloat 10s ease-in-out 2s infinite;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -20px) scale(1.1); }
        }

        .login-wrapper {
            position: relative; z-index: 10;
            width: 100%; max-width: 440px;
        }

        .back-link {
            display: inline-flex; align-items: center; gap: 8px;
            color: var(--text-muted); text-decoration: none;
            font-size: 0.85rem; font-weight: 500;
            margin-bottom: 24px; transition: all 0.3s;
            padding: 8px 16px; border-radius: 12px;
            background: var(--bg-card); border: 1px solid var(--glass-border);
        }
        .back-link:hover { color: white; border-color: rgba(255,255,255,0.2); transform: translateX(-4px); }

        .login-card {
            background: linear-gradient(145deg, rgba(20,25,39,0.95), rgba(26,32,53,0.95));
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            backdrop-filter: blur(20px);
            overflow: hidden;
            box-shadow: 0 25px 80px rgba(0,0,0,0.4), 0 0 40px rgba(245,158,11,0.05);
        }

        .card-header {
            background: linear-gradient(135deg, rgba(245,158,11,0.15), rgba(239,68,68,0.15));
            padding: 36px 32px 28px;
            text-align: center;
            position: relative;
        }
        .card-header::before {
            content: ''; position: absolute; top: -60px; left: 50%; transform: translateX(-50%);
            width: 200px; height: 200px; border-radius: 50%;
            background: radial-gradient(circle, rgba(245,158,11,0.15), transparent 70%);
        }
        .card-header .logo-icon {
            width: 56px; height: 56px; border-radius: 18px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px; font-size: 1.5rem;
            box-shadow: 0 8px 25px var(--primary-glow);
            animation: logoPulse 3s ease-in-out infinite;
        }
        @keyframes logoPulse {
            0%, 100% { box-shadow: 0 8px 25px var(--primary-glow); }
            50% { box-shadow: 0 8px 40px var(--primary-glow); }
        }
        .card-header h1 {
            font-size: 1.8rem; font-weight: 800; letter-spacing: -0.5px;
        }
        .card-header h1 span { color: var(--primary); }
        .card-header p {
            color: var(--text-muted); font-size: 0.9rem; margin-top: 6px;
        }
        .admin-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(245,158,11,0.12); border: 1px solid rgba(245,158,11,0.25);
            padding: 5px 14px; border-radius: 50px; font-size: 0.72rem;
            font-weight: 700; color: #fcd34d; margin-top: 12px;
        }

        .card-body { padding: 32px; }

        .form-group { margin-bottom: 20px; }
        .form-label {
            display: flex; align-items: center; gap: 6px;
            font-size: 0.75rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1px;
            color: var(--text-muted); margin-bottom: 8px;
        }
        .form-label i { font-size: 0.7rem; color: var(--primary); opacity: 0.7; }

        .form-input {
            width: 100%; padding: 14px 18px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 14px; color: white;
            font-family: inherit; font-size: 1rem;
            transition: all 0.3s; outline: none;
        }
        .form-input::placeholder { color: #4a5568; }
        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--input-focus);
            background: rgba(255,255,255,0.07);
        }

        .password-wrapper { position: relative; }
        .password-wrapper .form-input { padding-right: 50px; }
        .toggle-pass {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: var(--text-muted);
            cursor: pointer; padding: 4px; transition: color 0.3s;
            display: flex; align-items: center; justify-content: center;
        }
        .toggle-pass:hover { color: var(--primary); }

        .btn-admin-login {
            width: 100%; padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; border: none; border-radius: 16px;
            font-family: inherit; font-size: 1rem; font-weight: 700;
            cursor: pointer; transition: all 0.35s;
            box-shadow: 0 8px 30px var(--primary-glow);
            display: flex; align-items: center; justify-content: center; gap: 10px;
            margin-top: 8px;
        }
        .btn-admin-login:hover:not(:disabled) {
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 12px 40px var(--primary-glow);
        }
        .btn-admin-login:active:not(:disabled) { transform: scale(0.98); }
        .btn-admin-login:disabled { opacity: 0.6; cursor: not-allowed; }

        .card-footer {
            padding: 24px 32px 32px;
            text-align: center;
        }
        .card-footer .home-link {
            display: inline-flex; align-items: center; gap: 6px;
            color: var(--text-muted); font-size: 0.82rem; font-weight: 500;
            text-decoration: none; transition: all 0.3s;
            padding: 8px 18px; border-radius: 50px;
            background: var(--bg-card); border: 1px solid var(--glass-border);
        }
        .card-footer .home-link:hover {
            color: white; border-color: rgba(255,255,255,0.2);
            transform: translateX(-4px);
        }

        /* Toast notification */
        .toast-notification {
            position: fixed; top: 24px; right: 24px; z-index: 9999;
            background: linear-gradient(145deg, #141927, #1a2035);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; padding: 18px 24px;
            display: flex; align-items: center; gap: 14px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            animation: toastIn 0.4s cubic-bezier(0.23,1,0.32,1);
            max-width: 380px;
        }
        .toast-notification.toast-error { border-left: 4px solid #ef4444; }
        .toast-notification.toast-success { border-left: 4px solid #10b981; }
        .toast-icon {
            width: 40px; height: 40px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; flex-shrink: 0;
        }
        .toast-icon.error { background: rgba(239,68,68,0.15); color: #ef4444; }
        .toast-icon.success { background: rgba(16,185,129,0.15); color: #10b981; }
        .toast-text h4 { font-size: 0.9rem; font-weight: 700; margin-bottom: 2px; }
        .toast-text p { font-size: 0.78rem; color: var(--text-muted); }

        @keyframes toastIn {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes toastOut {
            from { opacity: 1; transform: translateX(0); }
            to { opacity: 0; transform: translateX(50px); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-wrapper { animation: fadeInUp 0.6s ease; }

        @media (max-width: 500px) {
            body { padding: 16px; }
            .card-header { padding: 28px 20px 22px; }
            .card-body { padding: 24px 20px; }
            .card-footer { padding: 20px; }
            .card-header h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="login-wrapper">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Kembali ke Beranda</a>

        <div class="login-card">
            <div class="card-header">
                <div class="logo-icon"><i class="fas fa-shield-halved"></i></div>
                <h1>Admin <span>Panel</span></h1>
                <p>Masuk sebagai Administrator</p>
                <div class="admin-badge"><i class="fas fa-lock"></i> AKSES TERBATAS</div>
            </div>

            <div class="card-body">
                <form id="adminLoginForm">
                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-envelope"></i> Email Admin</label>
                        <input type="email" id="adminEmail" required class="form-input" placeholder="admin@email.com" autocomplete="email">
                    </div>

                    <div class="form-group">
                        <label class="form-label"><i class="fas fa-lock"></i> Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="adminPassword" required class="form-input" placeholder="••••••••" autocomplete="current-password">
                            <button type="button" onclick="togglePassword()" class="toggle-pass">
                                <i class="fas fa-eye" id="eyeIcon"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" id="btnLogin" class="btn-admin-login">
                        <i class="fas fa-right-to-bracket"></i> MASUK ADMIN
                    </button>
                </form>
            </div>

            <div class="card-footer">
                <a href="index.html" class="home-link"><i class="fas fa-home"></i> Kembali ke Beranda</a>
            </div>
        </div>
    </div>

    <script>
        // Admin credentials (hardcoded)
        const ADMIN_EMAIL = 'irwanwakuru@gmail.com';
        const ADMIN_PASS = '112233';

        // Check if already logged in
        if (localStorage.getItem('isAdminLoggedIn') === 'true') {
            window.location.href = 'admin-dashboard.html';
        }

        function togglePassword() {
            const input = document.getElementById('adminPassword');
            const icon = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }

        function showToast(type, title, message) {
            const existing = document.querySelector('.toast-notification');
            if (existing) existing.remove();

            const toast = document.createElement('div');
            toast.className = `toast-notification toast-${type}`;
            toast.innerHTML = `
                <div class="toast-icon ${type}"><i class="fas fa-${type === 'error' ? 'xmark' : 'check'}"></i></div>
                <div class="toast-text">
                    <h4>${title}</h4>
                    <p>${message}</p>
                </div>
            `;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'toastOut 0.3s ease forwards';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;
            const btn = document.getElementById('btnLogin');

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memverifikasi...';

            // Simulate brief delay for UX
            setTimeout(() => {
                if (email === ADMIN_EMAIL && password === ADMIN_PASS) {
                    localStorage.setItem('isAdminLoggedIn', 'true');
                    localStorage.setItem('adminEmail', email);
                    showToast('success', 'Berhasil', 'Selamat datang, Admin!');
                    setTimeout(() => {
                        window.location.href = 'admin-dashboard.html';
                    }, 1200);
                } else {
                    showToast('error', 'Gagal Masuk', 'Email atau password admin salah.');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-right-to-bracket"></i> MASUK ADMIN';
                }
            }, 800);
        });
    </script>
</body>
</html>
