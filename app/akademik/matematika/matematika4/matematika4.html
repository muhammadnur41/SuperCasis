<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Profesional - Mode Review</title>
    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']]
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f7; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        
        .main-wrapper { display: flex; gap: 20px; width: 100%; max-width: 1500px; align-items: flex-start; }
        
        .sidebar-numbers { background: rgb(220, 222, 228); padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); width: 320px; flex-shrink: 0; position: sticky; top: 20px; }
        
        .quiz-container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); flex-grow: 1; min-width: 0; }

        .status-container { 
            display: grid; 
            grid-template-columns: repeat(10, 1fr); 
            gap: 6px; 
            justify-content: center; 
        }

        .num-box { 
            width: 28px; 
            height: 28px; 
            border-radius: 6px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 1px solid #ccc; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            font-size: 12px; 
        }

        .num-unanswered { background: #f8f9fa; color: #999; }
        .num-answered { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .num-active { background: #3498db !important; color: white; border-color: #2980b9; transform: scale(1.1); box-shadow: 0 0 8px rgba(52, 152, 219, 0.4); }
        .num-correct { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .num-wrong { background: #e74c3c !important; color: white; border-color: #c0392b; }

        #options-container { margin-top: 25px; display: flex; flex-direction: column; gap: 5px; }
        .option-btn { width: 100%; text-align: left; padding: 14px; border: 2px solid #eee; border-radius: 8px; background: white; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .option-btn:hover:not(:disabled) { border-color: #3498db; background: #f7fbff; }
        .option-btn.selected { border-color: #3498db; background: #3498db; color: rgb(5, 5, 5); }
        .option-btn.correct-ans { border: 2px solid #2ecc71 !important; background: #e8f5e9 !important; color: #2e7d32 !important; font-weight: bold; }
        .option-btn.wrong-selected { border: 2px solid #e74c3c !important; background: #fdeaea !important; color: #c0392b !important; }
        
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 25px; gap: 10px; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; flex: 1; font-size: 14px; transition: 0.3s; }
        .btn-blue { background: #3498db; color: white; }
        .btn-green { background: #2ecc71; color: white; }
        .btn-orange { background: #f39c12; color: white; }
        .btn-gray { background: #95a5a6; color: white; }

        #result-screen { display: none; }

        @media (max-width: 900px) {
            .main-wrapper { flex-direction: column; align-items: center; }
            .sidebar-numbers { width: 90%; position: static; order: 2; }
            .quiz-container { width: 90%; order: 1; }
        }

        /* Tambahan style agar paragraf dan gambar di soal terlihat rapi */
        #question-text p { margin-top: 0; margin-bottom: 10px; }
        #question-text img { max-width: 100%; height: auto; display: block; margin: 10px 0; border-radius: 8px; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="sidebar-numbers" id="sidebar-nav">
        <h5 style="margin: 0 0 15px 0; text-align: center; color: #2c3e50; font-size: 16px;">Navigasi Soal</h5>
        <div class="status-container" id="status-container"></div>
        <button id="finish-quiz-btn" class="btn btn-green" style="width:100%; margin-top:20px; font-size: 14px; padding: 10px;" onclick="showResult()">Akhiri Tes</button>
    </div>

    <div class="quiz-container">
        <div id="quiz-screen">
            <div id="question-header" style="border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; margin-bottom: 15px;">
                <span id="question-number" style="font-weight: bold; color: #3498db; font-size: 18px;">Soal #1</span>
            </div>
            <div id="question-text" style="color: #000000; line-height: 1.2; text-align: justify; font-size: 16px; margin: 0; font-weight: normal;">Memuat pertanyaan...</div>
            
            <div id="options-container"></div>
            
            <div class="nav-buttons">
                <button class="btn btn-gray" id="prev-btn" onclick="prevQuestion()">Kembali</button>
                <button class="btn btn-blue" id="next-btn" onclick="nextQuestion()">Selanjutnya</button>
            </div>
            
            <button class="btn btn-orange" id="back-to-result-btn" style="width:100%; margin-top:15px; display:none;" onclick="exitReview()">Selesai Review (Kembali ke Skor)</button>
        </div>

        <div id="result-screen" style="text-align: center;">
            <h2 style="color: #2c3e50;">Hasil Skor Anda</h2>
            <h1 id="final-score" style="font-size: 70px; color: #2ecc71; margin: 10px 0;">0</h1>
            <p id="stats-text" style="color: #7f8c8d; font-size: 18px; margin-bottom: 30px;"></p>
            
            <div style="display: flex; flex-direction: column; gap: 10px; max-width: 300px; margin: 0 auto;">
                <button class="btn btn-orange" onclick="startReview()">Review Jawaban</button>
                <button class="btn btn-blue" onclick="location.reload()">Ulangi Kuis</button>
            </div>
        </div>
    </div>
</div>

<script>
const quizData = [
  {
    "q": "Diketahui $A = \\left( \\frac{p^3 \\sqrt{q^5}}{\\sqrt{r}} \\right)^2$ dan $B = \\left( \\frac{r}{pq} \\right)^5$ dengan $p \\neq 0, q \\neq 0$ dan $r \\neq 0$ maka nilai $A \\times B$ adalah ....",
    "opt": ["$\\frac{1}{pr^4}$", "$p^4r$", "$\\frac{1}{pq^3}$", "$pr^4$", "$\\frac{q}{p^4}$"],
    "a": 3
  },
  {
    "q": "$$\\frac{5^2 - \\sqrt{625} \\log(x^3 y^2) - 50 \\log(x \\sqrt{y})}{5 - 5 \\log^2 xy} = \\dots$$",
    "opt": ["$\\frac{15}{\\log x + \\log(xy)}$", "$\\frac{5}{\\log 10 + \\log(xy)}$", "$\\frac{\\log xy}{\\log y}$", "$5(\\log 10 + \\log(xy))$", "$5$"],
    "a": 1
  },
  {
    "q": "Batasan nilai $a$ dari persamaan kuadrat $x^2 + (2a - 2)x + a^2 - 3a + 5 = 0$ agar mempunyai akar-akar real adalah ....",
    "opt": ["$a = 4$", "$a \\leq 4$", "$a \\geq 4$", "$a \\geq 2$", "$a \\leq 2$"],
    "a": 2
  },
  {
    "q": "Suatu pabrik pensil menggunakan bahan dasar kayu ($x$) memproduksi pensil melalui dua tahap. Tahap pertama menggunakan mesin I menghasilkan pensil setengah jadi ($m$) yang banyaknya sesuai dengan fungsi $m = f(x) = x^2 + 4x - 1$. Tahap kedua menggunakan mesin II menghasilkan pensil yang banyaknya sesuai dengan fungsi $g(m) = m + 3$, dengan $x$ dan $m$ dalam satuan ton. Jika bahan dasar yang tersedia sebanyak 2 ton, banyak pensil yang dihasilkan dalam produksi tersebut adalah ... ton.",
    "opt": ["5", "7", "11", "13", "14"],
    "a": 4
  },
  {
    "q": "Diketahui $f(x) = \\frac{12x - 3}{6x - 5}, x \\neq \\frac{5}{6}$. Invers fungsi $f(x)$ adalah $f^{-1}(x) = \\dots$",
    "opt": ["$\\frac{5x - 3}{6x - 12}, x \\neq 2$", "$\\frac{5x - 3}{6x + 12}, x \\neq -2$", "$\\frac{5x + 3}{6x + 12}, x \\neq -2$", "$\\frac{-5x - 3}{6x - 12}, x \\neq 2$", "$\\frac{-5x - 3}{-6x - 12}, x \\neq -2$"],
    "a": 0
  },
  {
    "q": "<img src='MTK_4_no6.png'>Daerah yang merupakan penyelesaian dari pertidaksamaan $x + y \\geq 4; 2x + y \\leq 6; x \\geq 0; y \\geq 0$ adalah ....",
    "opt": ["III", "II", "I", "IV", "I dan III"],
    "a": 2
  },
  {
    "q": "Andin membuat dua jenis kue yang masing-masing menggunakan bahan dasar tepung terigu dan gula halus. Kue jenis A terbuat dari 1 kg tepung terigu dan 0,75 kg gula halus. Kue jenis B terbuat dari $\\frac{2}{3}$ kg tepung terigu dan 2 kg gula halus. Banyaknya tepung terigu dan gula halus yang tersedia adalah 7,5 kg dan 6 kg. Jika keuntungan penjualan kue A adalah Rp2.500,00 per buah dan kue B Rp1.500,00 per buah, maka keuntungan maksimal yang diperoleh Andin adalah ... dengan membuat kue A dan B berturut-turut sebanyak ...",
    "opt": ["Rp16.000,00; 8; 6", "Rp16.500,00; 6; 2", "Rp17.500,00; 6; 8", "Rp18.000,00; 2; 6", "Rp18.000,00; 6; 2"],
    "a": 4
  },
  {
    "q": "Tiga tahun yang lalu umur Padli sama dengan 4 kali umur Anggi. Lima tahun yang akan datang, dua kali umur Padli sama dengan 3 kali umur Anggi ditambah 2 tahun. Jumlah umur Padli dan Anggi saat ini adalah ...",
    "opt": ["12", "13", "14", "15", "16"],
    "a": 4
  },
  {
    "q": "Diketahui matriks $$A = \\begin{pmatrix} 1 & 2 \\\\ 4 & 1 \\end{pmatrix}, B = \\begin{pmatrix} 5 & -1 \\\\ 6 & 1 \\end{pmatrix} \\text{ dan } C = \\begin{pmatrix} 0 & 2 \\\\ 1 & 0 \\end{pmatrix}.$$ Jika $D = A + B - 2C$, maka determinan matriks $D = \\dots$",
    "opt": ["48", "36", "24", "12", "6"],
    "a": 1
  },
  {
    "q": "Suku ke-4 dan ke-9 suatu barisan aritmetika berturut-turut adalah 6 dan 36. Jumlah 18 suku pertama barisan tersebut adalah ....",
    "opt": ["680", "666", "646", "569", "496"],
    "a": 1
  },
  {
    "q": "Nilai $\\lim_{x \\to 7} \\frac{x^2 - 4x - 21}{x - 7}$ adalah ....",
    "opt": ["13", "12", "11", "10", "7"],
    "a": 3
  },
  {
    "q": "Jika $f(x) = 2x(x^2 - 1)$ dengan $f'$ adalah turunan dari fungsi $f$, maka nilai dari $f'(0)$ adalah ....",
    "opt": ["2", "1", "0", "-1", "-2"],
    "a": 4
  },
  {
    "q": "Grafik fungsi $f(x) = x^2 - x$ turun pada interval ....",
    "opt": ["$x < \\frac{1}{2}$", "$0 < x < \\frac{1}{2}$", "$x < -\\frac{1}{2}$ atau $x > 0$", "$x < -\\frac{1}{2}$ atau $x > \\frac{1}{2}$", "$x < 0$ atau $x > \\frac{1}{2}$"],
    "a": 0
  },
  {
    "q": "Hasil dari $\\int_{-1}^{1} (x^3 - 2x^2 + 1) dx = \\dots$",
    "opt": ["0", "1", "2", "3", "4"],
    "a": 2
  },
  {
    "q": "Seorang siswa akan mengukur sebuah gedung yang berjarak $30\\sqrt{3}$ m dari dirinya. Antara mata dengan puncak gedung tersebut terbentuk sudut elevasi 30 derajat. Jika tinggi siswa tersebut adalah 1,7 m, berapakah tinggi gedung tersebut?",
    "opt": ["20,7 m", "25,7 m", "28 m", "31,7 m", "33 m"],
    "a": 3
  },
  {
    "q": "Himpunan penyelesaian persamaan $\\cos 2x + 5 \\sin x - 3 = 0$ untuk $0 \\leq x \\leq 360$ adalah ....",
    "opt": ["$\\{30^\\circ, 150^\\circ\\}$", "$\\{180^\\circ, 210^\\circ\\}$", "$\\{60^\\circ, 120^\\circ\\}$", "$\\{80^\\circ, 150^\\circ\\}$", "$\\{90^\\circ, 180^\\circ\\}$"],
    "a": 0
  },
  {
    "q": "Diketahui kubus ABCD.EFGH dengan panjang rusuknya $3a$ cm. Jika titik P membagi HF sama panjang, maka nilai $\\tan$ dari sudut PBD adalah ....",
    "opt": ["$\\sqrt{5}$", "$\\frac{1}{3}\\sqrt{5}$", "$\\sqrt{2}$", "$\\frac{2}{3}\\sqrt{2}$", "$\\frac{1}{2}\\sqrt{2}$"],
    "a": 2
  },
  {
    "q": "Dua buah dadu dilempar bersamaan. Peluang dadu tersebut muncul jumlah keduanya kurang dari sama dengan 6 adalah ....",
    "opt": ["$\\frac{3}{12}$", "$\\frac{1}{6}$", "$\\frac{5}{12}$", "$\\frac{2}{15}$", "$\\frac{1}{3}$"],
    "a": 2
  },
  {
    "q": "Perhatikan data berikut. Modus dari data tersebut adalah ....",
    "opt": ["77,667", "78,667", "79,667", "80,667", "81,667"],
    "a": 2
  },
  {
    "q": "Varian dari data 14, 12, 17, 19, 17, 16, 18, 15 adalah ....",
    "opt": ["3,725", "4,5", "5,5", "6,875", "7,275"],
    "a": 3
  },
  {
    "q": "Dalam suatu kelas, jumlah siswa adalah 40 orang. Jika 10 siswa suka matematika, maka berapakah besar sudut sektor untuk siswa yang suka matematika pada diagram lingkaran?",
    "opt": ["45°", "60°", "75°", "90°", "120°"],
    "a": 3
  },
  {
    "q": "Sebuah dadu enam sisi dilempar sekali. Berapakah peluang munculnya angka prima?",
    "opt": ["1/2", "1/3", "2/3", "5/6", "1/6"],
    "a": 0
  },
  {
    "q": "Sebuah pekerjaan dapat diselesaikan oleh 4 pekerja dalam 12 hari. Jika pekerjaan yang sama dilakukan oleh 6 pekerja, berapa hari yang dibutuhkan untuk menyelesaikannya?",
    "opt": ["6 hari", "7 hari", "8 hari", "9 hari", "10 hari"],
    "a": 2
  },
  {
    "q": "Seorang petani memiliki 240 meter kawat untuk membuat pagar berbentuk persegi panjang. Jika panjang pagar harus 2 kali lebarnya, berapa luas maksimal yang bisa dibuat petani?",
    "opt": ["$1.600 \\text{ m}^2$", "$2.000 \\text{ m}^2$", "$2.400 \\text{ m}^2$", "$2.800 \\text{ m}^2$", "$3.200 \\text{ m}^2$"],
    "a": 4
  },
  {
    "q": "Toko elektronik memberikan diskon bertingkat pada barang tertentu. Diskon pertama sebesar 20%, dan setelah itu diberikan diskon tambahan sebesar 10%. Jika harga awal barang adalah Rp2.000.000, berapa harga akhir barang setelah kedua diskon diberikan?",
    "opt": ["Rp1.400.000", "Rp1.440.000", "Rp1.500.000", "Rp1.600.000", "Rp1.800.000"],
    "a": 1
  },
  {
    "q": "Seorang penjual buah mencampur dua jenis mangga. Mangga jenis pertama berharga Rp25.000/kg dan mangga jenis kedua berharga Rp15.000/kg. Jika total campuran 40 kg dijual seharga Rp20.000/kg, berapa banyak kilogram mangga jenis pertama dalam campuran tersebut?",
    "opt": ["10 kg", "15 kg", "20 kg", "25 kg", "30 kg"],
    "a": 2
  },
  {
    "q": "Sebuah persegi memiliki panjang sisi 12 cm. Berapakah luas persegi tersebut?",
    "opt": ["$100 \\text{ cm}^2$", "$120 \\text{ cm}^2$", "$144 \\text{ cm}^2$", "$156 \\text{ cm}^2$", "$169 \\text{ cm}^2$"],
    "a": 2
  },
  {
    "q": "Keliling sebuah persegi adalah 48 cm. Berapakah panjang sisi persegi tersebut?",
    "opt": ["10 cm", "11 cm", "12 cm", "13 cm", "14 cm"],
    "a": 2
  },
  {
    "q": "Sebuah persegi panjang memiliki panjang 12 cm dan lebar 8 cm. Berapakah keliling persegi panjang tersebut?",
    "opt": ["36 cm", "40 cm", "44 cm", "48 cm", "50 cm"],
    "a": 1
  },
  {
    "q": "Sebuah segitiga memiliki panjang alas 12 cm dan tinggi 8 cm. Berapakah luas segitiga tersebut?",
    "opt": ["48 cm2", "96 cm2", "32 cm2", "24 cm2", "72 cm2"],
    "a": 0
  },
  {
    "q": "Sebuah kubus memiliki panjang rusuk 6 cm. Berapakah volume kubus tersebut?",
    "opt": ["36 cm3", "72 cm3", "216 cm3", "144 cm3", "108 cm3"],
    "a": 2
  },
  {
    "q": "Sebuah tabung memiliki jari-jari 7 cm dan tinggi 10 cm. Berapakah volume tabung tersebut? (Gunakan π=22/7)",
    "opt": ["1.540 cm3", "1.760 cm3", "1.320 cm3", "1.650 cm3", "1.820 cm3"],
    "a": 0
  },
  {
    "q": "Sebuah limas segiempat memiliki panjang sisi alas 6 cm dan tinggi limas 12 cm. Berapakah volume limas tersebut?",
    "opt": ["72 cm3", "144 cm3", "288 cm3", "216 cm3", "360 cm3"],
    "a": 1
  },
  {
    "q": "Sebuah prisma segitiga memiliki luas alas 30 cm2 dan tinggi prisma 15 cm. Berapakah volume prisma tersebut?",
    "opt": ["200 cm3", "250 cm3", "300 cm3", "450 cm3", "500 cm3"],
    "a": 3
  },
  {
    "q": "Sebuah silinder memiliki jari-jari alas 7 cm dan tinggi 10 cm. Berapakah luas permukaan silinder tersebut? (Gunakan π=22/7)",
    "opt": ["286 cm2", "440 cm2", "528 cm2", "682 cm2", "748 cm2"],
    "a": 4
  },
  {
    "q": "Bentuk sederhana dari $\\sin 120^\\circ$ adalah ...",
    "opt": ["$0$", "$1/2$", "$1/2\\sqrt{3}$", "$1/2\\sqrt{2}$", "$1$"],
    "a": 2
  },
  {
    "q": "$\\cos 150^\\circ$ senilai dengan ...",
    "opt": ["$\\cos(30^\\circ)$", "$\\cos(210^\\circ)$", "$\\sin(330^\\circ)$", "$\\sin(210^\\circ)$", "$\\sin(30^\\circ)$"],
    "a": 0
  },
  {
    "q": "Nilai dari $\\sec 315^\\circ$ adalah ....",
    "opt": ["$1/2$", "$\\sqrt{2}$", "$1$", "$0$", "$\\sqrt{3}$"],
    "a": 1
  },
  {
    "q": "Panjang jarum pendek sebuah jam dinding adalah 12 cm. Saat jarum jam menunjukkan pukul 02.00, berapa jarak antara ujung jarum pendek ke garis horizontal yang melalui titik pusat jam dinding?",
    "opt": ["$4 \\text{ cm}$", "$6 \\text{ cm}$", "$3 \\text{ cm}$", "$9 \\text{ cm}$", "$8 \\text{ cm}$"],
    "a": 0
  },
  {
    "q": "Koordinat titik pusat dan panjang jari-jari lingkaran yang mempunyai persamaan lingkaran $x^2 + y^2 - 4x + 6y - 12 = 0$ berturut-turut adalah ....",
    "opt": ["$P(-2, -3)$ dan $r = 4$", "$P(-2, -3)$ dan $r = 5$", "$P(-2, 3)$ dan $r = 5$", "$P(2, -3)$ dan $r = 5$", "$P(-4, 6)$ dan $r = 24$"],
    "a": 3
  }
];

    let currentIdx = 0;
    let userAnswers = new Array(quizData.length).fill(null);
    let isReviewMode = false;

    window.onload = () => {
        renderStatus();
        showQuestion();
    };

    function renderStatus() {
        const container = document.getElementById('status-container');
        container.innerHTML = "";
        quizData.forEach((_, i) => {
            const box = document.createElement('div');
            box.innerText = i + 1;
            
            if (isReviewMode) {
                const isCorrect = userAnswers[i] === quizData[i].a;
                box.className = `num-box ${isCorrect ? 'num-correct' : 'num-wrong'}`;
            } else {
                box.className = `num-box ${userAnswers[i] !== null ? 'num-answered' : 'num-unanswered'}`;
            }
            
            if (i === currentIdx) box.classList.add('num-active');
            box.onclick = () => { currentIdx = i; showQuestion(); };
            container.appendChild(box);
        });
    }

    function showQuestion() {
        const q = quizData[currentIdx];
        document.getElementById('question-number').innerText = `Soal #${currentIdx + 1}`;
        
        // MENGUBAH innerText MENJADI innerHTML DI SINI
        document.getElementById('question-text').innerHTML = q.q;
        
        const optContainer = document.getElementById('options-container');
        optContainer.innerHTML = "";

        const labels = ['A', 'B', 'C', 'D', 'E'];
        q.opt.forEach((option, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<strong>${labels[i]}.</strong> ${option}`;
            
            if (isReviewMode) {
                btn.disabled = true;
                if (i === q.a) {
                    btn.classList.add('correct-ans');
                } 
                if (userAnswers[currentIdx] === i && i !== q.a) {
                    btn.classList.add('wrong-selected');
                }
            } else {
                if (userAnswers[currentIdx] === i) btn.classList.add('selected');
                btn.onclick = () => selectAnswer(i);
            }
            
            optContainer.appendChild(btn);
        });

        document.getElementById('prev-btn').style.visibility = currentIdx === 0 ? 'hidden' : 'visible';
        document.getElementById('next-btn').innerText = currentIdx === quizData.length - 1 ? 'Selesai' : 'Selanjutnya';
        document.getElementById('back-to-result-btn').style.display = isReviewMode ? 'block' : 'none';
        
        renderStatus();

        // Tambahan: Render ulang matematika (LaTeX) setelah konten di-update
        if (window.MathJax) {
            MathJax.typesetPromise().catch((err) => console.log(err.message));
        }
    }

    function selectAnswer(i) {
        if (isReviewMode) return;
        userAnswers[currentIdx] = i;
        showQuestion();

        setTimeout(() => {
            if (currentIdx < quizData.length - 1) {
                currentIdx++;
                showQuestion();
            }
        }, 300);
    }

    function nextQuestion() {
        if (currentIdx < quizData.length - 1) {
            currentIdx++;
            showQuestion();
        } else if (!isReviewMode) {
            showResult();
        } else {
            exitReview();
        }
    }

    function prevQuestion() {
        if (currentIdx > 0) {
            currentIdx--;
            showQuestion();
        }
    }

    function showResult() {
        const unanswered = userAnswers.filter(ans => ans === null).length;
        if (unanswered > 0 && !isReviewMode) {
            if (!confirm(`Ada ${unanswered} soal belum dijawab. Yakin ingin mengumpulkan?`)) return;
        }

        let correct = 0;
        userAnswers.forEach((ans, i) => { if (ans === quizData[i].a) correct++; });
        const finalScoreValue = Math.round((correct / quizData.length) * 100);
        
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('finish-quiz-btn').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = finalScoreValue;
        document.getElementById('stats-text').innerText = `Benar: ${correct} | Salah: ${quizData.length - correct}`;
        
        isReviewMode = true; 
        renderStatus();
    }

    function startReview() {
        currentIdx = 0; 
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        showQuestion();
    }

    function exitReview() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
    }
</script>

</body>
</html>
