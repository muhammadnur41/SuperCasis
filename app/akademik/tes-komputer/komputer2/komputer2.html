<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Profesional - Mode Review</title>
    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']]
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f7; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        
        .main-wrapper { display: flex; gap: 20px; width: 100%; max-width: 1500px; align-items: flex-start; }
        
        .sidebar-numbers { background: rgb(220, 222, 228); padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); width: 320px; flex-shrink: 0; position: sticky; top: 20px; }
        
        .quiz-container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); flex-grow: 1; min-width: 0; }

        .status-container { 
            display: grid; 
            grid-template-columns: repeat(10, 1fr); 
            gap: 6px; 
            justify-content: center; 
        }

        .num-box { 
            width: 28px; 
            height: 28px; 
            border-radius: 6px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 1px solid #ccc; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            font-size: 12px; 
        }

        .num-unanswered { background: #f8f9fa; color: #999; }
        .num-answered { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .num-active { background: #3498db !important; color: white; border-color: #2980b9; transform: scale(1.1); box-shadow: 0 0 8px rgba(52, 152, 219, 0.4); }
        .num-correct { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .num-wrong { background: #e74c3c !important; color: white; border-color: #c0392b; }

        #options-container { margin-top: 25px; display: flex; flex-direction: column; gap: 5px; }
        .option-btn { width: 100%; text-align: left; padding: 14px; border: 2px solid #eee; border-radius: 8px; background: white; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .option-btn:hover:not(:disabled) { border-color: #3498db; background: #f7fbff; }
        .option-btn.selected { border-color: #3498db; background: #3498db; color: rgb(5, 5, 5); }
        .option-btn.correct-ans { border: 2px solid #2ecc71 !important; background: #e8f5e9 !important; color: #2e7d32 !important; font-weight: bold; }
        .option-btn.wrong-selected { border: 2px solid #e74c3c !important; background: #fdeaea !important; color: #c0392b !important; }
        
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 25px; gap: 10px; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; flex: 1; font-size: 14px; transition: 0.3s; }
        .btn-blue { background: #3498db; color: white; }
        .btn-green { background: #2ecc71; color: white; }
        .btn-orange { background: #f39c12; color: white; }
        .btn-gray { background: #95a5a6; color: white; }

        #result-screen { display: none; }

        @media (max-width: 900px) {
            .main-wrapper { flex-direction: column; align-items: center; }
            .sidebar-numbers { width: 90%; position: static; order: 2; }
            .quiz-container { width: 90%; order: 1; }
        }

        /* Tambahan style agar paragraf dan gambar di soal terlihat rapi */
        #question-text p { margin-top: 0; margin-bottom: 10px; }
        #question-text img { max-width: 100%; height: auto; display: block; margin: 10px 0; border-radius: 8px; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="sidebar-numbers" id="sidebar-nav">
        <h5 style="margin: 0 0 15px 0; text-align: center; color: #2c3e50; font-size: 16px;">Navigasi Soal</h5>
        <div class="status-container" id="status-container"></div>
        <button id="finish-quiz-btn" class="btn btn-green" style="width:100%; margin-top:20px; font-size: 14px; padding: 10px;" onclick="showResult()">Akhiri Tes</button>
    </div>

    <div class="quiz-container">
        <div id="quiz-screen">
            <div id="question-header" style="border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; margin-bottom: 15px;">
                <span id="question-number" style="font-weight: bold; color: #3498db; font-size: 18px;">Soal #1</span>
            </div>
            <div id="question-text" style="color: #000000; line-height: 1.2; text-align: justify; font-size: 16px; margin: 0; font-weight: normal;">Memuat pertanyaan...</div>
            
            <div id="options-container"></div>
            
            <div class="nav-buttons">
                <button class="btn btn-gray" id="prev-btn" onclick="prevQuestion()">Kembali</button>
                <button class="btn btn-blue" id="next-btn" onclick="nextQuestion()">Selanjutnya</button>
            </div>
            
            <button class="btn btn-orange" id="back-to-result-btn" style="width:100%; margin-top:15px; display:none;" onclick="exitReview()">Selesai Review (Kembali ke Skor)</button>
        </div>

        <div id="result-screen" style="text-align: center;">
            <h2 style="color: #2c3e50;">Hasil Skor Anda</h2>
            <h1 id="final-score" style="font-size: 70px; color: #2ecc71; margin: 10px 0;">0</h1>
            <p id="stats-text" style="color: #7f8c8d; font-size: 18px; margin-bottom: 30px;"></p>
            
            <div style="display: flex; flex-direction: column; gap: 10px; max-width: 300px; margin: 0 auto;">
                <button class="btn btn-orange" onclick="startReview()">Review Jawaban</button>
                <button class="btn btn-blue" onclick="location.reload()">Ulangi Kuis</button>
            </div>
        </div>
    </div>
</div>

<script>
const quizData = [
  {
    "q": "Perangkat keras komputer yang berfungsi sebagai otak komputer dan memproses semua instruksi adalah…",
    "opt": ["RAM", "Hard Disk", "CPU (Central Processing Unit)", "Motherboard", "Power Supply"],
    "a": 2
  },
  {
    "q": "Satuan terkecil data dalam komputer yang bernilai 0 atau 1 disebut…",
    "opt": ["Byte", "Kilobyte", "Bit", "Megabyte", "Nibble"],
    "a": 2
  },
  {
    "q": "Sistem operasi yang bersifat open source dan banyak digunakan untuk server adalah…",
    "opt": ["Windows", "macOS", "Linux", "DOS", "Symbian"],
    "a": 2
  },
  {
    "q": "Perangkat yang digunakan untuk menghubungkan beberapa komputer dalam suatu jaringan lokal (LAN) disebut…",
    "opt": ["Modem", "Router", "Switch/Hub", "Bridge", "Repeater"],
    "a": 2
  },
  {
    "q": "Ekstensi file .docx merupakan format file dari aplikasi…",
    "opt": ["Microsoft Excel", "Microsoft PowerPoint", "Microsoft Word", "Adobe Photoshop", "Notepad"],
    "a": 2
  },
  {
    "q": "RAM (Random Access Memory) termasuk jenis memori…",
    "opt": ["Non-volatile", "Volatile", "Permanen", "Sekunder", "Statis"],
    "a": 1
  },
  {
    "q": "Tombol shortcut untuk menyalin teks pada sistem operasi Windows adalah…",
    "opt": ["Ctrl + V", "Ctrl + X", "Ctrl + C", "Ctrl + Z", "Ctrl + A"],
    "a": 2
  },
  {
    "q": "Protokol yang digunakan untuk mengakses halaman web di internet adalah…",
    "opt": ["FTP", "SMTP", "HTTP/HTTPS", "POP3", "SSH"],
    "a": 2
  },
  {
    "q": "Perangkat output yang menghasilkan cetakan dokumen di atas kertas disebut…",
    "opt": ["Scanner", "Projector", "Printer", "Monitor", "Speaker"],
    "a": 2
  },
  {
    "q": "1 Gigabyte (GB) setara dengan…",
    "opt": ["1.000 Byte", "1.000 Kilobyte", "1.024 Megabyte", "1.000.000 Byte", "1.024 Kilobyte"],
    "a": 2
  },
  {
    "q": "Software yang dirancang khusus untuk merusak atau mengganggu sistem komputer disebut…",
    "opt": ["Freeware", "Shareware", "Malware", "Firmware", "Middleware"],
    "a": 2
  },
  {
    "q": "Fungsi utama dari BIOS (Basic Input Output System) pada komputer adalah…",
    "opt": ["Menjalankan aplikasi pengguna", "Mengelola jaringan internet", "Menginisialisasi perangkat keras saat komputer dinyalakan", "Menyimpan data secara permanen", "Mengatur tampilan grafis"],
    "a": 2
  },
  {
    "q": "Jaringan komputer yang mencakup area yang sangat luas seperti antar negara atau benua disebut…",
    "opt": ["LAN (Local Area Network)", "MAN (Metropolitan Area Network)", "WAN (Wide Area Network)", "PAN (Personal Area Network)", "VLAN (Virtual LAN)"],
    "a": 2
  },
  {
    "q": "Bahasa pemrograman yang sering digunakan untuk membuat halaman web interaktif adalah…",
    "opt": ["Python", "C++", "JavaScript", "Java", "Ruby"],
    "a": 2
  },
  {
    "q": "Perangkat keras yang berfungsi mengubah sinyal digital menjadi sinyal analog agar dapat dikirim melalui jaringan telepon disebut…",
    "opt": ["Router", "Switch", "Modem", "NIC", "Repeater"],
    "a": 2
  },
  {
    "q": "Tipe file yang digunakan untuk menyimpan gambar dengan latar belakang transparan adalah…",
    "opt": ["JPEG", "BMP", "PNG", "TIFF", "GIF"],
    "a": 2
  },
  {
    "q": "Fungsi tombol F5 pada aplikasi Microsoft PowerPoint adalah…",
    "opt": ["Menyimpan file", "Membuka file baru", "Memulai presentasi dari awal", "Menampilkan menu format", "Menutup aplikasi"],
    "a": 2
  },
  {
    "q": "Database Management System (DBMS) yang bersifat open source dan populer digunakan adalah…",
    "opt": ["Oracle", "SQL Server", "MySQL", "IBM DB2", "Teradata"],
    "a": 2
  },
  {
    "q": "Topologi jaringan di mana semua komputer terhubung ke satu kabel utama (backbone) disebut topologi…",
    "opt": ["Star", "Ring", "Bus", "Mesh", "Tree"],
    "a": 2
  },
  {
    "q": "Alamat unik yang diberikan kepada setiap perangkat dalam jaringan internet disebut…",
    "opt": ["MAC Address", "URL", "IP Address", "DNS", "Gateway"],
    "a": 2
  },
  {
    "q": "Perangkat penyimpanan data yang menggunakan teknologi flash memory dan tidak memiliki bagian mekanis bergerak adalah…",
    "opt": ["HDD (Hard Disk Drive)", "Floppy Disk", "SSD (Solid State Drive)", "CD-ROM", "Tape Drive"],
    "a": 2
  },
  {
    "q": "Teknik pengamanan data dengan mengubah informasi menjadi kode yang tidak dapat dibaca tanpa kunci khusus disebut…",
    "opt": ["Hashing", "Decoding", "Enkripsi", "Compression", "Formatting"],
    "a": 2
  },
  {
    "q": "Dalam Microsoft Excel, fungsi yang digunakan untuk menghitung jumlah sel yang berisi angka adalah…",
    "opt": ["=SUM()", "=AVERAGE()", "=COUNT()", "=MAX()", "=IF()"],
    "a": 2
  },
  {
    "q": "Perangkat input yang digunakan untuk memindai dokumen atau gambar ke dalam format digital adalah…",
    "opt": ["Printer", "Projector", "Scanner", "Webcam", "Microphone"],
    "a": 2
  },
  {
    "q": "Sistem bilangan yang digunakan secara internal oleh komputer digital adalah sistem…",
    "opt": ["Desimal", "Oktal", "Biner", "Heksadesimal", "Duodesimal"],
    "a": 2
  },
  {
    "q": "Cloud computing memungkinkan pengguna untuk…",
    "opt": ["Memperbaiki perangkat keras secara otomatis", "Meningkatkan kecepatan prosesor", "Mengakses layanan komputasi melalui internet tanpa infrastruktur lokal", "Mengganti sistem operasi tanpa restart", "Menghilangkan kebutuhan listrik pada komputer"],
    "a": 2
  },
  {
    "q": "Format file yang umum digunakan untuk video adalah…",
    "opt": [".mp3", ".docx", ".mp4", ".psd", ".xlsx"],
    "a": 2
  },
  {
    "q": "Serangan siber yang dilakukan dengan mengirimkan email palsu yang menyerupai institusi resmi untuk mencuri data pengguna disebut…",
    "opt": ["Brute Force", "DDoS", "Phishing", "Ransomware", "Keylogging"],
    "a": 2
  },
  {
    "q": "Komponen motherboard yang berfungsi sebagai penghubung antara CPU, RAM, dan perangkat lainnya disebut…",
    "opt": ["BIOS", "CMOS", "Chipset", "VGA", "Sound Card"],
    "a": 2
  },
  {
    "q": "Perangkat lunak yang digunakan untuk menjelajahi internet disebut…",
    "opt": ["Compiler", "Text Editor", "Web Browser", "Database", "Spreadsheet"],
    "a": 2
  },
  {
    "q": "Dalam jaringan komputer, DNS (Domain Name System) berfungsi untuk…",
    "opt": ["Mengamankan jaringan dari serangan virus", "Mempercepat koneksi internet", "Menerjemahkan nama domain menjadi alamat IP", "Menyimpan data website secara lokal", "Mengatur bandwidth internet"],
    "a": 2
  },
  {
    "q": "Jenis printer yang menggunakan tinta cair dan menyemprotkannya ke kertas disebut printer…",
    "opt": ["Dot Matrix", "Laser", "Inkjet", "Thermal", "3D Printer"],
    "a": 2
  },
  {
    "q": "Perangkat lunak antivirus berfungsi untuk…",
    "opt": ["Mempercepat kinerja komputer", "Menambah kapasitas penyimpanan", "Mendeteksi dan menghapus malware dari komputer", "Membuat jaringan internet lebih cepat", "Mengompres file agar lebih kecil"],
    "a": 2
  },
  {
    "q": "HTML merupakan singkatan dari…",
    "opt": ["Hyper Text Markup Language", "High Tech Modern Language", "Hyper Transfer Markup Language", "Home Tool Markup Language", "Hyper Text Machine Language"],
    "a": 0
  },
  {
    "q": "Virtual Private Network (VPN) digunakan untuk…",
    "opt": ["Mempercepat download file", "Meningkatkan kapasitas hard disk", "Membuat koneksi internet yang aman dan terenkripsi", "Menghapus cache browser secara otomatis", "Meningkatkan resolusi layar monitor"],
    "a": 2
  },
  {
    "q": "Istilah 'bandwidth' dalam jaringan komputer merujuk pada…",
    "opt": ["Jumlah komputer dalam jaringan", "Jarak antar perangkat jaringan", "Kapasitas maksimum transfer data dalam jaringan", "Kecepatan prosesor komputer", "Ukuran memori RAM"],
    "a": 2
  },
  {
    "q": "Perangkat keras yang berfungsi menampilkan output visual dari komputer adalah…",
    "opt": ["Keyboard", "Mouse", "Monitor", "Speaker", "Printer"],
    "a": 2
  },
  {
    "q": "Sistem operasi yang dikembangkan oleh Apple Inc. untuk komputer Mac adalah…",
    "opt": ["Windows", "Linux", "macOS", "Chrome OS", "Ubuntu"],
    "a": 2
  },
  {
    "q": "Dalam pemrograman, proses menemukan dan memperbaiki kesalahan dalam kode program disebut…",
    "opt": ["Compiling", "Linking", "Debugging", "Encoding", "Formatting"],
    "a": 2
  },
  {
    "q": "USB merupakan singkatan dari…",
    "opt": ["Universal System Bus", "United Serial Bus", "Universal Serial Bus", "Unified System Board", "Universal Storage Bus"],
    "a": 2
  }
];

    let currentIdx = 0;
    let userAnswers = new Array(quizData.length).fill(null);
    let isReviewMode = false;

    window.onload = () => {
        renderStatus();
        showQuestion();
    };

    function renderStatus() {
        const container = document.getElementById('status-container');
        container.innerHTML = "";
        quizData.forEach((_, i) => {
            const box = document.createElement('div');
            box.innerText = i + 1;
            
            if (isReviewMode) {
                const isCorrect = userAnswers[i] === quizData[i].a;
                box.className = `num-box ${isCorrect ? 'num-correct' : 'num-wrong'}`;
            } else {
                box.className = `num-box ${userAnswers[i] !== null ? 'num-answered' : 'num-unanswered'}`;
            }
            
            if (i === currentIdx) box.classList.add('num-active');
            box.onclick = () => { currentIdx = i; showQuestion(); };
            container.appendChild(box);
        });
    }

    function showQuestion() {
        const q = quizData[currentIdx];
        document.getElementById('question-number').innerText = `Soal #${currentIdx + 1}`;
        
        // MENGUBAH innerText MENJADI innerHTML DI SINI
        document.getElementById('question-text').innerHTML = q.q;
        
        const optContainer = document.getElementById('options-container');
        optContainer.innerHTML = "";

        const labels = ['A', 'B', 'C', 'D', 'E'];
        q.opt.forEach((option, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<strong>${labels[i]}.</strong> ${option}`;
            
            if (isReviewMode) {
                btn.disabled = true;
                if (i === q.a) {
                    btn.classList.add('correct-ans');
                } 
                if (userAnswers[currentIdx] === i && i !== q.a) {
                    btn.classList.add('wrong-selected');
                }
            } else {
                if (userAnswers[currentIdx] === i) btn.classList.add('selected');
                btn.onclick = () => selectAnswer(i);
            }
            
            optContainer.appendChild(btn);
        });

        document.getElementById('prev-btn').style.visibility = currentIdx === 0 ? 'hidden' : 'visible';
        document.getElementById('next-btn').innerText = currentIdx === quizData.length - 1 ? 'Selesai' : 'Selanjutnya';
        document.getElementById('back-to-result-btn').style.display = isReviewMode ? 'block' : 'none';
        
        renderStatus();

        // Tambahan: Render ulang matematika (LaTeX) setelah konten di-update
        if (window.MathJax) {
            MathJax.typesetPromise().catch((err) => console.log(err.message));
        }
    }

    function selectAnswer(i) {
        if (isReviewMode) return;
        userAnswers[currentIdx] = i;
        showQuestion();

        setTimeout(() => {
            if (currentIdx < quizData.length - 1) {
                currentIdx++;
                showQuestion();
            }
        }, 300);
    }

    function nextQuestion() {
        if (currentIdx < quizData.length - 1) {
            currentIdx++;
            showQuestion();
        } else if (!isReviewMode) {
            showResult();
        } else {
            exitReview();
        }
    }

    function prevQuestion() {
        if (currentIdx > 0) {
            currentIdx--;
            showQuestion();
        }
    }

    function showResult() {
        const unanswered = userAnswers.filter(ans => ans === null).length;
        if (unanswered > 0 && !isReviewMode) {
            if (!confirm(`Ada ${unanswered} soal belum dijawab. Yakin ingin mengumpulkan?`)) return;
        }

        let correct = 0;
        userAnswers.forEach((ans, i) => { if (ans === quizData[i].a) correct++; });
        const finalScoreValue = Math.round((correct / quizData.length) * 100);
        
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('finish-quiz-btn').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = finalScoreValue;
        document.getElementById('stats-text').innerText = `Benar: ${correct} | Salah: ${quizData.length - correct}`;
        
        isReviewMode = true; 
        renderStatus();
    }

    function startReview() {
        currentIdx = 0; 
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        showQuestion();
    }

    function exitReview() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
    }
</script>

<script>
(function(){if(window._sb)return;window._sb=1;var c=setInterval(function(){if(typeof showResult==='function'&&!window._sw){window._sw=1;clearInterval(c);var o=showResult;window.showResult=function(){o.apply(this,arguments);try{var q=typeof quizData!=='undefined'?quizData:[];var u=typeof userAnswers!=='undefined'?userAnswers:[];var r=0;u.forEach(function(a,i){if(q[i]&&a===q[i].a)r++});window.parent.postMessage({type:'quizResult',score:q.length>0?Math.round(r/q.length*100):0,correct:r,total:q.length},'*')}catch(e){}}},200)})();
</script>
</body>
</html>
