<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Profesional - Mode Review</title>
    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']]
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f7; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        
        .main-wrapper { display: flex; gap: 20px; width: 100%; max-width: 1500px; align-items: flex-start; }
        
        .sidebar-numbers { background: rgb(220, 222, 228); padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); width: 320px; flex-shrink: 0; position: sticky; top: 20px; }
        
        .quiz-container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); flex-grow: 1; min-width: 0; }

        .status-container { 
            display: grid; 
            grid-template-columns: repeat(10, 1fr); 
            gap: 6px; 
            justify-content: center; 
        }

        .num-box { 
            width: 28px; 
            height: 28px; 
            border-radius: 6px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 1px solid #ccc; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            font-size: 12px; 
        }

        .num-unanswered { background: #f8f9fa; color: #999; }
        .num-answered { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .num-active { background: #3498db !important; color: white; border-color: #2980b9; transform: scale(1.1); box-shadow: 0 0 8px rgba(52, 152, 219, 0.4); }
        .num-correct { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .num-wrong { background: #e74c3c !important; color: white; border-color: #c0392b; }

        #options-container { margin-top: 25px; display: flex; flex-direction: column; gap: 5px; }
        .option-btn { width: 100%; text-align: left; padding: 14px; border: 2px solid #eee; border-radius: 8px; background: white; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .option-btn:hover:not(:disabled) { border-color: #3498db; background: #f7fbff; }
        .option-btn.selected { border-color: #3498db; background: #3498db; color: rgb(5, 5, 5); }
        .option-btn.correct-ans { border: 2px solid #2ecc71 !important; background: #e8f5e9 !important; color: #2e7d32 !important; font-weight: bold; }
        .option-btn.wrong-selected { border: 2px solid #e74c3c !important; background: #fdeaea !important; color: #c0392b !important; }
        
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 25px; gap: 10px; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; flex: 1; font-size: 14px; transition: 0.3s; }
        .btn-blue { background: #3498db; color: white; }
        .btn-green { background: #2ecc71; color: white; }
        .btn-orange { background: #f39c12; color: white; }
        .btn-gray { background: #95a5a6; color: white; }

        #result-screen { display: none; }

        @media (max-width: 900px) {
            .main-wrapper { flex-direction: column; align-items: center; }
            .sidebar-numbers { width: 90%; position: static; order: 2; }
            .quiz-container { width: 90%; order: 1; }
        }

        /* Tambahan style agar paragraf dan gambar di soal terlihat rapi */
        #question-text p { margin-top: 0; margin-bottom: 10px; }
        #question-text img { max-width: 100%; height: auto; display: block; margin: 10px 0; border-radius: 8px; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="sidebar-numbers" id="sidebar-nav">
        <h5 style="margin: 0 0 15px 0; text-align: center; color: #2c3e50; font-size: 16px;">Navigasi Soal</h5>
        <div class="status-container" id="status-container"></div>
        <button id="finish-quiz-btn" class="btn btn-green" style="width:100%; margin-top:20px; font-size: 14px; padding: 10px;" onclick="showResult()">Akhiri Tes</button>
    </div>

    <div class="quiz-container">
        <div id="quiz-screen">
            <div id="question-header" style="border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; margin-bottom: 15px;">
                <span id="question-number" style="font-weight: bold; color: #3498db; font-size: 18px;">Soal #1</span>
            </div>
            <div id="question-text" style="color: #000000; line-height: 1.2; text-align: justify; font-size: 16px; margin: 0; font-weight: normal;">Memuat pertanyaan...</div>
            
            <div id="options-container"></div>
            
            <div class="nav-buttons">
                <button class="btn btn-gray" id="prev-btn" onclick="prevQuestion()">Kembali</button>
                <button class="btn btn-blue" id="next-btn" onclick="nextQuestion()">Selanjutnya</button>
            </div>
            
            <button class="btn btn-orange" id="back-to-result-btn" style="width:100%; margin-top:15px; display:none;" onclick="exitReview()">Selesai Review (Kembali ke Skor)</button>
        </div>

        <div id="result-screen" style="text-align: center;">
            <h2 style="color: #2c3e50;">Hasil Skor Anda</h2>
            <h1 id="final-score" style="font-size: 70px; color: #2ecc71; margin: 10px 0;">0</h1>
            <p id="stats-text" style="color: #7f8c8d; font-size: 18px; margin-bottom: 30px;"></p>
            
            <div style="display: flex; flex-direction: column; gap: 10px; max-width: 300px; margin: 0 auto;">
                <button class="btn btn-orange" onclick="startReview()">Review Jawaban</button>
                <button class="btn btn-blue" onclick="location.reload()">Ulangi Kuis</button>
            </div>
        </div>
    </div>
</div>

<script>
const quizData = [
  {
    "q": "Fungsi utama program Microsoft Excel adalah …",
    "opt": ["Pengolah kata", "Pengolah data angka", "Mengelola dokumen", "Berkomunikasi", "Mencari informasi"],
    "a": 1
  },

    "a": 1
  },
  {
    "q": "Worksheet adalah …",
    "opt": ["Kumpulan dari worksheet", "Kumpulan beberapa sel", "Pertemuan antara baris dengan kolom", "Pertemuan antara sel dengan range", "Lembar kerja dalam excel"],
    "a": 4
  },
  {
    "q": "Apa yang dimaksud dengan sel (Cell) dalam excel?",
    "opt": ["Kumpulan dari worksheet", "Kumpulan beberapa sel", "Pertemuan antara baris dengan kolom", "Pertemuan antara sel dengan range", "Lembar kerja dalam excel"],
    "a": 2
  },
  {
    "q": "Apa yang dimaksud dengan Range dalam excel?",
    "opt": ["Kumpulan dari worksheet", "Kumpulan dari beberapa sel", "Pertemuan antara baris dengan kolom", "Pertemuan antara sel dengan range", "Lembar kerja dalam excel"],
    "a": 1
  },
  {
    "q": "Dalam mengedit isi sel bisa dilakukan dengan menggunakan tombol …",

    "a": 1
  },
  {

    "a": 3
  },
  {
    "q": "Dalam menuliskan rumus pada excel harus didahului dengan …",
    "opt": ["=", "+", "&", "\" \"", "@"],
    "a": 0
  },
  {
    "q": "Dibawah ini merupakan yang tidak termasuk dalam perintah memulai Microsoft excel adalah…",

  },
  {
    "q": "Perintah untuk menggabungkan beberapa sel yang berdekatan dan data yang akan diformat rata tengah adalah ……….",
    "opt": ["Align Left", "Align Right", "Center", "Merge and Center", "Justify"],
    "a": 3
  },
  {
    "q": "Untuk menyisipkan Sheet setelah memilih menu Insert maka pilih sub menu ….",
    "opt": ["Work Sheet", "Delet Sheet", "Rename", "Move or Copy Sheet", "Copy"],
    "a": 0
  },
  {
    "q": "Fungsi untuk perhitungan rata-rata menggunakan perintah……….",
    "opt": ["Sum", "Average", "Count", "Max", "Min"],
    "a": 1
  },
  {
    "q": "Untuk penulisan rumus jumlah di sel B2 dengan sel C2 yang benar di bawah ini adalah",
    "opt": ["+Sum(B2…C2)", "=Sum(B2:C2)", "=Sum(B2;C2)", "=Sum(B2…C2)", "=Sum(B2,C2)"],
    "a": 1
  },
  {
    "q": "Yang termasuk rumus untuk IF yang benar penulisannya adalah ……",
    "opt": ["IF(Perbandingan;Nilai jika benar,Nilai jika salah)", "=IF(Perbandingan:Nilai jika benar:Nilai jika salah)", "=IF(Perbandingan,Nilai jika benar:Nilai jika salah)", "=IF[Perbandingan;Nilai jika benar;Nilai jika salah]", "IF (SUM:AVERAGE)"],
    "a": 1
  },
  {
    "q": "Berikut ini yang tidak dapat digunakan untuk menjalankan excel adalah",
    "opt": ["Shortcut excel di desktop", "Start menu", "File excel", "Dokumen word", "Tombol power pada monitor"],
    "a": 3
  },
  {
    "q": "Untuk menampilkan toolbar dilakukan di menu",
    "opt": ["Insert", "View", "Format", "Data", "Tools"],
    "a": 2
  },
  {
    "q": "Fungsi yang digunakan untuk menghitung rata-rata data angka",
    "opt": ["Sum", "Max", "Min", "Average", "Count"],
    "a": 3
  },
  {
    "q": "Fungsi yang digunakan untuk menghitung banyak data dalam range tertentu",
    "opt": ["Count", "Large", "Small", "Rank", "Average"],
    "a": 3
  },
  {
    "q": "Baris yang digunakan untuk menampilkan informasi mengenai isi sel yang sedang aktif (disorot) di lembar kerja :",
    "opt": ["Formula bar", "Toolbar", "Scroll bar", "Menu bar", "Title bar"],
    "a": 0
  },
  {
    "q": "Untuk mengakhiri Excel dapat menekan tombol :",
    "opt": ["Alt + F4", "Ctrl + F4", "Alt + F2", "Ctrl + F2", "Shift + F4"],
    "a": 0
  },
  {
    "q": "Untuk mengedit sel, kita dapat menggunakan tombol :",
    "opt": ["F1", "F2", "F3", "F4", "F5"],
    "a": 1
  },
  {
    "q": "Yang bukan termasuk fungsi statistik di bawah ini adalah",
    "opt": ["If", "Large", "Small", "Rank", "Min"],
    "a": 3
  },
  {
    "q": "Fungsi yang digunakan untuk mengambil bagian kiri dari data teks sebanyak karakter tertentu",
    "opt": ["Left", "Right", "Mid", "Value", "Len"],
    "a": 0
  },
  {
    "q": "Untuk menghitung rata-rata dalam suatu range kita menggunakan formula…",
    "opt": ["=sum()", "=max()", "=count()", "=average()", "=min()"],
    "a": 3
  },
  {
    "q": "Microsoft Excel merupakan progran aplikasi...",
    "opt": ["Wordprosesor", "Presentasi", "Animasi", "Spreadsheet", "Database"],
    "a": 3
  },
  {
    "q": "Tombol manajemen berkas dokumen pada Microsof Office Excel berbentuk bulat dengan logo Office di tengahnya disebut .…",
    "opt": ["Excel Options", "Office Button", "Ribbon", "Tilte Bar", "Status Bar"],
    "a": 1
  },
  {
    "q": "Ikon “save”, “redo”, dan “undo” merupakan bagian menu dari ….",
    "opt": ["Ribbon", "Office Button", "Status Bar", "Quick Access Toolbar", "Title Bar"],
    "a": 3
  },
  {
    "q": "Untuk mengubah satuan ukuran di dalam Excel, digunakan perintah ….",
    "opt": ["Start–Setting–Control Panel–Regional–Currency", "Tools–Options–Print", "Office Button–Open", "Office Button–Excel Options–Advanced–Display–Ruler Units", "Insert–Symbol"],
    "a": 3
  },
  {
    "q": "Untuk memberi bingkai pada sel, menu yang harus dipilih pada kotak dialog Format Cells adalah ….",
    "opt": ["Number", "Alignment", "Borders", "Button", "Fill"],
    "a": 2
  },
  {
    "q": "Menu yang harus dipilih untuk memperlebar atau mempersempit ukuran kolom pada worksheet adalah ….",
    "opt": ["Insert Sheet Column", "Insert Sheet", "Borders", "Column Width", "Row Height"],
    "a": 3
  },
  {
    "q": "Untuk menembah garis dalam Excel, perintah yang diklik pada menu Insert adalah ….",
    "opt": ["Insert Cells", "Insert Sheet Rows", "Insert Sheet Column", "Insert Sheet", "Insert Name"],
    "a": 1
  },
  {
    "q": "Berikut merupakan tombol yang digunakan dalam memformat teks agar menjadi miring, yaitu ….",
    "opt": ["Ctrl+B", "Ctrl+I", "Ctrl+U", "Ctrl+S", "Ctrl+P"],
    "a": 1
  },
  {
    "q": "Pengertian dari range adalah….",
    "opt": ["Pertemuan antara worksheet", "Pertemuan antara workbook", "Kumpulan sel sembarang", "Kumpulan sel berbentuk persegi panjang", "Kumpulan kolom dan baris"],
    "a": 3
  },
  {
    "q": "Apa yang dimaksud dengan sel (Cell) dalam excel ?",
    "opt": ["Kumpulan dari worksheet", "Kumpulan beberapa sel", "Pertemuan antara baris dengan kolom", "Pertemuan antara sel dengan range", "Buku kerja aktif"],
    "a": 2
  },
  {
    "q": "Toolbar yang ditampilkan secara default di jendela Excel adalah toolbar…",
    "opt": ["Start", "Chart dan formatting", "Standard dan chart", "Formatting dan standard", "Drawing"],
    "a": 3
  },
  {
    "q": "Bagian Excel yang digunakan untuk menggerakkan lembaran kerja dalam arah horizontal adalah …",
    "opt": ["Kontrol lembaran", "Full screen", "Scroll bar vertical", "Scroll bar horizontal", "Task pane"],
    "a": 3
  },
  {
    "q": "Bagian jendela excel yang berfungsi untuk menampilkan alamat sel yang sedang aktif adalah",
    "opt": ["Bar rumus", "Bar nama", "Bar status", "Bar judul", "Scroll bar"],
    "a": 2
  },
  {
    "q": "Bagian excel yang digunakan untuk mengerakan lembaran kerja dalam arah horizontal adalah",
    "opt": ["Scroll bar vertical", "Scroll bar horizontal", "Control lembaran kerja", "Taks pane", "Menu bar"],
    "a": 1
  },
  {
    "q": "Tombol yang digunakan untuk menjalankan sebuah perintah disebut",
    "opt": ["Menu bar", "Toolbar", "Statusbar", "Formula bar", "Scroll bar"],
    "a": 0
  },
  {
    "q": "Perbesaran lembaran kerja diatur dengan menggunakan perintah",
    "opt": ["Customs view", "Full screen", "Zoom", "View sheets", "Page setup"],
    "a": 2
  },
  {
    "q": "Formula bar dapat diatur agar ditampilkan atau tidak ditampilkan dengan menggunakan kotak dialog options atau menu view. perintah untuk menampilkan kotak dialog options terdapat di menu",
    "opt": ["View", "Format", "Insert", "Tools", "Edit"],
    "a": 0
  },
  {
    "q": "Toolbar yang ditampilkan secara default dijendela excel adalah toolbar",
    "opt": ["Formatting dan standard", "Standard dan chart", "Chart dan formatting", "Standard", "Drawing"],
    "a": 0
  },
  {
    "q": "Bagian jendela excel yang diklik untuk menampilkan lembaran kerja yang tidak aktif adalah",
    "opt": ["Scroll bar lembaran kerja", "Tab lembaran kerja", "Control jendela lembaran kerja", "Menu bar", "Title bar"],
    "a": 1
  },
  {
    "q": "Perintah open dapat dijalankan dari menu file dan tombol open di toolbar standar. selain itu, perintah open dapat juga dijalankan dengan menekan tombol…dikeyboard.",
    "opt": ["Ctrl V", "Ctrl O", "Ctrl U", "Ctrl B", "Ctrl S"],
    "a": 1
  },
  {
    "q": "Ekstensi file standar yang dihasilkan ketika kita menyimpan dokumen menggunakan Microsoft Excel 2007 ke atas adalah ....",
    "opt": [".doc", ".xls", ".xlsx", ".ppt", ".txt"],
    "a": 2
  },
  {
    "q": "Kombinasi tombol keyboard yang digunakan untuk memotong (cut) data pada sebuah sel untuk dipindahkan ke tempat lain adalah ....",
    "opt": ["Ctrl + C", "Ctrl + V", "Ctrl + X", "Ctrl + Z", "Ctrl + P"],
    "a": 2
  },
  {
    "q": "Fungsi dalam Microsoft Excel yang digunakan untuk mencari nilai tertinggi dari sekumpulan data angka adalah ....",
    "opt": ["MAX", "MIN", "SUM", "AVERAGE", "COUNT"],
    "a": 0
  },
  {
    "q": "Fasilitas pada Excel yang digunakan untuk membuat teks yang panjang menjadi beberapa baris menyesuaikan dengan lebar kolom di dalam satu sel yang sama disebut ....",
    "opt": ["Merge Cells", "Wrap Text", "Shrink to fit", "AutoFit", "Align Text"],
    "a": 1
  },
  {
    "q": "Simbol atau operator matematika yang digunakan untuk melakukan operasi perkalian pada rumus di Microsoft Excel adalah ....",
    "opt": ["+", "-", "/", "*", "^"],
    "a": 3
  }
];

    let currentIdx = 0;
    let userAnswers = new Array(quizData.length).fill(null);
    let isReviewMode = false;

    window.onload = () => {
        renderStatus();
        showQuestion();
    };

    function renderStatus() {
        const container = document.getElementById('status-container');
        container.innerHTML = "";
        quizData.forEach((_, i) => {
            const box = document.createElement('div');
            box.innerText = i + 1;
            
            if (isReviewMode) {
                const isCorrect = userAnswers[i] === quizData[i].a;
                box.className = `num-box ${isCorrect ? 'num-correct' : 'num-wrong'}`;
            } else {
                box.className = `num-box ${userAnswers[i] !== null ? 'num-answered' : 'num-unanswered'}`;
            }
            
            if (i === currentIdx) box.classList.add('num-active');
            box.onclick = () => { currentIdx = i; showQuestion(); };
            container.appendChild(box);
        });
    }

    function showQuestion() {
        const q = quizData[currentIdx];
        document.getElementById('question-number').innerText = `Soal #${currentIdx + 1}`;
        
        // MENGUBAH innerText MENJADI innerHTML DI SINI
        document.getElementById('question-text').innerHTML = q.q;
        
        const optContainer = document.getElementById('options-container');
        optContainer.innerHTML = "";

        const labels = ['A', 'B', 'C', 'D', 'E'];
        q.opt.forEach((option, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<strong>${labels[i]}.</strong> ${option}`;
            
            if (isReviewMode) {
                btn.disabled = true;
                if (i === q.a) {
                    btn.classList.add('correct-ans');
                } 
                if (userAnswers[currentIdx] === i && i !== q.a) {
                    btn.classList.add('wrong-selected');
                }
            } else {
                if (userAnswers[currentIdx] === i) btn.classList.add('selected');
                btn.onclick = () => selectAnswer(i);
            }
            
            optContainer.appendChild(btn);
        });

        document.getElementById('prev-btn').style.visibility = currentIdx === 0 ? 'hidden' : 'visible';
        document.getElementById('next-btn').innerText = currentIdx === quizData.length - 1 ? 'Selesai' : 'Selanjutnya';
        document.getElementById('back-to-result-btn').style.display = isReviewMode ? 'block' : 'none';
        
        renderStatus();

        // Tambahan: Render ulang matematika (LaTeX) setelah konten di-update
        if (window.MathJax) {
            MathJax.typesetPromise().catch((err) => console.log(err.message));
        }
    }

    function selectAnswer(i) {
        if (isReviewMode) return;
        userAnswers[currentIdx] = i;
        showQuestion();

        setTimeout(() => {
            if (currentIdx < quizData.length - 1) {
                currentIdx++;
                showQuestion();
            }
        }, 300);
    }

    function nextQuestion() {
        if (currentIdx < quizData.length - 1) {
            currentIdx++;
            showQuestion();
        } else if (!isReviewMode) {
            showResult();
        } else {
            exitReview();
        }
    }

    function prevQuestion() {
        if (currentIdx > 0) {
            currentIdx--;
            showQuestion();
        }
    }

    function showResult() {
        const unanswered = userAnswers.filter(ans => ans === null).length;
        if (unanswered > 0 && !isReviewMode) {
            if (!confirm(`Ada ${unanswered} soal belum dijawab. Yakin ingin mengumpulkan?`)) return;
        }

        let correct = 0;
        userAnswers.forEach((ans, i) => { if (ans === quizData[i].a) correct++; });
        const finalScoreValue = Math.round((correct / quizData.length) * 100);
        
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('finish-quiz-btn').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = finalScoreValue;
        document.getElementById('stats-text').innerText = `Benar: ${correct} | Salah: ${quizData.length - correct}`;
        
        isReviewMode = true; 
        renderStatus();
    }

    function startReview() {
        currentIdx = 0; 
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        showQuestion();
    }

    function exitReview() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
    }
</script>

</body>
</html>
