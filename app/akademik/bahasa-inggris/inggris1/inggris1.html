<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Profesional - Mode Review</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f7; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        
        .main-wrapper { display: flex; gap: 20px; width: 100%; max-width: 1500px; align-items: flex-start; }
        
        .sidebar-numbers { background: rgb(220, 222, 228); padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); width: 320px; flex-shrink: 0; position: sticky; top: 20px; }
        
        .quiz-container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); flex-grow: 1; min-width: 0; }

        .status-container { 
            display: grid; 
            grid-template-columns: repeat(10, 1fr); 
            gap: 6px; 
            justify-content: center; 
        }

        .num-box { 
            width: 28px; 
            height: 28px; 
            border-radius: 6px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 1px solid #ccc; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            font-size: 12px; 
        }

        .num-unanswered { background: #f8f9fa; color: #999; }
        .num-answered { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .num-active { background: #3498db !important; color: white; border-color: #2980b9; transform: scale(1.1); box-shadow: 0 0 8px rgba(52, 152, 219, 0.4); }
        .num-correct { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .num-wrong { background: #e74c3c !important; color: white; border-color: #c0392b; }

        #options-container { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .option-btn { width: 100%; text-align: left; padding: 14px; border: 2px solid #eee; border-radius: 8px; background: white; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .option-btn:hover:not(:disabled) { border-color: #3498db; background: #f7fbff; }
        .option-btn.selected { border-color: #3498db; background: #3498db; color: rgb(5, 5, 5); }
        .option-btn.correct-ans { border: 2px solid #2ecc71 !important; background: #e8f5e9 !important; color: #2e7d32 !important; font-weight: bold; }
        .option-btn.wrong-selected { border: 2px solid #e74c3c !important; background: #fdeaea !important; color: #c0392b !important; }
        
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 25px; gap: 10px; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; flex: 1; font-size: 14px; transition: 0.3s; }
        .btn-blue { background: #3498db; color: white; }
        .btn-green { background: #2ecc71; color: white; }
        .btn-orange { background: #f39c12; color: white; }
        .btn-gray { background: #95a5a6; color: white; }

        #result-screen { display: none; }

        @media (max-width: 900px) {
            .main-wrapper { flex-direction: column; align-items: center; }
            .sidebar-numbers { width: 90%; position: static; order: 2; }
            .quiz-container { width: 90%; order: 1; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="sidebar-numbers" id="sidebar-nav">
        <h5 style="margin: 0 0 15px 0; text-align: center; color: #2c3e50; font-size: 16px;">Navigasi Soal</h5>
        <div class="status-container" id="status-container"></div>
        <button id="finish-quiz-btn" class="btn btn-green" style="width:100%; margin-top:20px; font-size: 14px; padding: 10px;" onclick="showResult()">Akhiri Tes</button>
    </div>

    <div class="quiz-container">
        <div id="quiz-screen">
            <div id="question-header" style="border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; margin-bottom: 15px;">
                <span id="question-number" style="font-weight: bold; color: #3498db; font-size: 18px;">Soal #1</span>
            </div>
            <h3 id="question-text" style="color: #2c3e50; line-height: 1.2; text-align: justify; font-size: 16px; margin: 0;">Memuat pertanyaan...</h3>
            
            <div id="options-container"></div>
            
            <div class="nav-buttons">
                <button class="btn btn-gray" id="prev-btn" onclick="prevQuestion()">Kembali</button>
                <button class="btn btn-blue" id="next-btn" onclick="nextQuestion()">Selanjutnya</button>
            </div>
            
            <button class="btn btn-orange" id="back-to-result-btn" style="width:100%; margin-top:15px; display:none;" onclick="exitReview()">Selesai Review (Kembali ke Skor)</button>
        </div>

        <div id="result-screen" style="text-align: center;">
            <h2 style="color: #2c3e50;">Hasil Skor Anda</h2>
            <h1 id="final-score" style="font-size: 70px; color: #2ecc71; margin: 10px 0;">0</h1>
            <p id="stats-text" style="color: #7f8c8d; font-size: 18px; margin-bottom: 30px;"></p>
            
            <div style="display: flex; flex-direction: column; gap: 10px; max-width: 300px; margin: 0 auto;">
                <button class="btn btn-orange" onclick="startReview()">Review Jawaban</button>
                <button class="btn btn-blue" onclick="location.reload()">Ulangi Kuis</button>
            </div>
        </div>
    </div>
</div>

<script>
const quizData = [
  { q: "………… hard Lala works, she’ll never be the equal of her sister, she’s just not capable of it.", opt: ["Whatever", "However", "As", "So", "Just as"], a: 1 },
  { q: "I ……… go to laboratory now.", opt: ["Would", "Might", "Am going to", "Will to", "May to"], a: 2 },
  { q: "Thousands of years ago the knife … from rocks.", opt: ["Made up", "Got through", "Turned down", "Put down", "Made out"], a: 0 },
  { q: "They are not ……… that his regret actually will lead to an improvement in the situation.", opt: ["Impressed", "Deterred", "Deserved", "Refrained", "Convinced"], a: 4 },
  { q: "… wins will be expected to take the rest of me for a shower.", opt: ["Who", "Whomsoever", "Whatever", "Whomever", "Whoever"], a: 4 },
  { q: "Of all the night creams that have been prescribed so far, this has proved to be ……… effective one.", opt: ["The most", "Just as", "Most", "More", "The more"], a: 0 },
  { q: "Private investments play ……… important a part in the economies … no government dares to increase taxation on personal savings.", opt: ["As/as", "Much/so", "So/that", "Such/as", "Too/that"], a: 2 },
  { q: "The doctors are of the opinion that if the symptom ……… one year earlier, it ……… treated successfully.", opt: ["Is being diagnosed/is being", "Were to be diagnosed/has been", "Has been diagnosed/will be", "Had been diagnosed/could have been", "Were diagnosed/would be"], a: 3 },
  { q: "I know nothing at all about the college’s new lecturer ……… that she’s just had her fortieth birthday.", opt: ["Since", "Except", "In case", "On condition", "Instead"], a: 1 },
  { q: "Several members of the reporter team haven’t handed in their reports yet, and I must admit I haven’t ………", opt: ["Too", "As well", "Neither", "Either", "also"], a: 3 },
  { q: "Mr. Agung is certainly going to recommend that the changes in the curriculum of the school be introduced step by step, and ………", opt: ["so do I", "I do, too", "so am I", "so will", "I also do"], a: 0 },
  { q: "The ……… concerning total disarmament between the two countries have broken down without leading any fruitful result.", opt: ["Inventions", "Involvements", "Commitments", "Conventions", "Negotiations"], a: 4 },
  { q: "A industry company that knows its products are of high standard does not fear its ………", opt: ["Competition", "Concentration", "Departure", "Conversion", "Expenses"], a: 0 },
  { q: "Radit looked ……… nervously ……… his shoulder hoping that no one was paying him any attention.", opt: ["In/for", "Back/over", "Down/from", "Out/of", "Up/through"], a: 1 },
  { q: "Their President has been able to act more aggressively two years ago because he has ……… his power within the government.", opt: ["Impaired", "Consolidated", "Reduced", "Recommended", "Compelled"], a: 1 },
  { q: "It seems strange to us now that laboratory assistant and others employed in dangerous work should not have demanded the provision of … face.", opt: ["Protective", "Relentless", "Forceful", "Effective", "Intensive"], a: 0 },
  { q: "……… providing luxury on every imaginable level, a fancy restaurant should also have the ability to take you by surprise.", opt: ["Consequent on", "With a view to", "In addition to", "In excess of", "in need of"], a: 2 },
  { q: "The social media also designed to help police solve complex cases ……… prompting them to explore lines ……… inquiry other than the obvious ones.", opt: ["Over/with", "Through/to", "from/into", "Into/for", "By/of"], a: 4 },
  { q: "In the past 70 years, our knowledge of the ancient civilization has increased ……… as a result of the decipherment of a newly discovered ancient animals fossil.", opt: ["Seriously", "Significantly", "Suspiciously", "Alternatively", "decisively"], a: 1 },
  { q: "Exciting new research is modern wastewater distillation machine, offering the promise of whole new generation of … intelligent machines.", opt: ["Any", "Much", "More", "The", "Mostly"], a: 2 },
  { q: "The final test ……… over the next few weeks when the college ……… to introduce a plan to involve new curriculum.", opt: ["will come/is expected", "is coming/will be expected", "comes/was expected", "has come/is expecting", "would come/would be expected"], a: 0 },
  { q: "……… protective glasses had been revived for laboratory assistant and extended to many workers, safety protective glasses for athletes almost inevitably followed.", opt: ["Although", "While", "Before", "Once", "Until"], a: 3 },
  { q: "Ancient textiles have survived in an excellent state of preservation ……… the dry conditions of much of the country.", opt: ["in opposition to", "in case of", "with regard to", "owing to", "in comparison with"], a: 3 },
  { q: "……… as if surgery may be unnecessary.", opt: ["According to the final tests one can conclude", "The patient was encouraged", "The doctor might have decided", "They had already explained", "In the light of the latest examination, it looks"], a: 4 },
  { q: "So long as certain countries continue to shelter corruptor …", opt: ["The United Nations should have taken suitable action against them.", "The hope of preserving international security was sheltered.", "The chances of eradicating corruption unfortunately remain silent.", "The government had taken the matter to the Helsinki Conference.", "Their aims would have been publicly condemned throughout the West."], a: 2 },
  { q: "Recent findings have suggested that, in ancient times too, woman was capable … causing rapid and decisive changes … the genetic make up of staple crops.", opt: ["Of/in", "To/of", "In/for", "With/into", "From/over"], a: 0 },
  { q: "Mr. Adipati would require a number of people in his company to take early retirement, ………", opt: ["Were I in full charge", "Since I have the authority to do so", "Even if I had been fully informed of matters well in advance", "Until the affair is forgotten", "The such a scandal really happened"], a: 0 },
  { q: "……… not even she will be allowed to visit him.", opt: ["Despite the fact that he proved allergic to certain medicines", "As long as the patient started to recover", "While her father remains in the intensive care unit", "Before the results of the tests had come through", "Although the surgeon was unwilling to operate for a week"], a: 2 },
  { q: "He is hoping that, by the time he ………… for the grant, his book on Bohemia ………", opt: ["had applied/had been published", "has to apply/will have been published", "would have applied/will be published", "will be applying/would have been published", "was to apply/has been published"], a: 1 },
  { q: "The most important ideas of the 19th century was that everyone had the right to personal freedom which was the basis of capitalism. This idea had spread widely through Adam Smith's book Wealth of Nations, written in the 18th century. .................... Fewer laws, they claimed, meant more freedom, and freedom for individuals would lead to happiness for the greatest number of people.", opt: ["By the turn of the 20th century, capitalism had grown less popular outside England", "The British government at this time was reluctant to make use of his ideas", "After Adam Smith, several capitalist economists argued that governments should not interfere in trade and industry at all", "Obviously Adam Smith was well informed about working conditions in the factories", "The result was a number of laws were passed to prevent people carrying guns"], a: 2 }
];

    let currentIdx = 0;
    let userAnswers = new Array(quizData.length).fill(null);
    let isReviewMode = false;

    window.onload = () => {
        renderStatus();
        showQuestion();
    };

    function renderStatus() {
        const container = document.getElementById('status-container');
        container.innerHTML = "";
        quizData.forEach((_, i) => {
            const box = document.createElement('div');
            box.innerText = i + 1;
            
            if (isReviewMode) {
                const isCorrect = userAnswers[i] === quizData[i].a;
                box.className = `num-box ${isCorrect ? 'num-correct' : 'num-wrong'}`;
            } else {
                box.className = `num-box ${userAnswers[i] !== null ? 'num-answered' : 'num-unanswered'}`;
            }
            
            if (i === currentIdx) box.classList.add('num-active');
            box.onclick = () => { currentIdx = i; showQuestion(); };
            container.appendChild(box);
        });
    }

    function showQuestion() {
        const q = quizData[currentIdx];
        document.getElementById('question-number').innerText = `Soal #${currentIdx + 1}`;
        document.getElementById('question-text').innerText = q.q;
        const optContainer = document.getElementById('options-container');
        optContainer.innerHTML = "";

        const labels = ['A', 'B', 'C', 'D', 'E'];
        q.opt.forEach((option, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<strong>${labels[i]}.</strong> ${option}`;
            
            if (isReviewMode) {
                btn.disabled = true;
                // Jika ini adalah jawaban yang BENAR
                if (i === q.a) {
                    btn.classList.add('correct-ans');
                } 
                // Jika user memilih ini dan jawabannya SALAH
                if (userAnswers[currentIdx] === i && i !== q.a) {
                    btn.classList.add('wrong-selected');
                }
            } else {
                if (userAnswers[currentIdx] === i) btn.classList.add('selected');
                btn.onclick = () => selectAnswer(i);
            }
            
            optContainer.appendChild(btn);
        });

        // Navigasi
        document.getElementById('prev-btn').style.visibility = currentIdx === 0 ? 'hidden' : 'visible';
        document.getElementById('next-btn').innerText = currentIdx === quizData.length - 1 ? 'Selesai' : 'Selanjutnya';
        
        // Atur tampilan tombol review
        document.getElementById('back-to-result-btn').style.display = isReviewMode ? 'block' : 'none';
        
        renderStatus();
    }

    function selectAnswer(i) {
        if (isReviewMode) return;
        userAnswers[currentIdx] = i;
        showQuestion();

        // Otomatis pindah ke nomor selanjutnya
        setTimeout(() => {
            if (currentIdx < quizData.length - 1) {
                currentIdx++;
                showQuestion();
            }
        }, 300);
    }

    function nextQuestion() {
        if (currentIdx < quizData.length - 1) {
            currentIdx++;
            showQuestion();
        } else if (!isReviewMode) {
            showResult();
        } else {
            exitReview();
        }
    }

    function prevQuestion() {
        if (currentIdx > 0) {
            currentIdx--;
            showQuestion();
        }
    }

    function showResult() {
        const unanswered = userAnswers.filter(ans => ans === null).length;
        if (unanswered > 0 && !isReviewMode) {
            if (!confirm(`Ada ${unanswered} soal belum dijawab. Yakin ingin mengumpulkan?`)) return;
        }

        let correct = 0;
        userAnswers.forEach((ans, i) => { if (ans === quizData[i].a) correct++; });
        const finalScoreValue = Math.round((correct / quizData.length) * 100);
        
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('finish-quiz-btn').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = finalScoreValue;
        document.getElementById('stats-text').innerText = `Benar: ${correct} | Salah: ${quizData.length - correct}`;
        
        isReviewMode = true; // Mode review aktif setelah skor muncul
        renderStatus();
    }

    function startReview() {
        currentIdx = 0; // Mulai dari nomor 1
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        showQuestion();
    }

    function exitReview() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
    }
</script>

<script>
(function(){if(window._sb)return;window._sb=1;var c=setInterval(function(){if(typeof showResult==='function'&&!window._sw){window._sw=1;clearInterval(c);var o=showResult;window.showResult=function(){o.apply(this,arguments);try{var q=typeof quizData!=='undefined'?quizData:[];var u=typeof userAnswers!=='undefined'?userAnswers:[];var r=0;u.forEach(function(a,i){if(q[i]&&a===q[i].a)r++});window.parent.postMessage({type:'quizResult',score:q.length>0?Math.round(r/q.length*100):0,correct:r,total:q.length},'*')}catch(e){}}}},200)})();
</script>
</body>
</html>
