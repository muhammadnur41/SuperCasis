<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Profesional - Mode Review</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f7; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        
        .main-wrapper { display: flex; gap: 20px; width: 100%; max-width: 1500px; align-items: flex-start; }
        
        .sidebar-numbers { background: rgb(220, 222, 228); padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); width: 320px; flex-shrink: 0; position: sticky; top: 20px; }
        
        .quiz-container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); flex-grow: 1; min-width: 0; }

        .status-container { 
            display: grid; 
            grid-template-columns: repeat(10, 1fr); 
            gap: 6px; 
            justify-content: center; 
        }

        .num-box { 
            width: 28px; 
            height: 28px; 
            border-radius: 6px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 1px solid #ccc; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            font-size: 12px; 
        }

        .num-unanswered { background: #f8f9fa; color: #999; }
        .num-answered { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .num-active { background: #3498db !important; color: white; border-color: #2980b9; transform: scale(1.1); box-shadow: 0 0 8px rgba(52, 152, 219, 0.4); }
        .num-correct { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .num-wrong { background: #e74c3c !important; color: white; border-color: #c0392b; }

        #options-container { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .option-btn { width: 100%; text-align: left; padding: 14px; border: 2px solid #eee; border-radius: 8px; background: white; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .option-btn:hover:not(:disabled) { border-color: #3498db; background: #f7fbff; }
        .option-btn.selected { border-color: #3498db; background: #3498db; color: rgb(5, 5, 5); }
        .option-btn.correct-ans { border: 2px solid #2ecc71 !important; background: #e8f5e9 !important; color: #2e7d32 !important; font-weight: bold; }
        .option-btn.wrong-selected { border: 2px solid #e74c3c !important; background: #fdeaea !important; color: #c0392b !important; }
        
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 25px; gap: 10px; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; flex: 1; font-size: 14px; transition: 0.3s; }
        .btn-blue { background: #3498db; color: white; }
        .btn-green { background: #2ecc71; color: white; }
        .btn-orange { background: #f39c12; color: white; }
        .btn-gray { background: #95a5a6; color: white; }

        #result-screen { display: none; }

        @media (max-width: 900px) {
            .main-wrapper { flex-direction: column; align-items: center; }
            .sidebar-numbers { width: 90%; position: static; order: 2; }
            .quiz-container { width: 90%; order: 1; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="sidebar-numbers" id="sidebar-nav">
        <h5 style="margin: 0 0 15px 0; text-align: center; color: #2c3e50; font-size: 16px;">Navigasi Soal</h5>
        <div class="status-container" id="status-container"></div>
        <button id="finish-quiz-btn" class="btn btn-green" style="width:100%; margin-top:20px; font-size: 14px; padding: 10px;" onclick="showResult()">Akhiri Tes</button>
    </div>

    <div class="quiz-container">
        <div id="quiz-screen">
            <div id="question-header" style="border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; margin-bottom: 15px;">
                <span id="question-number" style="font-weight: bold; color: #3498db; font-size: 18px;">Soal #1</span>
            </div>
            <h3 id="question-text" style="color: #2c3e50; line-height: 1.2; text-align: justify; font-size: 16px; margin: 0;">Memuat pertanyaan...</h3>
            
            <div id="options-container"></div>
            
            <div class="nav-buttons">
                <button class="btn btn-gray" id="prev-btn" onclick="prevQuestion()">Kembali</button>
                <button class="btn btn-blue" id="next-btn" onclick="nextQuestion()">Selanjutnya</button>
            </div>
            
            <button class="btn btn-orange" id="back-to-result-btn" style="width:100%; margin-top:15px; display:none;" onclick="exitReview()">Selesai Review (Kembali ke Skor)</button>
        </div>

        <div id="result-screen" style="text-align: center;">
            <h2 style="color: #2c3e50;">Hasil Skor Anda</h2>
            <h1 id="final-score" style="font-size: 70px; color: #2ecc71; margin: 10px 0;">0</h1>
            <p id="stats-text" style="color: #7f8c8d; font-size: 18px; margin-bottom: 30px;"></p>
            
            <div style="display: flex; flex-direction: column; gap: 10px; max-width: 300px; margin: 0 auto;">
                <button class="btn btn-orange" onclick="startReview()">Review Jawaban</button>
                <button class="btn btn-blue" onclick="location.reload()">Ulangi Kuis</button>
            </div>
        </div>
    </div>
</div>

<script>
const quizData = [
  // C. Numerik (Soal 326-350)
  { q: "75% dari 80 adalah ...", opt: ["40", "50", "55", "60", "65"], a: 3 },
  { q: "Operasi penjumlahan di bawah ini yang hasilnya 416 yaitu...", opt: ["174+342", "288+228", "297+119", "226+290", "216+190"], a: 2 },
  { q: "Sebuah toko memberikan diskon 15% untuk semua barang. Jika harga semula Rp80.000,00, berapa diskon yang diperoleh?", opt: ["Rp10.000,00", "Rp12.000,00", "Rp15.000,00", "Rp18.000,00", "Rp20.000,00"], a: 1 },
  { q: "Seorang petani memiliki 120 kg padi. Ia menjual ¾ bagian. Berapa kg padi yang dijual?", opt: ["60 kg", "75 kg", "80 kg", "90 kg", "100 kg"], a: 3 },
  { q: "Umur Budi 12 tahun, umur Dodi 15 tahun. Berapa perbandingan umur Budi dan Dodi?", opt: ["3 : 4", "4 : 5", "2 : 3", "3 : 5", "4 : 3"], a: 1 },
  { q: "Sebuah motor menghabiskan 3 liter bensin untuk menempuh 60 km. Berapa konsumsi bensin per km?", opt: ["0,02 liter/km", "0,03 liter/km", "0,04 liter/km", "0,05 liter/km", "0,06 liter/km"], a: 3 },
  { q: "Sebuah toko menjual 1 lusin pensil seharga Rp36.000,00. Berapa harga 1 pensil?", opt: ["Rp2.000,00", "Rp2.500,00", "Rp3.000,00", "Rp3.500,00", "Rp4.000,00"], a: 2 },
  { q: "Perbandingan panjang dan lebar persegi panjang 5 : 2. Jika panjang 15 cm, berapa lebar?", opt: ["4 cm", "5 cm", "6 cm", "7 cm", "8 cm"], a: 2 },
  { q: "Ibu membeli 2,5 kg telur. Digunakan 1,2 kg. Berapa sisa telur?", opt: ["1,1 kg", "1,2 kg", "1,3 kg", "1,4 kg", "1,5 kg"], a: 2 },
  { q: "Seorang pedagang membeli 50 kg beras dengan harga Rp500.000,00. Ia menjual dengan harga Rp12.000,00 per kg. Berapa keuntungan?", opt: ["Rp50.000,00", "Rp75.000,00", "Rp100.000,00", "Rp125.000,00", "Rp150.000,00"], a: 2 },
  { q: "Sebuah bus berisi 40 penumpang. 35% penumpang turun di halte pertama. Berapa penumpang yang turun?", opt: ["12", "13", "14", "15", "16"], a: 2 },
  { q: "Jarak kota P ke Q 150 km. Jika ditempuh dengan kecepatan 75 km/jam, berapa waktu tempuh?", opt: ["1 jam", "1,5 jam", "2 jam", "2,5 jam", "3 jam"], a: 2 },
  { q: "Ibu memiliki 850 gram gula. Digunakan untuk donat 485 gram. Sisanya untuk kue lapis, tapi kurang sehingga Ibu membeli lagi 140 gram. Berapa banyak gula yang digunakan untuk kue lapis?", opt: ["365 gram", "505 gram", "225 gram", "485 gram", "625 gram"], a: 1 },
  { q: "³⁄₁₀ + ⅖ = ...", opt: ["⅕", "⅖", "⅗", "⅘", "⁷⁄₁₀"], a: 4 },
  { q: "Sebuah toko menjual tas dengan harga Rp250.000,00 setelah diskon 20%. Berapa harga sebelum diskon?", opt: ["Rp300.000,00", "Rp310.000,00", "Rp312.500,00", "Rp315.000,00", "Rp320.000,00"], a: 2 },
  { q: "Sebuah kolam berisi 1.500 liter air. Jika dikuras dengan debit 50 liter/menit, berapa waktu yang diperlukan?", opt: ["20 menit", "25 menit", "30 menit", "35 menit", "40 menit"], a: 2 },
  { q: "Perbandingan umur ibu dan anak 7 : 2. Jika umur anak 10 tahun, berapa umur ibu?", opt: ["30 tahun", "32 tahun", "33 tahun", "34 tahun", "35 tahun"], a: 4 },
  { q: "Sebuah mobil menghabiskan 5 liter bensin untuk menempuh 40 km. Berapa km yang ditempuh per liter?", opt: ["6 km", "7 km", "8 km", "9 km", "10 km"], a: 2 },
  { q: "Seorang anak memiliki 30 permen. Ia memberikan 40% kepada adiknya. Berapa permen yang diberikan?", opt: ["10", "11", "12", "13", "14"], a: 2 },
  { q: "¼ : ½ = ...", opt: ["⅛", "¼", "½", "2", "4"], a: 2 },
  { q: "Perbandingan uang Ani dan Ina 3 : 5. Jumlah uang mereka Rp80.000,00. Berapa uang Ani?", opt: ["Rp20.000,00", "Rp25.000,00", "Rp30.000,00", "Rp35.000,00", "Rp40.000,00"], a: 2 },
  { q: "2,5 × 0,4 = ...", opt: ["0,1", "1", "1,5", "2", "2,5"], a: 1 },
  { q: "Sebuah toko memberikan diskon 5% untuk pembelian di atas Rp100.000,00. Jika membeli barang Rp150.000,00, berapa yang harus dibayar?", opt: ["Rp140.000,00", "Rp141.000,00", "Rp142.000,00", "Rp142.500,00", "Rp145.000,00"], a: 3 },
  { q: "Sebuah truk mengangkut 2,5 kuintal beras. Berapa kg beras tersebut?", opt: ["200 kg", "225 kg", "240 kg", "250 kg", "275 kg"], a: 3 },
  { q: "Dari sekelompok anak terdapat 20 anak gemar voli, 28 anak gemar basket, dan 27 anak gemar pingpong, 13 anak gemar voli dan basket, 11 anak gemar basket dan pingpong, 9 anak gemar voli dan pingpong, serta 5 anak gemar ketiga-tiganya. Jika dalam kelompok tersebut ada 55 anak, banyak anak yang tidak gemar satu pun dari ketiga jenis permainan tersebut adalah ....", opt: ["8 anak", "13 anak", "15 anak", "18 anak", "20 anak"], a: 0 },

  // A. Deret Angka dan Huruf (Soal 301-310)
  { q: "4, 6, 9, 12, 16, 20, 24, 29, ..., ..., ...", opt: ["39, 44, 49", "36, 41, 46", "34, 39, 44", "31, 36, 41", "33, 38, 43"], a: 2 },
  { q: "30, 4, 6, 25, 5, 9, 20, ..., ...", opt: ["6, 12", "7, 15", "8, 13", "9, 15", "10, 14"], a: 0 },
  { q: "10, 13, 16, 8, 11, 14, ..., ..., 12", opt: ["5, 9", "6, 9", "7, 9", "8, 9", "4, 8"], a: 1 },
  { q: "96, 8, 48, 16, 16, 32, 4, ...", opt: ["61", "62", "63", "64", "65"], a: 3 },
  { q: "1, 2, 2, 3, 4, 12, 5, 6, 30, 7, ..., ...", opt: ["8, 56", "9, 63", "8, 54", "9, 64", "10, 72"], a: 0 },
  { q: "1, 4, 9, 16, 25, ..., ...", opt: ["36, 46", "38, 49", "36, 49", "38, 46", "40, 55"], a: 2 },
  { q: "3, 6, 18, 72, ...", opt: ["240", "300", "320", "360", "400"], a: 3 },
  { q: "13, 25, 99, 26, 38, 79, 39, ..., ...", opt: ["50, 60", "51, 59", "52, 58", "53, 57", "54, 56"], a: 1 },
  { q: "3, 5, 7, 6, 10, 14, ..., ..., ...", opt: ["8, 16, 20", "9, 15, 21", "8, 18, 24", "9, 20, 28", "10, 22, 30"], a: 1 },
  { q: "6, 12, 9, 15, 12, 18, ..., 21", opt: ["13", "14", "15", "16", "17"], a: 2 },

  // B. Aljabar (Soal 311-325)
  { q: "Andi memiliki 20 kelereng. 25% dari kelerengnya berwarna merah. Berapa jumlah kelereng merah Andi?", opt: ["2", "4", "5", "8", "10"], a: 2 },
  { q: "Umur Ayah : umur Budi = 5 : 1. Jika umur Budi 8 tahun, berapa umur Ayah?", opt: ["24 tahun", "30 tahun", "32 tahun", "40 tahun", "45 tahun"], a: 3 },
  { q: "Sebuah truk mengangkut 3 ton beras. Berapa kg beras yang diangkut?", opt: ["300 kg", "3.000 kg", "30 kg", "30.000 kg", "3 kg"], a: 1 },
  { q: "Harga sebuah buku Rp12.000,00. Jika mendapat diskon 10%, berapa yang harus dibayar?", opt: ["Rp10.000,00", "Rp10.200,00", "Rp10.800,00", "Rp11.000,00", "Rp11.200,00"], a: 2 },
  { q: "Jarak kota A ke B 120 km. Jika ditempuh dengan kecepatan 60 km/jam, berapa waktu tempuh?", opt: ["1 jam", "1,5 jam", "2 jam", "2,5 jam", "3 jam"], a: 2 },
  { q: "15% dari 200 adalah ...", opt: ["15", "20", "25", "30", "35"], a: 3 },
  { q: "Perbandingan usia Rina dan Rani 2 : 3. Jika usia Rina 12 tahun, berapa usia Rani?", opt: ["16 tahun", "18 tahun", "20 tahun", "24 tahun", "30 tahun"], a: 1 },
  { q: "Sebuah botol berisi 1,5 liter air. Jika diminum 0,75 liter, berapa sisa air?", opt: ["0,5 liter", "0,65 liter", "0,75 liter", "0,8 liter", "1 liter"], a: 2 },
  { q: "½ + ⅓ = ...", opt: ["⅖", "⅔", "¾", "⅚", "1"], a: 3 },
  { q: "Harga sepatu Rp150.000,00 dengan diskon 20%. Berapa harga setelah diskon?", opt: ["Rp100.000,00", "Rp110.000,00", "Rp120.000,00", "Rp125.000,00", "Rp130.000,00"], a: 2 },
  { q: "Perbandingan berat badan Dedi dan Eko 3 : 4. Jika berat Dedi 36 kg, berapa berat Eko?", opt: ["42 kg", "45 kg", "48 kg", "50 kg", "52 kg"], a: 2 },
  { q: "Sebuah mobil melaju 80 km dalam 2 jam. Berapa kecepatannya?", opt: ["30 km/jam", "35 km/jam", "40 km/jam", "45 km/jam", "50 km/jam"], a: 2 },
  { q: "Ibu membeli 2 kg apel dan 3 kg jeruk. Jika harga apel Rp20.000/kg dan jeruk Rp15.000/kg, berapa total belanja?", opt: ["Rp75.000,00", "Rp80.000,00", "Rp85.000,00", "Rp90.000,00", "Rp95.000,00"], a: 2 },
  { q: "Sebuah kelas memiliki 40 siswa. 60% adalah laki-laki. Berapa jumlah siswa perempuan?", opt: ["16", "18", "20", "22", "24"], a: 0 },
  { q: "Jarak rumah Andi ke sekolah 2 km. Jika setiap hari Andi pergi dan pulang, berapa jarak tempuh dalam seminggu (6 hari)?", opt: ["12 km", "18 km", "20 km", "24 km", "30 km"], a: 3 }
];

    let currentIdx = 0;
    let userAnswers = new Array(quizData.length).fill(null);
    let isReviewMode = false;

    window.onload = () => {
        renderStatus();
        showQuestion();
    };

    function renderStatus() {
        const container = document.getElementById('status-container');
        container.innerHTML = "";
        quizData.forEach((_, i) => {
            const box = document.createElement('div');
            box.innerText = i + 1;
            
            if (isReviewMode) {
                const isCorrect = userAnswers[i] === quizData[i].a;
                box.className = `num-box ${isCorrect ? 'num-correct' : 'num-wrong'}`;
            } else {
                box.className = `num-box ${userAnswers[i] !== null ? 'num-answered' : 'num-unanswered'}`;
            }
            
            if (i === currentIdx) box.classList.add('num-active');
            box.onclick = () => { currentIdx = i; showQuestion(); };
            container.appendChild(box);
        });
    }

    function showQuestion() {
        const q = quizData[currentIdx];
        document.getElementById('question-number').innerText = `Soal #${currentIdx + 1}`;
        document.getElementById('question-text').innerText = q.q;
        const optContainer = document.getElementById('options-container');
        optContainer.innerHTML = "";

        const labels = ['A', 'B', 'C', 'D', 'E'];
        q.opt.forEach((option, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<strong>${labels[i]}.</strong> ${option}`;
            
            if (isReviewMode) {
                btn.disabled = true;
                // Jika ini adalah jawaban yang BENAR
                if (i === q.a) {
                    btn.classList.add('correct-ans');
                } 
                // Jika user memilih ini dan jawabannya SALAH
                if (userAnswers[currentIdx] === i && i !== q.a) {
                    btn.classList.add('wrong-selected');
                }
            } else {
                if (userAnswers[currentIdx] === i) btn.classList.add('selected');
                btn.onclick = () => selectAnswer(i);
            }
            
            optContainer.appendChild(btn);
        });

        // Navigasi
        document.getElementById('prev-btn').style.visibility = currentIdx === 0 ? 'hidden' : 'visible';
        document.getElementById('next-btn').innerText = currentIdx === quizData.length - 1 ? 'Selesai' : 'Selanjutnya';
        
        // Atur tampilan tombol review
        document.getElementById('back-to-result-btn').style.display = isReviewMode ? 'block' : 'none';
        
        renderStatus();
    }

    function selectAnswer(i) {
        if (isReviewMode) return;
        userAnswers[currentIdx] = i;
        showQuestion();

        // Otomatis pindah ke nomor selanjutnya
        setTimeout(() => {
            if (currentIdx < quizData.length - 1) {
                currentIdx++;
                showQuestion();
            }
        }, 300);
    }

    function nextQuestion() {
        if (currentIdx < quizData.length - 1) {
            currentIdx++;
            showQuestion();
        } else if (!isReviewMode) {
            showResult();
        } else {
            exitReview();
        }
    }

    function prevQuestion() {
        if (currentIdx > 0) {
            currentIdx--;
            showQuestion();
        }
    }

    function showResult() {
        const unanswered = userAnswers.filter(ans => ans === null).length;
        if (unanswered > 0 && !isReviewMode) {
            if (!confirm(`Ada ${unanswered} soal belum dijawab. Yakin ingin mengumpulkan?`)) return;
        }

        let correct = 0;
        userAnswers.forEach((ans, i) => { if (ans === quizData[i].a) correct++; });
        const finalScoreValue = Math.round((correct / quizData.length) * 100);
        
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('finish-quiz-btn').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = finalScoreValue;
        document.getElementById('stats-text').innerText = `Benar: ${correct} | Salah: ${quizData.length - correct}`;
        
        isReviewMode = true; // Mode review aktif setelah skor muncul
        renderStatus();
    }

    function startReview() {
        currentIdx = 0; // Mulai dari nomor 1
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        showQuestion();
    }

    function exitReview() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
    }
</script>

<script>
(function(){if(window._sb)return;window._sb=1;var c=setInterval(function(){if(typeof showResult==='function'&&!window._sw){window._sw=1;clearInterval(c);var o=showResult;window.showResult=function(){o.apply(this,arguments);try{var q=typeof quizData!=='undefined'?quizData:[];var u=typeof userAnswers!=='undefined'?userAnswers:[];var r=0;u.forEach(function(a,i){if(q[i]&&a===q[i].a)r++});window.parent.postMessage({type:'quizResult',score:q.length>0?Math.round(r/q.length*100):0,correct:r,total:q.length},'*')}catch(e){}}}},200)})();
</script>
</body>
</html>
