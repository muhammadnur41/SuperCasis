<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Profesional - Mode Review</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f7; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        
        .main-wrapper { display: flex; gap: 20px; width: 100%; max-width: 1500px; align-items: flex-start; }
        
        .sidebar-numbers { background: rgb(220, 222, 228); padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); width: 320px; flex-shrink: 0; position: sticky; top: 20px; }
        
        .quiz-container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); flex-grow: 1; min-width: 0; }

        .status-container { 
            display: grid; 
            grid-template-columns: repeat(10, 1fr); 
            gap: 6px; 
            justify-content: center; 
        }

        .num-box { 
            width: 28px; 
            height: 28px; 
            border-radius: 6px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 1px solid #ccc; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            font-size: 12px; 
        }

        .num-unanswered { background: #f8f9fa; color: #999; }
        .num-answered { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .num-active { background: #3498db !important; color: white; border-color: #2980b9; transform: scale(1.1); box-shadow: 0 0 8px rgba(52, 152, 219, 0.4); }
        .num-correct { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .num-wrong { background: #e74c3c !important; color: white; border-color: #c0392b; }

        #options-container { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .option-btn { width: 100%; text-align: left; padding: 14px; border: 2px solid #eee; border-radius: 8px; background: white; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .option-btn:hover:not(:disabled) { border-color: #3498db; background: #f7fbff; }
        .option-btn.selected { border-color: #3498db; background: #3498db; color: rgb(5, 5, 5); }
        .option-btn.correct-ans { border: 2px solid #2ecc71 !important; background: #e8f5e9 !important; color: #2e7d32 !important; font-weight: bold; }
        .option-btn.wrong-selected { border: 2px solid #e74c3c !important; background: #fdeaea !important; color: #c0392b !important; }
        
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 25px; gap: 10px; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; flex: 1; font-size: 14px; transition: 0.3s; }
        .btn-blue { background: #3498db; color: white; }
        .btn-green { background: #2ecc71; color: white; }
        .btn-orange { background: #f39c12; color: white; }
        .btn-gray { background: #95a5a6; color: white; }

        #result-screen { display: none; }

        @media (max-width: 900px) {
            .main-wrapper { flex-direction: column; align-items: center; }
            .sidebar-numbers { width: 90%; position: static; order: 2; }
            .quiz-container { width: 90%; order: 1; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="sidebar-numbers" id="sidebar-nav">
        <h5 style="margin: 0 0 15px 0; text-align: center; color: #2c3e50; font-size: 16px;">Navigasi Soal</h5>
        <div class="status-container" id="status-container"></div>
        <button id="finish-quiz-btn" class="btn btn-green" style="width:100%; margin-top:20px; font-size: 14px; padding: 10px;" onclick="showResult()">Akhiri Tes</button>
    </div>

    <div class="quiz-container">
        <div id="quiz-screen">
            <div id="question-header" style="border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; margin-bottom: 15px;">
                <span id="question-number" style="font-weight: bold; color: #3498db; font-size: 18px;">Soal #1</span>
            </div>
            <h3 id="question-text" style="color: #2c3e50; line-height: 1.2; text-align: justify; font-size: 16px; margin: 0;">Memuat pertanyaan...</h3>
            
            <div id="options-container"></div>
            
            <div class="nav-buttons">
                <button class="btn btn-gray" id="prev-btn" onclick="prevQuestion()">Kembali</button>
                <button class="btn btn-blue" id="next-btn" onclick="nextQuestion()">Selanjutnya</button>
            </div>
            
            <button class="btn btn-orange" id="back-to-result-btn" style="width:100%; margin-top:15px; display:none;" onclick="exitReview()">Selesai Review (Kembali ke Skor)</button>
        </div>

        <div id="result-screen" style="text-align: center;">
            <h2 style="color: #2c3e50;">Hasil Skor Anda</h2>
            <h1 id="final-score" style="font-size: 70px; color: #2ecc71; margin: 10px 0;">0</h1>
            <p id="stats-text" style="color: #7f8c8d; font-size: 18px; margin-bottom: 30px;"></p>
            
            <div style="display: flex; flex-direction: column; gap: 10px; max-width: 300px; margin: 0 auto;">
                <button class="btn btn-orange" onclick="startReview()">Review Jawaban</button>
                <button class="btn btn-blue" onclick="location.reload()">Ulangi Kuis</button>
            </div>
        </div>
    </div>
</div>

<script>
const quizData = [
  { q: "3, 9, 12, 36, 48, 144, ..., ...", opt: ["192 dan 576", "128 dan 676", "132 dan 576", "80 dan 372"], a: 0 },
  { q: "0, 3, 9, 18, 30, ...", opt: ["53", "45", "55", "35"], a: 1 },
  { q: "8, 6, 20, 18, 32, 54, 44, ...", opt: ["132", "165", "150", "162"], a: 3 },
  { q: "60, 56, 52, 104, 100, ..., 192", opt: ["96", "75", "150", "187"], a: 0 },
  { q: "8, 4, 0, 1, 9, 5, 1, 2.....", opt: ["9", "10", "11", "12"], a: 1 },
  { q: "3, 4, 7, 11, 18, 29, 47.....", opt: ["96", "94", "76", "58"], a: 2 },
  { q: "1000, 200, 40....", opt: ["6", "8", "10", "15"], a: 1 },
  { q: "303, 212, 515, -303, 212, -515, -303, -212..., .....", opt: ["-303 dan 515", "303 dan 515", "-515 dan -303", "-515 dan 303"], a: 3 },
  { q: "2, 1, ½, 1/4, ...", opt: ["1/3", "1/4", "3/16", "2/16"], a: 3 },
  { q: "4, 4, 7, 5, 4, 5, 8, 6, 4, ..., ...", opt: ["5 dan 9", "6 dan 9", "6 dan 8", "6 dan 6"], a: 1 },
  { q: "64, 60, 55, 49, 42, 34, ..., ...", opt: ["55 dan 25", "45 dan 20", "25 dan 15", "35 dan 45"], a: 2 },
  { q: "Urutan pecahan berikut dari yang terkecil adalah ....", opt: ["30%; 1/8; 0,25; 2/6; 0,5", "1/8; 0,25; 30%; 2/6; 0,5", "1/8; 30%; 2/6; 0,5; 0,25", "0,25; 1/8; 2/6; 30%; 0,5"], a: 0 },
  { q: "KPK dan FPB dari 18, 36, dan 45 adalah ....", opt: ["30 dan 3", "60 dan 6", "150 dan 9", "180 dan 9"], a: 3 },
  { q: "Hasil dari 3/4 + 1 1/2 – (4 × 0,3) = ....", opt: ["1 1/20", "1 1/8", "3 9/20", "5 2/3"], a: 2 },
  { q: "Jumlah dua bilangan adalah 30 sedangkan 3 kali bilangan pertama ditambah dengan bilangan kedua ternyata hasilnya 44. Selisih kedua bilangan tersebut adalah ....", opt: ["16", "14", "12", "10"], a: 2 },
  { q: "Enam barang dari pabrik A dan 4 barang pabrik B harganya Rp68.000,00 sedangkan 10 barang dari pabrik B dan tiga barang dari pabrik A harganya Rp98.000,00. Jika Pak Rahmat akan membeli 5 barang dari pabrik A dan 2 barang dari pabrik B, Pak Rahmat harus membayar sebesar ....", opt: ["Rp26.000,00", "Rp36.000,00", "Rp46.000,00", "Rp56.000,00"], a: 2 },
  { q: "Bapak meminjam uang dari bank sebesar Rp25.000.000,00 untuk membangun rumah. Bunga yang harus dibayarkan sebesar 2,5% per bulan. Jika bapak akan mengangsur ke bank selama 16 bulan, angsuran yang harus disetorkan ke bank tiap bulannya adalah ....", opt: ["Rp2.250.500,00", "Rp2.375.500,00", "Rp2.565.500,00", "Rp2.187.500,00"], a: 3 },
  { q: "Ibu telah menyiapkan beberapa kardus mie instan untuk dibagikan kepada korban banjir. 2/5 bagian diberikan pada desa A, 1/3 bagian untuk desa B, dan sisanya untuk desa C. Jika desa C mendapatkan 160 bungkus mie, banyaknya mie yang diperoleh desa A adalah ....", opt: ["120", "240", "360", "720"], a: 2 },
  { q: "Pak Doni membeli mobil seharga Rp150.000.000,00. Selama 15 tahun memiliki mobil tersebut, Pak Doni sudah mengeluarkan uang Rp20.000.000,00 untuk biaya reparasi dan menambah aksesori. Jika harga jual Rp120.000.000,00 maka kerugian yang dialami Pak Doni sebesar ....", opt: ["22,6%", "25,7%", "27,7%", "29,4%"], a: 3 },
  { q: "Nino memiliki kawat sepanjang 168 cm yang akan dijadikan kerangka sebuah balok dengan selisih panjang, lebar, dan tingginya adalah 2 cm. Ukuran panjang, lebar, dan tinggi balok berturut-turut adalah ....", opt: ["14, 12, 10", "18, 16, 14", "16, 14, 12", "12, 10, 8"], a: 1 },
  { q: "Nilai rata-rata ulangan kimia di suatu kelas adalah 5. Jika ditambah dengan nilai siswa yang mengikuti ulangan susulan yang nilainya 7, maka rata-rata nilai menjadi 5,1. Banyaknya siswa mula-mula dalam kelas tersebut yang mengikuti ulangan adalah ....", opt: ["19", "20", "21", "22"], a: 2 },
  { q: "Pak Narman menjual sepeda seharga Rp525.000,00 dan memperoleh laba sebesar 50% dari harga beli. Harga beli dari sepeda tersebut adalah ....", opt: ["Rp475.000,00", "Rp450.000,00", "Rp350.000,00", "Rp325.000,00"], a: 3 },
  { q: "Di dalam kelas X terdapat 50 siswa. Siswa yang suka renang sebanyak 36 siswa, sedangkan yang suka bulutangkis sebanyak 27 siswa. Jika tidak ada siswa yang tidak menyukai renang dan bulutangkis, siswa yang menyukai kedua olahraga tersebut adalah ....", opt: ["15 siswa", "14 siswa", "13 siswa", "12 siswa"], a: 0 },
  { q: "Adik memotong selembar kertas menjadi 2 bagian. Setiap bagian dipotong lagi menjadi 2 bagian dan seterusnya. Jumlah potongan kertas setelah potongan ke-5 adalah ....", opt: ["37 bagian", "32 bagian", "16 bagian", "64 bagian"], a: 2 },
  { q: "70 orang tukang yang membangun sebuah gedung dapat menyelesaikan pekerjaannya dalam 6 pekan. Kontraktor menginginkan agar pekerjaan tersebut selesai dalam 5 pekan, maka kontraktor harus menambah pekerja sebanyak ....", opt: ["84 orang", "64 orang", "34 orang", "14 orang"], a: 3 },
  { q: "Seutas tali sepanjang 60 meter dipotong menjadi dua bagian. Adapun bagian yang satu panjangnya 2/3 dari yang lain, maka panjang tali yang terpanjang adalah ....", opt: ["36 cm", "34 cm", "32 cm", "30 cm"], a: 0 },
  { q: "Bu Siti membelikan susu formula dalam kaleng untuk anaknya yang masih bayi. Tinggi kaleng tersebut adalah 40 cm dan diameter alasnya 28 cm. Maka volume maksimum susu yang dapat ditampung dalam kaleng tersebut adalah ....", opt: ["22,14 dm³", "24,64 dm³", "26,84 dm³", "28,24 dm³"], a: 3 },
  { q: "Palang Merah Indonesia menyiapkan 50 karung beras untuk bantuan bencana alam di Aceh. Setiap karung berisi 30 kg beras. Beras tersebut akan dipindahkan ke dalam kantong plastik yang masing-masing kantong plastik memuat 5 kg beras. Banyak kantong plastik yang dibutuhkan PMI adalah ....", opt: ["100", "200", "300", "400"], a: 2 },
  { q: "Pak Ihsan membeli sebidang tanah seharga Rp225.000.000,00 kemudian tanah tersebut dijual kembali seharga Rp275.000.000,00. Keuntungan yang diperoleh Pak Ihsan sebesar ....", opt: ["20,12%", "22,22%", "24,32%", "26,42%"], a: 1 },
  { q: "Ibu Rina membeli 50 kg tepung terigu untuk dijual kembali dengan dibungkus masing-masing berisi 1/2 kg, maka jumlah kantong plastik yang diperlukan Ibu Rina sebanyak ....", opt: ["100", "150", "200", "250"], a: 0 },
  { q: "Seorang ilmuwan melakukan percobaan melarutkan garam dalam air sambil dipanaskan dari suhu awal 30° C. Jika tiap kenaikan 10° C jumlah garam yang larut 2 kali lebih banyak dari sebelumnya, saat suhu mencapai 80° C jumlah garam yang larut menjadi ... kali.", opt: ["8", "16", "32", "64"], a: 2 },
  { q: "Seorang pembuat alat masak memiliki lempengan stainless steel 3.300 cm². Jika ia ingin membuatnya menjadi penutup panci berbentuk kerucut tanpa alas dengan diameter 42 cm, panjang sisi miring penutup panci yang dihasilkan adalah ....", opt: ["29 cm", "39 cm", "49 cm", "59 cm"], a: 0 },
  { q: "Mesin A dapat menghasilkan 3 barang per jam dan mesin B dapat menghasilkan 4 barang per jam. Jika kedua mesin bekerja 18 jam dan menghasilkan 60 barang, barang yang dihasilkan mesin B sebanyak ....", opt: ["44", "36", "30", "24"], a: 3 },
  { q: "Paman telah menabung di bank selama 14 bulan dan tabungannya sejumlah Rp6.050.000,00. Jika bank memberikan bagi hasil 18% per tahunnya, besarnya tabungan awal paman adalah ....", opt: ["Rp3.000.000,00", "Rp3.500.000,00", "Rp5.000.000,00", "Rp5.500.000,00"], a: 2 },
  { q: "Pembangunan jalan kampung yang rusak diperkirakan selesai dalam 100 hari dengan pekerja 42 orang. Jika kontraktor menambahkan 18 orang pekerja, pembangunan jalan akan lebih cepat ... hari.", opt: ["10 hari", "20 hari", "30 hari", "40 hari"], a: 2 },
  { q: "Sarah membeli sepasang baju dan rok seharga Rp216.000,00. Jika Sarah mendapatkan diskon 25% untuk setiap pembelian sepasang baju dan rok, ia harus membayar ....", opt: ["Rp186.000,00", "Rp162.000,00", "Rp140.000,00", "Rp125.000,00"], a: 1 },
  { q: "Pak Mardi membeli 20 kg buah rambutan seharga @ Rp20.000,00. Pak Mardi menjual kembali dengan harga Rp21.000,00 per kg, tetapi 2 kg buah rambutan sudah membusuk sehingga dijual dengan harga Rp10.000,00 per kg. Kerugian yang dialami Pak Mardi sebesar ....", opt: ["2%", "1,5%", "1%", "0,5%"], a: 3 },
  { q: "Di luar rumah terdapat tumpukan batu bata. Tumpukan pertama sebanyak 8 bata, tumpukan kedua 13 bata, dan tumpukan ketiga 18 bata. Jika batu bata disusun hingga 8 tumpukan, jumlah bata yang ditumpuk adalah ....", opt: ["38", "48", "58", "68"], a: 0 },
  { q: "Seorang arkeolog membuat miniatur piramida yang ada di Mesir dari kertas karton. Ia membuat piramida dengan panjang rusuk alas 64 cm dan tinggi 24 cm, maka luas kertas karton yang diperlukan adalah ....", opt: ["8.416 cm²", "9.456 cm²", "8.826 cm²", "9.216 cm²"], a: 3 },
  { q: "Bank ABC memberikan bunga sebesar 5% per tahun. Jika Ardi ingin agar uang tabungannya menjadi Rp4.462.500,00, uang yang harus ditabung Ardi selama satu tahun sebesar ....", opt: ["Rp4.000.000,00", "Rp4.125.000,00", "Rp4.250.000,00", "Rp4.500.000,00"], a: 2 },
  { q: "Siti membeli gaun panjang seharga Rp256.000,00 tetapi ia hanya membayarkan Rp204.800,00. Maka besarnya diskon yang diberikan untuk gaun tersebut adalah ....", opt: ["20%", "25%", "30%", "35%"], a: 0 },
  { q: "Di dalam suatu kelas terdiri dari 45 mahasiswa. Dalam kelas tersebut 24 orang mengikuti HMJ, 19 orang mengikuti BEM, dan 5 orang mengikuti keduanya. Jumlah mahasiswa yang tidak mengikuti HMJ dan BEM adalah ....", opt: ["13 orang", "11 orang", "9 orang", "7 orang"], a: 3 },
  { q: "Pada sebuah usaha konfeksi biasanya 60 buah baju dapat diselesaikan oleh 24 orang pegawai dalam sehari. Jika pengusaha menginginkan baju yang dihasilkan 30 buah lebih banyak, jumlah pegawai harus ditambah sebanyak ....", opt: ["6 orang", "12 orang", "18 orang", "24 orang"], a: 1 },
  { q: "Pak Ahmad memiliki 2 alat penggiling singkong. Mesin 1 menghasilkan 30 kg tepung per jam, sedangkan mesin 2 menghasilkan 40 kg tepung per jam. Suatu hari kedua mesin dapat menghasilkan 650 kg tepung dalam waktu kerja kedua mesin adalah 18 jam. Jumlah tepung yang dihasilkan oleh mesin 1 dan 2 pada hari tersebut berturut-turut adalah ....", opt: ["250 kg dan 400 kg", "200 kg dan 450 kg", "210 kg dan 440 kg", "260 kg dan 390 kg"], a: 2 },
  { q: "Bapak memiliki sebidang tanah berukuran 300 m². Jika 3/5 bagian ditanami jagung, 1/6 bagian ditanami tebu, dan sisanya ditanami kacang, bagian yang ditanami kacang seluas ....", opt: ["50 m²", "70 m²", "130 m²", "180 m²"], a: 1 },
  { q: "Pak Joko membeli 20 lusin pulpen seharga Rp360.000,00. Jika 180 buah dijual Rp1.400,00 dan sisanya dijual Rp1.250,00, besarnya kerugian Pak Joko adalah ....", opt: ["5,1%", "7,2%", "9,2%", "11,1%"], a: 2 },
  { q: "Nilai rata-rata ulangan fisika 6 orang siswa adalah 81. Jika ada tambahan nilai dari seorang siswa yang mengikuti ujian susulan karena tidak masuk sehingga nilai rata-rata menjadi 76, nilai dari siswa tersebut adalah ....", opt: ["76", "66", "56", "46"], a: 3 },
  { q: "Persediaan beras di suatu panti asuhan akan habis dalam 6 hari untuk 25 orang penghuni panti. Jika suatu hari persediaan beras dapat habis hanya dalam waktu 4 hari, banyaknya tambahan penghuni panti adalah ....", opt: ["15 orang", "10 orang", "25 orang", "30 orang"], a: 0 },
  { q: "a = 1,7; b = 1,3. Hubungan yang benar antara x dan z apabila diketahui x = 3a – 2b; z = 2a – (-3b) adalah ...", opt: ["x < z", "x = z", "x – z = 0", "x – 1 = z"], a: 0 },
  { q: "c < a < 0 , a < b < 1. Hubungan yang benar adalah ...", opt: ["b = 0", "b > 0", "b < 0", "2b = a"], a: 0 }
];

    let currentIdx = 0;
    let userAnswers = new Array(quizData.length).fill(null);
    let isReviewMode = false;

    window.onload = () => {
        renderStatus();
        showQuestion();
    };

    function renderStatus() {
        const container = document.getElementById('status-container');
        container.innerHTML = "";
        quizData.forEach((_, i) => {
            const box = document.createElement('div');
            box.innerText = i + 1;
            
            if (isReviewMode) {
                const isCorrect = userAnswers[i] === quizData[i].a;
                box.className = `num-box ${isCorrect ? 'num-correct' : 'num-wrong'}`;
            } else {
                box.className = `num-box ${userAnswers[i] !== null ? 'num-answered' : 'num-unanswered'}`;
            }
            
            if (i === currentIdx) box.classList.add('num-active');
            box.onclick = () => { currentIdx = i; showQuestion(); };
            container.appendChild(box);
        });
    }

    function showQuestion() {
        const q = quizData[currentIdx];
        document.getElementById('question-number').innerText = `Soal #${currentIdx + 1}`;
        document.getElementById('question-text').innerText = q.q;
        const optContainer = document.getElementById('options-container');
        optContainer.innerHTML = "";

        const labels = ['A', 'B', 'C', 'D', 'E'];
        q.opt.forEach((option, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<strong>${labels[i]}.</strong> ${option}`;
            
            if (isReviewMode) {
                btn.disabled = true;
                // Jika ini adalah jawaban yang BENAR
                if (i === q.a) {
                    btn.classList.add('correct-ans');
                } 
                // Jika user memilih ini dan jawabannya SALAH
                if (userAnswers[currentIdx] === i && i !== q.a) {
                    btn.classList.add('wrong-selected');
                }
            } else {
                if (userAnswers[currentIdx] === i) btn.classList.add('selected');
                btn.onclick = () => selectAnswer(i);
            }
            
            optContainer.appendChild(btn);
        });

        // Navigasi
        document.getElementById('prev-btn').style.visibility = currentIdx === 0 ? 'hidden' : 'visible';
        document.getElementById('next-btn').innerText = currentIdx === quizData.length - 1 ? 'Selesai' : 'Selanjutnya';
        
        // Atur tampilan tombol review
        document.getElementById('back-to-result-btn').style.display = isReviewMode ? 'block' : 'none';
        
        renderStatus();
    }

    function selectAnswer(i) {
        if (isReviewMode) return;
        userAnswers[currentIdx] = i;
        showQuestion();

        // Otomatis pindah ke nomor selanjutnya
        setTimeout(() => {
            if (currentIdx < quizData.length - 1) {
                currentIdx++;
                showQuestion();
            }
        }, 300);
    }

    function nextQuestion() {
        if (currentIdx < quizData.length - 1) {
            currentIdx++;
            showQuestion();
        } else if (!isReviewMode) {
            showResult();
        } else {
            exitReview();
        }
    }

    function prevQuestion() {
        if (currentIdx > 0) {
            currentIdx--;
            showQuestion();
        }
    }

    function showResult() {
        const unanswered = userAnswers.filter(ans => ans === null).length;
        if (unanswered > 0 && !isReviewMode) {
            if (!confirm(`Ada ${unanswered} soal belum dijawab. Yakin ingin mengumpulkan?`)) return;
        }

        let correct = 0;
        userAnswers.forEach((ans, i) => { if (ans === quizData[i].a) correct++; });
        const finalScoreValue = Math.round((correct / quizData.length) * 100);
        
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('finish-quiz-btn').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = finalScoreValue;
        document.getElementById('stats-text').innerText = `Benar: ${correct} | Salah: ${quizData.length - correct}`;
        
        isReviewMode = true; // Mode review aktif setelah skor muncul
        renderStatus();
    }

    function startReview() {
        currentIdx = 0; // Mulai dari nomor 1
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        showQuestion();
    }

    function exitReview() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
    }
</script>

<script>
