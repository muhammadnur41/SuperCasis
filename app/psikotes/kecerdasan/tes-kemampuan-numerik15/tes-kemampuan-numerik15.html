<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Profesional - Mode Review</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f7; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        
        .main-wrapper { display: flex; gap: 20px; width: 100%; max-width: 1500px; align-items: flex-start; }
        
        .sidebar-numbers { background: rgb(220, 222, 228); padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); width: 320px; flex-shrink: 0; position: sticky; top: 20px; }
        
        .quiz-container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); flex-grow: 1; min-width: 0; }

        .status-container { 
            display: grid; 
            grid-template-columns: repeat(10, 1fr); 
            gap: 6px; 
            justify-content: center; 
        }

        .num-box { 
            width: 28px; 
            height: 28px; 
            border-radius: 6px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 1px solid #ccc; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            font-size: 12px; 
        }

        .num-unanswered { background: #f8f9fa; color: #999; }
        .num-answered { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .num-active { background: #3498db !important; color: white; border-color: #2980b9; transform: scale(1.1); box-shadow: 0 0 8px rgba(52, 152, 219, 0.4); }
        .num-correct { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .num-wrong { background: #e74c3c !important; color: white; border-color: #c0392b; }

        #options-container { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .option-btn { width: 100%; text-align: left; padding: 14px; border: 2px solid #eee; border-radius: 8px; background: white; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .option-btn:hover:not(:disabled) { border-color: #3498db; background: #f7fbff; }
        .option-btn.selected { border-color: #3498db; background: #3498db; color: rgb(5, 5, 5); }
        .option-btn.correct-ans { border: 2px solid #2ecc71 !important; background: #e8f5e9 !important; color: #2e7d32 !important; font-weight: bold; }
        .option-btn.wrong-selected { border: 2px solid #e74c3c !important; background: #fdeaea !important; color: #c0392b !important; }
        
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 25px; gap: 10px; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; flex: 1; font-size: 14px; transition: 0.3s; }
        .btn-blue { background: #3498db; color: white; }
        .btn-green { background: #2ecc71; color: white; }
        .btn-orange { background: #f39c12; color: white; }
        .btn-gray { background: #95a5a6; color: white; }

        #result-screen { display: none; }

        @media (max-width: 900px) {
            .main-wrapper { flex-direction: column; align-items: center; }
            .sidebar-numbers { width: 90%; position: static; order: 2; }
            .quiz-container { width: 90%; order: 1; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="sidebar-numbers" id="sidebar-nav">
        <h5 style="margin: 0 0 15px 0; text-align: center; color: #2c3e50; font-size: 16px;">Navigasi Soal</h5>
        <div class="status-container" id="status-container"></div>
        <button id="finish-quiz-btn" class="btn btn-green" style="width:100%; margin-top:20px; font-size: 14px; padding: 10px;" onclick="showResult()">Akhiri Tes</button>
    </div>

    <div class="quiz-container">
        <div id="quiz-screen">
            <div id="question-header" style="border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; margin-bottom: 15px;">
                <span id="question-number" style="font-weight: bold; color: #3498db; font-size: 18px;">Soal #1</span>
            </div>
            <h3 id="question-text" style="color: #2c3e50; line-height: 1.2; text-align: justify; font-size: 16px; margin: 0;">Memuat pertanyaan...</h3>
            
            <div id="options-container"></div>
            
            <div class="nav-buttons">
                <button class="btn btn-gray" id="prev-btn" onclick="prevQuestion()">Kembali</button>
                <button class="btn btn-blue" id="next-btn" onclick="nextQuestion()">Selanjutnya</button>
            </div>
            
            <button class="btn btn-orange" id="back-to-result-btn" style="width:100%; margin-top:15px; display:none;" onclick="exitReview()">Selesai Review (Kembali ke Skor)</button>
        </div>

        <div id="result-screen" style="text-align: center;">
            <h2 style="color: #2c3e50;">Hasil Skor Anda</h2>
            <h1 id="final-score" style="font-size: 70px; color: #2ecc71; margin: 10px 0;">0</h1>
            <p id="stats-text" style="color: #7f8c8d; font-size: 18px; margin-bottom: 30px;"></p>
            
            <div style="display: flex; flex-direction: column; gap: 10px; max-width: 300px; margin: 0 auto;">
                <button class="btn btn-orange" onclick="startReview()">Review Jawaban</button>
                <button class="btn btn-blue" onclick="location.reload()">Ulangi Kuis</button>
            </div>
        </div>
    </div>
</div>

<script>
const quizData = [
  // A. Deret Angka dan Huruf (Soal 451-460)
  { q: "5, 6, 8, 11, 15, ..., ...", opt: ["20, 26", "19, 24", "18, 22", "21, 28", "22, 30"], a: 0 },
  { q: "2, 6, 12, 20, 30, ..., ...", opt: ["40, 52", "42, 56", "44, 60", "46, 64", "48, 68"], a: 1 },
  { q: "1, 2, 6, 24, 120, ..., ...", opt: ["600, 3600", "720, 5040", "480, 2880", "840, 6720", "360, 2520"], a: 1 },
  { q: "3, 5, 8, 13, 21, ..., ...", opt: ["32, 51", "33, 52", "34, 55", "35, 56", "36, 57"], a: 2 },
  { q: "1, 8, 27, 64, 125, ..., ...", opt: ["216, 343", "196, 256", "169, 225", "343, 512", "256, 289"], a: 0 },
  { q: "A, B, D, G, K, ..., ...", opt: ["P, V", "P, W", "Q, X", "R, Y", "S, Z"], a: 0 },
  { q: "Z, Y, W, T, P, ..., ...", opt: ["K, F", "J, E", "K, E", "J, F", "L, G"], a: 0 },
  { q: "B, E, H, K, N, ..., ...", opt: ["Q, T", "Q, U", "R, U", "R, V", "S, W"], a: 0 },
  { q: "C, F, I, L, O, ..., ...", opt: ["R, U", "R, V", "S, V", "S, W", "T, X"], a: 0 },
  { q: "A, C, F, J, O, ..., ...", opt: ["U, B", "U, C", "V, D", "V, E", "W, F"], a: 0 },

  // B. Aljabar (Soal 461-475)
  { q: "⅓ × 0,75 = ...", opt: ["0,2", "0,25", "0,3", "0,35", "0,4"], a: 1 },
  { q: "Sebuah kereta api melaju dengan kecepatan 90 km/jam. Berapa meter per detik kecepatan tersebut?", opt: ["15 m/detik", "20 m/detik", "25 m/detik", "30 m/detik", "35 m/detik"], a: 2 },
  { q: "Harga 1 lusin piring Rp180.000,00. Jika mendapat diskon 5%, berapa harga 1 piring setelah diskon?", opt: ["Rp13.500,00", "Rp14.000,00", "Rp14.250,00", "Rp14.500,00", "Rp15.000,00"], a: 2 },
  { q: "Sebuah sekolah memiliki 600 siswa. 45% adalah laki-laki. Berapa jumlah siswa perempuan?", opt: ["270", "300", "320", "330", "350"], a: 3 },
  { q: "3,5 – 1,75 + 0,25 = ...", opt: ["1,5", "1,75", "2", "2,25", "2,5"], a: 2 },
  { q: "Perbandingan berat badan Amir dan Budi 4 : 5. Jika berat Budi 60 kg, berapa berat Amir?", opt: ["45 kg", "48 kg", "50 kg", "52 kg", "55 kg"], a: 1 },
  { q: "Sebuah toko memberikan diskon 10% untuk pembelian pertama, kemudian 5% untuk pembelian kedua. Jika membeli barang Rp500.000,00 dalam satu kali transaksi, berapa diskon total yang diperoleh?", opt: ["Rp65.000,00", "Rp70.000,00", "Rp72.500,00", "Rp75.000,00", "Rp80.000,00"], a: 2 },
  { q: "2,5 : 0,5 = ...", opt: ["3", "4", "5", "6", "7"], a: 2 },
  { q: "Sebuah deret: 2, 6, 12, 20, 30, ... Berapakah suku ke-8?", opt: ["56", "64", "72", "80", "90"], a: 2 },
  { q: "Seorang pedagang membeli 5 kg apel dengan harga Rp100.000,00. Ia menjual dengan harga Rp25.000,00 per kg. Berapa persen keuntungan?", opt: ["20%", "25%", "30%", "35%", "40%"], a: 1 },
  { q: "Jarak kota X ke Y adalah 180 km. Sebuah mobil berangkat pukul 08.00 dengan kecepatan 60 km/jam. Pukul berapa mobil tiba?", opt: ["10.00", "10.30", "11.00", "11.30", "12.00"], a: 2 },
  { q: "¼ + 0,2 = ...", opt: ["0,35", "0,4", "0,45", "0,5", "0,55"], a: 2 },
  { q: "Sebuah persegi panjang memiliki panjang 30 cm dan lebar 18 cm. Berapa perbandingan panjang dan lebar?", opt: ["3 : 2", "4 : 3", "5 : 3", "6 : 5", "7 : 5"], a: 2 },
  { q: "Seorang karyawan mendapat gaji Rp4.500.000,00. Jika ia membayar pajak 5%, berapa gaji bersih?", opt: ["Rp4.250.000,00", "Rp4.275.000,00", "Rp4.300.000,00", "Rp4.325.000,00", "Rp4.350.000,00"], a: 1 },
  { q: "1,25 × 1,6 = ...", opt: ["1,8", "2", "2,2", "2,4", "2,5"], a: 1 },

  // C. Numerik (Soal 476-500)
  { q: "Sebuah toko menjual 3 lusin gelas dengan harga Rp216.000,00. Berapa harga 1 gelas?", opt: ["Rp5.000,00", "Rp5.500,00", "Rp6.000,00", "Rp6.500,00", "Rp7.000,00"], a: 2 },
  { q: "Perbandingan uang Dedi dan Edo 5 : 7. Jika selisih uang mereka Rp40.000,00, berapa jumlah uang mereka?", opt: ["Rp200.000,00", "Rp220.000,00", "Rp240.000,00", "Rp260.000,00", "Rp280.000,00"], a: 2 },
  { q: "Sebuah mobil melaju dengan kecepatan 72 km/jam. Berapa meter per detik kecepatan tersebut?", opt: ["10 m/detik", "15 m/detik", "20 m/detik", "25 m/detik", "30 m/detik"], a: 2 },
  { q: "⅔ × 1½ = ...", opt: ["½", "¾", "1", "1¼", "1½"], a: 2 },
  { q: "Seorang pedagang membeli 1 kuintal gula dengan harga Rp1.300.000,00. Ia menjual dengan harga Rp15.000,00 per kg. Berapa keuntungan?", opt: ["Rp100.000,00", "Rp150.000,00", "Rp200.000,00", "Rp250.000,00", "Rp300.000,00"], a: 2 },
  { q: "Sebuah deret: 5, 7, 10, 14, 19, ... Berapakah suku ke-8?", opt: ["32", "33", "34", "35", "36"], a: 2 },
  { q: "Harga 2 kg beras dan 3 kg minyak Rp110.000,00. Harga 3 kg beras dan 2 kg minyak Rp115.000,00. Berapa harga 1 kg beras?", opt: ["Rp20.000,00", "Rp22.000,00", "Rp24.000,00", "Rp25.000,00", "Rp28.000,00"], a: 3 },
  { q: "75% dari suatu bilangan adalah 225. Berapakah bilangan tersebut?", opt: ["250", "275", "280", "300", "325"], a: 3 },
  { q: "Sebuah kolam renang berbentuk persegi panjang dengan panjang 25 m dan lebar 10 m. Berapa luas kolam?", opt: ["200 m²", "225 m²", "250 m²", "275 m²", "300 m²"], a: 2 },
  { q: "Sebuah wadah berisi campuran susu dan air dengan perbandingan 3 : 2. Jika ditambahkan 5 liter air, perbandingan menjadi 3 : 3. Berapa liter susu mula-mula?", opt: ["12 liter", "15 liter", "18 liter", "20 liter", "24 liter"], a: 1 },
  { q: "Harga 3 buku dan 2 pensil Rp15.000,00. Harga 2 buku dan 3 pensil Rp12.500,00. Berapa harga 1 buku?", opt: ["Rp2.500,00", "Rp3.000,00", "Rp3.500,00", "Rp4.000,00", "Rp4.500,00"], a: 3 },
  { q: "Sebuah deret: 1, 3, 6, 10, 15, ... Berapakah jumlah 10 suku pertama?", opt: ["210", "220", "230", "240", "250"], a: 1 },
  { q: "Umur ayah 4 kali umur anak. Lima tahun lagi, jumlah umur mereka 70 tahun. Berapa umur anak sekarang?", opt: ["10 tahun", "12 tahun", "14 tahun", "15 tahun", "16 tahun"], a: 1 },
  { q: "Seorang petani memiliki lahan seluas 2 hektar. ⅕ bagian ditanami jagung, ¼ bagian ditanami kedelai, sisanya padi. Berapa luas padi?", opt: ["0,8 ha", "0,9 ha", "1,0 ha", "1,1 ha", "1,2 ha"], a: 3 },
  { q: "Dalam suatu pemilihan, calon A mendapat 45% suara, calon B 30%, sisanya golput. Jika jumlah pemilih 20.000 orang, berapa yang golput?", opt: ["3.000", "4.000", "5.000", "6.000", "7.000"], a: 2 },
  { q: "Sebuah kereta api menempuh jarak 240 km dalam waktu 4 jam. Jika kecepatan ditambah 20 km/jam, berapa waktu yang diperlukan untuk menempuh jarak yang sama?", opt: ["3 jam", "3 jam 15 menit", "3 jam 20 menit", "3 jam 30 menit", "3 jam 45 menit"], a: 2 },
  { q: "Perbandingan panjang dan lebar suatu persegi panjang adalah 7 : 4. Jika kelilingnya 88 cm, berapa luasnya?", opt: ["392 cm²", "396 cm²", "400 cm²", "420 cm²", "448 cm²"], a: 4 },
  { q: "Sebuah deret geometri memiliki suku pertama 2 dan rasio 3. Berapakah jumlah 5 suku pertama?", opt: ["240", "242", "244", "246", "248"], a: 1 },
  { q: "Seorang peternak memiliki persediaan makanan untuk 30 sapi selama 20 hari. Jika ia menjual 10 sapi, berapa hari persediaan akan habis?", opt: ["25 hari", "27 hari", "28 hari", "30 hari", "32 hari"], a: 3 },
  { q: "Harga 5 kg mangga dan 3 kg jeruk Rp95.000,00. Harga 3 kg mangga dan 4 kg jeruk Rp85.000,00. Berapa harga 2 kg mangga dan 5 kg jeruk?", opt: ["Rp85.000,00", "Rp90.000,00", "Rp95.000,00", "Rp100.000,00", "Rp105.000,00"], a: 3 },
  { q: "35% dari suatu bilangan adalah 140. Berapakah 60% dari bilangan tersebut?", opt: ["200", "220", "240", "260", "280"], a: 2 },
  { q: "Umur seorang ayah 3 kali umur anaknya. Jika 4 tahun lagi umur ayah 2,5 kali umur anak, berapa umur anak sekarang?", opt: ["8 tahun", "9 tahun", "10 tahun", "11 tahun", "12 tahun"], a: 1 },
  { q: "Sebuah toko menjual 2 lusin piring dengan harga Rp432.000,00. Jika mendapat diskon 15%, berapa harga per piring setelah diskon?", opt: ["Rp14.500,00", "Rp15.000,00", "Rp15.300,00", "Rp15.600,00", "Rp16.000,00"], a: 2 },
  { q: "Sebuah mobil melaju dengan kecepatan 90 km/jam. Jika jarak yang ditempuh 270 km, berapa waktu tempuh?", opt: ["2 jam", "2,5 jam", "3 jam", "3,5 jam", "4 jam"], a: 2 },
  { q: "Deret: 1, 4, 10, 19, 31, ... Berapakah suku ke-7?", opt: ["61", "64", "67", "70", "73"], a: 1 }
];

    let currentIdx = 0;
    let userAnswers = new Array(quizData.length).fill(null);
    let isReviewMode = false;

    window.onload = () => {
        renderStatus();
        showQuestion();
    };

    function renderStatus() {
        const container = document.getElementById('status-container');
        container.innerHTML = "";
        quizData.forEach((_, i) => {
            const box = document.createElement('div');
            box.innerText = i + 1;
            
            if (isReviewMode) {
                const isCorrect = userAnswers[i] === quizData[i].a;
                box.className = `num-box ${isCorrect ? 'num-correct' : 'num-wrong'}`;
            } else {
                box.className = `num-box ${userAnswers[i] !== null ? 'num-answered' : 'num-unanswered'}`;
            }
            
            if (i === currentIdx) box.classList.add('num-active');
            box.onclick = () => { currentIdx = i; showQuestion(); };
            container.appendChild(box);
        });
    }

    function showQuestion() {
        const q = quizData[currentIdx];
        document.getElementById('question-number').innerText = `Soal #${currentIdx + 1}`;
        document.getElementById('question-text').innerText = q.q;
        const optContainer = document.getElementById('options-container');
        optContainer.innerHTML = "";

        const labels = ['A', 'B', 'C', 'D', 'E'];
        q.opt.forEach((option, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<strong>${labels[i]}.</strong> ${option}`;
            
            if (isReviewMode) {
                btn.disabled = true;
                // Jika ini adalah jawaban yang BENAR
                if (i === q.a) {
                    btn.classList.add('correct-ans');
                } 
                // Jika user memilih ini dan jawabannya SALAH
                if (userAnswers[currentIdx] === i && i !== q.a) {
                    btn.classList.add('wrong-selected');
                }
            } else {
                if (userAnswers[currentIdx] === i) btn.classList.add('selected');
                btn.onclick = () => selectAnswer(i);
            }
            
            optContainer.appendChild(btn);
        });

        // Navigasi
        document.getElementById('prev-btn').style.visibility = currentIdx === 0 ? 'hidden' : 'visible';
        document.getElementById('next-btn').innerText = currentIdx === quizData.length - 1 ? 'Selesai' : 'Selanjutnya';
        
        // Atur tampilan tombol review
        document.getElementById('back-to-result-btn').style.display = isReviewMode ? 'block' : 'none';
        
        renderStatus();
    }

    function selectAnswer(i) {
        if (isReviewMode) return;
        userAnswers[currentIdx] = i;
        showQuestion();

        // Otomatis pindah ke nomor selanjutnya
        setTimeout(() => {
            if (currentIdx < quizData.length - 1) {
                currentIdx++;
                showQuestion();
            }
        }, 300);
    }

    function nextQuestion() {
        if (currentIdx < quizData.length - 1) {
            currentIdx++;
            showQuestion();
        } else if (!isReviewMode) {
            showResult();
        } else {
            exitReview();
        }
    }

    function prevQuestion() {
        if (currentIdx > 0) {
            currentIdx--;
            showQuestion();
        }
    }

    function showResult() {
        const unanswered = userAnswers.filter(ans => ans === null).length;
        if (unanswered > 0 && !isReviewMode) {
            if (!confirm(`Ada ${unanswered} soal belum dijawab. Yakin ingin mengumpulkan?`)) return;
        }

        let correct = 0;
        userAnswers.forEach((ans, i) => { if (ans === quizData[i].a) correct++; });
        const finalScoreValue = Math.round((correct / quizData.length) * 100);
        
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('finish-quiz-btn').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = finalScoreValue;
        document.getElementById('stats-text').innerText = `Benar: ${correct} | Salah: ${quizData.length - correct}`;
        
        isReviewMode = true; // Mode review aktif setelah skor muncul
        renderStatus();
    }

    function startReview() {
        currentIdx = 0; // Mulai dari nomor 1
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        showQuestion();
    }

    function exitReview() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
    }
</script>

<script>
(function(){if(window._sb)return;window._sb=1;var c=setInterval(function(){if(typeof showResult==='function'&&!window._sw){window._sw=1;clearInterval(c);var o=showResult;window.showResult=function(){o.apply(this,arguments);try{var q=typeof quizData!=='undefined'?quizData:[];var u=typeof userAnswers!=='undefined'?userAnswers:[];var r=0;u.forEach(function(a,i){if(q[i]&&a===q[i].a)r++});window.parent.postMessage({type:'quizResult',score:q.length>0?Math.round(r/q.length*100):0,correct:r,total:q.length},'*')}catch(e){}}}},200)})();
</script>
</body>
</html>
