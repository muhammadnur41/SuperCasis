<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Profesional - Mode Review</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f7; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        
        .main-wrapper { display: flex; gap: 20px; width: 100%; max-width: 1500px; align-items: flex-start; }
        
        .sidebar-numbers { background: rgb(220, 222, 228); padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); width: 320px; flex-shrink: 0; position: sticky; top: 20px; }
        
        .quiz-container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); flex-grow: 1; min-width: 0; }

        .status-container { 
            display: grid; 
            grid-template-columns: repeat(10, 1fr); 
            gap: 6px; 
            justify-content: center; 
        }

        .num-box { 
            width: 28px; 
            height: 28px; 
            border-radius: 6px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 1px solid #ccc; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            font-size: 12px; 
        }

        .num-unanswered { background: #f8f9fa; color: #999; }
        .num-answered { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .num-active { background: #3498db !important; color: white; border-color: #2980b9; transform: scale(1.1); box-shadow: 0 0 8px rgba(52, 152, 219, 0.4); }
        .num-correct { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .num-wrong { background: #e74c3c !important; color: white; border-color: #c0392b; }

        #options-container { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .option-btn { width: 100%; text-align: left; padding: 14px; border: 2px solid #eee; border-radius: 8px; background: white; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .option-btn:hover:not(:disabled) { border-color: #3498db; background: #f7fbff; }
        .option-btn.selected { border-color: #3498db; background: #3498db; color: rgb(5, 5, 5); }
        .option-btn.correct-ans { border: 2px solid #2ecc71 !important; background: #e8f5e9 !important; color: #2e7d32 !important; font-weight: bold; }
        .option-btn.wrong-selected { border: 2px solid #e74c3c !important; background: #fdeaea !important; color: #c0392b !important; }
        
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 25px; gap: 10px; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; flex: 1; font-size: 14px; transition: 0.3s; }
        .btn-blue { background: #3498db; color: white; }
        .btn-green { background: #2ecc71; color: white; }
        .btn-orange { background: #f39c12; color: white; }
        .btn-gray { background: #95a5a6; color: white; }

        #result-screen { display: none; }

        @media (max-width: 900px) {
            .main-wrapper { flex-direction: column; align-items: center; }
            .sidebar-numbers { width: 90%; position: static; order: 2; }
            .quiz-container { width: 90%; order: 1; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="sidebar-numbers" id="sidebar-nav">
        <h5 style="margin: 0 0 15px 0; text-align: center; color: #2c3e50; font-size: 16px;">Navigasi Soal</h5>
        <div class="status-container" id="status-container"></div>
        <button id="finish-quiz-btn" class="btn btn-green" style="width:100%; margin-top:20px; font-size: 14px; padding: 10px;" onclick="showResult()">Akhiri Tes</button>
    </div>

    <div class="quiz-container">
        <div id="quiz-screen">
            <div id="question-header" style="border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; margin-bottom: 15px;">
                <span id="question-number" style="font-weight: bold; color: #3498db; font-size: 18px;">Soal #1</span>
            </div>
            <h3 id="question-text" style="color: #2c3e50; line-height: 1.2; text-align: justify; font-size: 16px; margin: 0;">Memuat pertanyaan...</h3>
            
            <div id="options-container"></div>
            
            <div class="nav-buttons">
                <button class="btn btn-gray" id="prev-btn" onclick="prevQuestion()">Kembali</button>
                <button class="btn btn-blue" id="next-btn" onclick="nextQuestion()">Selanjutnya</button>
            </div>
            
            <button class="btn btn-orange" id="back-to-result-btn" style="width:100%; margin-top:15px; display:none;" onclick="exitReview()">Selesai Review (Kembali ke Skor)</button>
        </div>

        <div id="result-screen" style="text-align: center;">
            <h2 style="color: #2c3e50;">Hasil Skor Anda</h2>
            <h1 id="final-score" style="font-size: 70px; color: #2ecc71; margin: 10px 0;">0</h1>
            <p id="stats-text" style="color: #7f8c8d; font-size: 18px; margin-bottom: 30px;"></p>
            
            <div style="display: flex; flex-direction: column; gap: 10px; max-width: 300px; margin: 0 auto;">
                <button class="btn btn-orange" onclick="startReview()">Review Jawaban</button>
                <button class="btn btn-blue" onclick="location.reload()">Ulangi Kuis</button>
            </div>
        </div>
    </div>
</div>

<script>
const quizData = [
  { q: "Hasil dari operasi hitung penjumlahan 356+232 yaitu...", opt: ["488", "498", "588", "598", "608"], a: 2 },
  { q: "Jika 325−144=b, maka nilai b yang memenuhi yaitu...", opt: ["281", "221", "181", "121", "141"], a: 2 },
  { q: "30, 24, 28, 84, 78, ...", opt: ["82", "96", "86", "80"], a: 0 },
  { q: "A, C, F, J, O, ...", opt: ["U", "L", "Z", "P"], a: 0 },
  { q: "5, 25, 125, 625, ..., 15625", opt: ["3475", "3555", "4535", "3125"], a: 3 },
  { q: "101, 112, 134, 145, 167, 178, ...", opt: ["189", "198", "200", "202"], a: 2 },
  { q: "..., 3 3/100, 4 4/100, 3 3/100, 2 2/100, 1 1/100, 2 2/100, 1 1/100", opt: ["1,01", "2,02", "3,03", "4,04"], a: 3 },
  { q: "1, 5, 4, 3, 7, 1, 10, -1, 13, -3, ..., ...", opt: ["16 dan -8", "10 dan -5", "15 dan -8", "16 dan -5"], a: 3 },
  { q: "Hasil dari perkalian 525 × 234 adalah ....", opt: ["115.800", "122.850", "135.720", "158.450"], a: 1 },
  { q: "KPK dari 20, 36, dan 48 adalah ....", opt: ["1.080", "720", "540", "4"], a: 1 },
  { q: "104 + (17 × 35) – 19 = ....", opt: ["718", "680", "472", "378"], a: 1 },
  { q: "Hasil dari 12² + 8² – 625 = ....", opt: ["183", "200", "211", "273"], a: 0 },
  { q: "Hasil perhitungan dari: 529 × 324 – 112 = ....", opt: ["293", "239", "139", "193"], a: 0 },
  { q: "27,5% dari 250 adalah ...", opt: ["70", "68,75", "65", "62,50"], a: 1 },
  { q: "G = 102 + (625 ÷ 5) + (25 × 3) + 576. Nilai G adalah ....", opt: ["122", "182", "222", "282"], a: 1 },
  { q: "(3.405 + 12.025) – (10.391 – 109) = ....", opt: ["4.930", "5.008", "5.127", "5.148"], a: 0 },
  { q: "Hasil dari 162 – (49 – (-32)) = ....", opt: ["247", "267", "287", "277"], a: 0 },
  { q: "Jika B = (√289 + ³√64)² maka nilai B adalah ....", opt: ["121", "261", "441", "961"], a: 2 },
  { q: "5 + 24 × 18 ÷ 2 ÷ 3 – 9 × 3 = ....", opt: ["20", "30", "40", "50"], a: 0 },
  { q: "Paman mempunyai dua petak tanah. Luas petak pertama 1,3 hektar sedangkan petak kedua 1½ hektar. Setengah dari jumlah tanah paman ditanami padi dan sisanya ditanami singkong. Luas tanah paman yang ditanami singkong adalah ....", opt: ["1,4 hektar", "2,3 hektar", "2,8 hektar", "5,6 hektar"], a: 2 },
  { q: "Jumlah dua bilangan rasional adalah 64 dan selisih bilangan tersebut adalah 12. Tentukan hasil kali kedua bilangan tersebut!", opt: ["876", "758", "988", "846"], a: 0 },
  { q: "Hasil dari -14 – (-37) + (-25) = ....", opt: ["-48", "-2", "2", "48"], a: 2 },
  { q: "Terdapat 2 buah persegi, persegi 1 dengan panjang sisi sebesar X, sedangkan persegi 2 mempunyai panjang sisi sebesar Y setengah kali lebar sisi persegi 1. Maka...", opt: ["X² = Y", "X = 2Y", "X² < Y", "X > Y"], a: 1 },
  { q: "Pak Andi dapat menyelesaikan pekerjaanya selama 15 hari, sedangkan pak Asep dalam 20 hari. Jika pak Andi dan pak Asep bekerja bersama-sama selama 4 hari maka pekerjaan yang tersisa ... bagian", opt: ["0,2 bagian", "4/5 bagian", "0,5 bagian", "8/15 bagian"], a: 3 },
  { q: "Kelereng Andi 3x kelereng Budi. Candra memiliki 6 kelereng lebih banyak dari Budi, dan kelereng Candra 2 lebih banyak dari Andi. Maka perbandingan kelereng Andi, Budi dan Candra sebesar...", opt: ["3 : 6 : 2", "6 : 4 : 3", "3 : 1 : 4", "1 : 3 : 4"], a: 2 },
  { q: "Tangki minyak Bapak apabila berisi penuh mempunyai berat 80 kg. Bapak telah mengunakan minyak setengah sehingga berat tangki 46kg, berapa berat tangki pada keadaan kosong?", opt: ["6 kg", "12 kg", "18 kg", "22 kg"], a: 0 },
  { q: "Umur Ibu 5/6 umur Ayah. Perbandingan umur Ayah dan umur kak Ros 3:1. Sekarang umur kak Ros 18 tahun maka umur Ibu...", opt: ["40,5 tahun", "36 tahun", "45 tahun", "50 tahun"], a: 2 },
  { q: "A adalah hasil dari perhitungan (4+9)² + (4²+9²) maka, nilai A...", opt: ["166", "566", "266", "666"], a: 2 },
  { q: "Pak Karmin seorang pedagang buah, beliau menjual dengan harga Rp 75.000,00 untuk harga per Kg buahnya. Pak Karmin mendapat keuntungan 30% dari harga jual buah per Kg tersebut, berapa harga beli buah dagangan pak Karmin tersebut...", opt: ["Rp 57.691,00", "Rp 57.692,00", "Rp 57.693,00", "Rp 57.681,00"], a: 1 },
  { q: "Waktu yang diperlukan penjahit A untuk menyelesaikan jahitannya adalah 3 jam 35 menit 25 detik. Penjahit B 4 jam 45 menit 35 detik. Berapa total waktu dari kedua penjahit tersebut...", opt: ["8 jam 21 menit", "7 jam 21 menit", "8 jam 11 menit", "7 jam 11 menit"], a: 0 },
  { q: "Fitri mendapatkan nilai pada ujian semester ini secara berturut-turut 82,80,77, dan 65. Jika Fitri menginginkan nilai rata-rata ujiannya sebesar 75, maka nilai yang harus didapatkan pada mata ujian ke 5 adalah?", opt: ["80", "71", "79", "83"], a: 1 },
  { q: "Jika nilai a,b, dan c berturut-turut 3; 0; dan -3, maka nilai dari {a x (b + c – a)} x (b + c) =....", opt: ["-54", "-45", "45", "54"], a: 3 },
  { q: "Sekelompok beranggotakan 6 pelajar sedang mengadakan diskusi di taman sekolah. Mereka duduk membentuk lingkaran. Banyaknya cara untuk mengatur posisi anggota kelompok tersebut sebesar...", opt: ["120", "720", "940", "144"], a: 0 },
  { q: "X merupakan bilangan bulat genap dimana 23 < x < 26, dan nilai y < 27, y > 24. Apabila Y termasuk bilangan bulat genap maka..", opt: ["3x = 3y", "X < Y", "3x > 3y", "Y = 2X"], a: 1 },
  { q: "A adalah nilai dari 5,71% dari 0,671, sedangkan B adalah nilai dari 0,671% dari 5,71, maka..", opt: ["A = B", "A < B", "A > B", "A = 3B"], a: 0 },
  { q: "Jika pembilang suatu pecahan ditambah 2 dan penyebut ditambah 5 maka nilainya menjadi setengah. Sedangkan jika pembilang dikurangi 1 dan penyebut ditambah 1, nilainya menjadi sepertiga. Nilai pecahan tersebut adalah ....", opt: ["2/3", "3/5", "4/7", "1/6"], a: 1 },
  { q: "Jumlah umur Rendy dan Bimo adalah 30. Dua kali umur Rendy ditambah dengan tiga kali umur Bimo adalah 77. Selisih umur Rendy dan Bimo adalah ....", opt: ["2 tahun", "4 tahun", "6 tahun", "8 tahun"], a: 1 },
  { q: "Bagas memiliki kawat sepanjang 156 cm untuk membuat kerangka kubus. Jika Bagas ingin tidak ada kawat yang tersisa, panjang sisi kubus harus dibuat dengan ukuran ....", opt: ["12 cm", "13 cm", "14 cm", "15 cm"], a: 1 },
  { q: "Khinsa membeli lukisan seharga Rp4.100.000,00. Jika Khinsa ingin menjual kembali lukisan tersebut dengan keuntungan sebesar 25%, harga jual lukisan tersebut menjadi ....", opt: ["Rp5.125.000,00", "Rp5.375.000,00", "Rp5.775.000,00", "Rp6.125.000,00"], a: 2 },
  { q: "Pada suatu survei yang dilakukan oleh Dinas Pertanian kota di suatu kelurahan diketahui bahwa terdapat 30 keluarga yang memelihara tanaman di rumah dan 24 keluarga yang memiliki hewan peliharaan. Keluarga yang memelihara keduanya sebanyak 13 sedangkan 18 keluarga tidak memelihara keduanya. Jumlah keluarga yang mengikuti survei sebanyak ....", opt: ["58", "59", "60", "61"], a: 1 },
  { q: "Di rumah Bu Dini memiliki persediaan air minum untuk 4 orang yang bisa digunakan selama 10 hari. Jika Bu Dini kedatangan 4 orang tamu yang menginap di rumahnya, maka persediaan air minum akan habis selama ....", opt: ["2 hari", "3 hari", "4 hari", "5 hari"], a: 0 },
  { q: "Reni membeli kaos di pasar sebanyak 1 kodi seharga Rp1.150.000,00. Jika Yoga akan membeli kaos sebanyak lusin, ia harus membayar ....", opt: ["Rp540.000,00", "Rp590.000,00", "Rp630.000,00", "Rp690.000,00"], a: 1 },
  { q: "Bu Manda membeli 6 kg mangga dan 2 kg jeruk seharga Rp132.000,00 sedangkan Bu Lili membeli 8 kg jeruk dan 5 kg mangga seharga Rp300.000,00. Jika Bu Dewi membeli 4 kg mangga dan 5 kg jeruk, ia harus membayar ....", opt: ["Rp236.000,00", "Rp212.000,00", "Rp198.000,00", "Rp188.000,00"], a: 2 },
  { q: "Sepuluh tahun yang lalu umur ibu dua kali umur bibi. Lima tahun kemudian umur ibu menjadi 1,5 kali umur bibi. Umur ibu sekarang adalah ....", opt: ["40 tahun", "35 tahun", "30 tahun", "25 tahun"], a: 0 },
  { q: "Sebuah tangga mempunyai 30 anak tangga. Jika ketinggian anak tangga ke-1, 2, dan 3 dari permukaan tanah berturut-turut adalah 15, 25, dan 35 cm, ketinggian anak tangga terakhir dari permukaan tanah adalah ....", opt: ["2,50 m", "2,65 m", "3,05 m", "3,55 m"], a: 2 },
  { q: "Gaji rata-rata 8 orang pekerja adalah Rp75.000,00. Jika ada tambahan satu pekerja baru, rata-rata gaji menjadi Rp76.000,00. Gaji pekerja baru tersebut adalah ....", opt: ["Rp76.000,00", "Rp80.000,00", "Rp82.000,00", "Rp84.000,00"], a: 3 },
  { q: "Pak Amir meminjam uang di koperasi sebesar Rp15.000.000,00 dengan bunga 1,5% per bulan. Jika Pak Amir diharuskan mengangsur selama 10 bulan, besarnya angsuran yang dibayarkan Pak Amir tiap bulannya adalah ....", opt: ["Rp1.500.000,00", "Rp1.250.000,00", "Rp1.725.000,00", "Rp1.925.000,00"], a: 2 },
  { q: "Kakek memiliki sepotong kayu dengan panjang 84 cm. Jika kakek memotong kayu tersebut menjadi 2/7 bagian, 1/3 bagian dan sisanya, bagian kayu yang terpanjang adalah ....", opt: ["24 cm", "28 cm", "32 cm", "36 cm"], a: 2 },
  { q: "Harga 10 kg beras dan 2 kg gula adalah Rp235.000,00 sedangkan 7 kg beras dan 4 kg gula seharga Rp210.000,00. Jika ingin membeli 5 kg beras dan 3 kg gula, uang yang harus dibayarkan sebesar ....", opt: ["Rp137.500,00", "Rp146.500,00", "Rp152.500,00", "Rp164.500,00"], a: 2 },
  { q: "Seorang peserta SNMPTN dapat mengerjakan 112 soal benar, 26 soal salah, dan sisanya kosong. Jika skor untuk jawaban benar adalah 4, jawaban salah -1, dan jawaban kosong 0, total skor yang diperoleh peserta tersebut adalah ....", opt: ["448", "422", "404", "368"], a: 1 }
];

    let currentIdx = 0;
    let userAnswers = new Array(quizData.length).fill(null);
    let isReviewMode = false;

    window.onload = () => {
        renderStatus();
        showQuestion();
    };

    function renderStatus() {
        const container = document.getElementById('status-container');
        container.innerHTML = "";
        quizData.forEach((_, i) => {
            const box = document.createElement('div');
            box.innerText = i + 1;
            
            if (isReviewMode) {
                const isCorrect = userAnswers[i] === quizData[i].a;
                box.className = `num-box ${isCorrect ? 'num-correct' : 'num-wrong'}`;
            } else {
                box.className = `num-box ${userAnswers[i] !== null ? 'num-answered' : 'num-unanswered'}`;
            }
            
            if (i === currentIdx) box.classList.add('num-active');
            box.onclick = () => { currentIdx = i; showQuestion(); };
            container.appendChild(box);
        });
    }

    function showQuestion() {
        const q = quizData[currentIdx];
        document.getElementById('question-number').innerText = `Soal #${currentIdx + 1}`;
        document.getElementById('question-text').innerText = q.q;
        const optContainer = document.getElementById('options-container');
        optContainer.innerHTML = "";

        const labels = ['A', 'B', 'C', 'D', 'E'];
        q.opt.forEach((option, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<strong>${labels[i]}.</strong> ${option}`;
            
            if (isReviewMode) {
                btn.disabled = true;
                // Jika ini adalah jawaban yang BENAR
                if (i === q.a) {
                    btn.classList.add('correct-ans');
                } 
                // Jika user memilih ini dan jawabannya SALAH
                if (userAnswers[currentIdx] === i && i !== q.a) {
                    btn.classList.add('wrong-selected');
                }
            } else {
                if (userAnswers[currentIdx] === i) btn.classList.add('selected');
                btn.onclick = () => selectAnswer(i);
            }
            
            optContainer.appendChild(btn);
        });

        // Navigasi
        document.getElementById('prev-btn').style.visibility = currentIdx === 0 ? 'hidden' : 'visible';
        document.getElementById('next-btn').innerText = currentIdx === quizData.length - 1 ? 'Selesai' : 'Selanjutnya';
        
        // Atur tampilan tombol review
        document.getElementById('back-to-result-btn').style.display = isReviewMode ? 'block' : 'none';
        
        renderStatus();
    }

    function selectAnswer(i) {
        if (isReviewMode) return;
        userAnswers[currentIdx] = i;
        showQuestion();

        // Otomatis pindah ke nomor selanjutnya
        setTimeout(() => {
            if (currentIdx < quizData.length - 1) {
                currentIdx++;
                showQuestion();
            }
        }, 300);
    }

    function nextQuestion() {
        if (currentIdx < quizData.length - 1) {
            currentIdx++;
            showQuestion();
        } else if (!isReviewMode) {
            showResult();
        } else {
            exitReview();
        }
    }

    function prevQuestion() {
        if (currentIdx > 0) {
            currentIdx--;
            showQuestion();
        }
    }

    function showResult() {
        const unanswered = userAnswers.filter(ans => ans === null).length;
        if (unanswered > 0 && !isReviewMode) {
            if (!confirm(`Ada ${unanswered} soal belum dijawab. Yakin ingin mengumpulkan?`)) return;
        }

        let correct = 0;
        userAnswers.forEach((ans, i) => { if (ans === quizData[i].a) correct++; });
        const finalScoreValue = Math.round((correct / quizData.length) * 100);
        
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('finish-quiz-btn').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = finalScoreValue;
        document.getElementById('stats-text').innerText = `Benar: ${correct} | Salah: ${quizData.length - correct}`;
        
        isReviewMode = true; // Mode review aktif setelah skor muncul
        renderStatus();
    }

    function startReview() {
        currentIdx = 0; // Mulai dari nomor 1
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        showQuestion();
    }

    function exitReview() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
    }
</script>

</body>
</html>
