<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Profesional - Mode Review</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f7; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        
        .main-wrapper { display: flex; gap: 20px; width: 100%; max-width: 1500px; align-items: flex-start; }
        
        .sidebar-numbers { background: rgb(220, 222, 228); padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); width: 320px; flex-shrink: 0; position: sticky; top: 20px; }
        
        .quiz-container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); flex-grow: 1; min-width: 0; }

        .status-container { 
            display: grid; 
            grid-template-columns: repeat(10, 1fr); 
            gap: 6px; 
            justify-content: center; 
        }

        .num-box { 
            width: 28px; 
            height: 28px; 
            border-radius: 6px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 1px solid #ccc; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            font-size: 12px; 
        }

        .num-unanswered { background: #f8f9fa; color: #999; }
        .num-answered { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .num-active { background: #3498db !important; color: white; border-color: #2980b9; transform: scale(1.1); box-shadow: 0 0 8px rgba(52, 152, 219, 0.4); }
        .num-correct { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .num-wrong { background: #e74c3c !important; color: white; border-color: #c0392b; }

        #options-container { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .option-btn { width: 100%; text-align: left; padding: 14px; border: 2px solid #eee; border-radius: 8px; background: white; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .option-btn:hover:not(:disabled) { border-color: #3498db; background: #f7fbff; }
        .option-btn.selected { border-color: #3498db; background: #3498db; color: rgb(5, 5, 5); }
        .option-btn.correct-ans { border: 2px solid #2ecc71 !important; background: #e8f5e9 !important; color: #2e7d32 !important; font-weight: bold; }
        .option-btn.wrong-selected { border: 2px solid #e74c3c !important; background: #fdeaea !important; color: #c0392b !important; }
        
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 25px; gap: 10px; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; flex: 1; font-size: 14px; transition: 0.3s; }
        .btn-blue { background: #3498db; color: white; }
        .btn-green { background: #2ecc71; color: white; }
        .btn-orange { background: #f39c12; color: white; }
        .btn-gray { background: #95a5a6; color: white; }

        #result-screen { display: none; }

        @media (max-width: 900px) {
            .main-wrapper { flex-direction: column; align-items: center; }
            .sidebar-numbers { width: 90%; position: static; order: 2; }
            .quiz-container { width: 90%; order: 1; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="sidebar-numbers" id="sidebar-nav">
        <h5 style="margin: 0 0 15px 0; text-align: center; color: #2c3e50; font-size: 16px;">Navigasi Soal</h5>
        <div class="status-container" id="status-container"></div>
        <button id="finish-quiz-btn" class="btn btn-green" style="width:100%; margin-top:20px; font-size: 14px; padding: 10px;" onclick="showResult()">Akhiri Tes</button>
    </div>

    <div class="quiz-container">
        <div id="quiz-screen">
            <div id="question-header" style="border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; margin-bottom: 15px;">
                <span id="question-number" style="font-weight: bold; color: #3498db; font-size: 18px;">Soal #1</span>
            </div>
            <h3 id="question-text" style="color: #2c3e50; line-height: 1.2; text-align: justify; font-size: 16px; margin: 0;">Memuat pertanyaan...</h3>
            
            <div id="options-container"></div>
            
            <div class="nav-buttons">
                <button class="btn btn-gray" id="prev-btn" onclick="prevQuestion()">Kembali</button>
                <button class="btn btn-blue" id="next-btn" onclick="nextQuestion()">Selanjutnya</button>
            </div>
            
            <button class="btn btn-orange" id="back-to-result-btn" style="width:100%; margin-top:15px; display:none;" onclick="exitReview()">Selesai Review (Kembali ke Skor)</button>
        </div>

        <div id="result-screen" style="text-align: center;">
            <h2 style="color: #2c3e50;">Hasil Skor Anda</h2>
            <h1 id="final-score" style="font-size: 70px; color: #2ecc71; margin: 10px 0;">0</h1>
            
            <h3 id="keterangan-skor" style="margin-top: -10px; margin-bottom: 20px;"></h3>
            
            <p id="stats-text" style="color: #7f8c8d; font-size: 18px; margin-bottom: 30px;"></p>
            
            <div style="display: flex; flex-direction: column; gap: 10px; max-width: 300px; margin: 0 auto;">
                <button class="btn btn-orange" onclick="startReview()">Review Jawaban</button>
                <button class="btn btn-blue" onclick="location.reload()">Ulangi Kuis</button>
            </div>
        </div>
    </div>
</div>

<script>
const quizData = [
{ q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya tidak butuh kepastian absolut untuk berani menekan tombol eksekusi", "Saya mengatur langkah dan mengendalikan perilaku bawahan saya secara ketat"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat menikmati peran sebagai pusat komando yang membagi instruksi kepada tim", "Saya bisa memutus perkara pelik dalam waktu singkat tanpa merasa terbebani"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya selalu bertindak cepat dan segera menetapkan keputusan akhir", "Saya memikirkan matang-matang setiap risiko dan skenario sebelum bertindak"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya tidak akan berhenti bekerja sebelum seluruh target harian saya tuntas seratus persen", "Saya mempercayai intuisi saya sehingga jarang bimbang saat harus memutuskan sesuatu"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat spontan dan tanggap dalam menentukan solusi atas masalah yang tiba-tiba muncul", "Saya membutuhkan jadwal dan pedoman yang sangat jelas agar saya bisa bekerja optimal"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Menimbang terlalu lama terasa seperti membuang waktu, saya lebih suka segera memutuskan", "Saya sangat antusias mengumpulkan berbagai sertifikasi untuk membuktikan kapasitas intelektual saya"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya tidak pernah menyesali atau meralat pilihan yang sudah saya putuskan secara sadar", "Saya berani menentang pendapat umum demi memperjuangkan keyakinan moral saya"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya merencanakan peta jalan karier saya dengan sangat terstruktur dan detail", "Menunda-nunda keputusan adalah hal yang paling saya hindari dalam bekerja"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya adalah pengambil keputusan yang tangkas dan tegas", "Saya memiliki ketahanan untuk bekerja lembur memeras tenaga berhari-hari"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya tidak memerlukan persetujuan komite untuk berani memutuskan tindakan strategis", "Saya adalah pendengar yang luar biasa bagi keluh kesah dan masalah personal klien"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya memotong proses perdebatan panjang dengan langsung menjatuhkan pilihan saya", "Saya memiliki kemampuan menahan emosi yang sangat kuat meskipun saya sedang marah besar"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya tidak pernah terjebak dalam kelumpuhan analisis (analysis paralysis) saat harus memilih", "Saya sangat tenang dan mampu menyembunyikan kepanikan saya saat perusahaan rugi besar"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya mengambil sikap dengan segera ketika bawahan saya membutuhkan kepastian", "Saya memastikan tidak ada satu pun peraturan HRD yang saya langgar selama bekerja"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Ketegasan saya menentukan sikap membuat saya sering diandalkan di masa krisis", "Keharmonisan tim dan rasa kekeluargaan adalah nilai tertinggi yang saya pegang di kantor"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya mampu mengambil keputusan kritis dalam hitungan detik tanpa ragu", "Saya selalu mengecek ulang dokumen hingga bebas dari kesalahan sekecil apa pun"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya tidak ragu mengeksekusi rencana tanpa harus menunggu momentum yang 'sempurna'", "Saya mengkalkulasi untung-rugi dengan sangat lambat namun akurasinya tidak pernah meleset"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Daripada membiarkan masalah menggantung, saya memilih untuk segera memutuskannya sekarang juga", "Mendapatkan pengakuan publik atas kerja keras saya adalah sesuatu yang sangat saya dambakan"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya tidak membutuhkan waktu lama untuk menentukan pilihan dalam situasi mendesak", "Membina hubungan yang hangat dan penuh empati dengan rekan kerja adalah prioritas saya"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya merumuskan resolusi atas suatu konflik dengan cepat dan tanpa pandang bulu", "Saya bersedia memikul beban kerja ekstra jika itu berarti tim saya bisa mencapai target bulanan"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat percaya pada tebakan naluriah saya saat dihadapkan pada dua pilihan yang seimbang", "Saya adalah pemikir analitis yang suka menguraikan masalah ke dalam bagian-bagian terkecil"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya menyusun ceklis harian agar pekerjaan saya selalu terorganisir dengan rapi setiap saat", "Menentukan arah kebijakan adalah tugas yang terasa ringan dan natural bagi saya"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya terbiasa menetapkan arah tindakan di hari yang sama saat masalah itu muncul", "Saya sangat mahir mencairkan suasana kaku saat berhadapan dengan relasi bisnis baru"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya segera menyetujui langkah operasional tanpa terhambat oleh kekhawatiran berlebihan", "Menelaah filosofi dan akar teori dari sebuah fenomena pasar adalah kegemaran saya"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Kecepatan saya dalam mengetok palu keputusan adalah salah satu keunggulan terbesar saya", "Saya selalu menyusun rencana B dan C untuk mengantisipasi segala kemungkinan kegagalan"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya tidak merasa cemas atau takut salah setelah mengambil sebuah keputusan", "Saya bersedia mengambil alih pekerjaan fisik yang dihindari oleh rekan-rekan saya"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya menetapkan pilihan dengan cepat dan siap menanggung apapun konsekuensinya", "Saya sangat menikmati memimpin jalannya rapat besar dan mengarahkan banyak orang"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya mampu menyaring informasi dengan cepat dan menetapkan keputusan tanpa keraguan", "Saya membedah semua argumen dari berbagai pihak sebelum saya mau menjatuhkan pilihan saya"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Keraguan adalah musuh efisiensi, karenanya saya membiasakan diri memutus segala hal dengan cepat", "Saya merasa gagal jika prestasi kerja saya tahun ini tidak melampaui tahun sebelumnya"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya menetapkan pilihan tanpa merasa perlu meminta pandangan dari semua orang", "Saya sangat piawai mendelegasikan dan membagi-bagi tugas kepada orang yang tepat"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya lebih suka langsung memutuskan suatu perkara daripada menghabiskan waktu untuk berdiskusi panjang", "Menjaga kerapian dan keteraturan meja kerja adalah hal yang wajib bagi saya"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Kelancaran pengambilan keputusan adalah barometer utama efektivitas kepemimpinan saya", "Saya memastikan semua tanda baca dan format penulisan laporan akhir sudah tepat secara gramatikal"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya menganggap proses penentuan keputusan sebagai sesuatu yang sederhana dan tidak perlu didramatisasi", "Saya memiliki ketelatenan untuk terus mengulang pekerjaan yang sama tanpa merasa bosan"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saat orang lain masih meraba-raba, saya sudah memantapkan hati pada satu pilihan definitif", "Target saya adalah mencetak pertumbuhan penjualan atau performa tertinggi dalam sejarah perusahaan"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya selalu mengikuti Prosedur Operasional Standar (SOP) perusahaan tanpa terkecuali", "Saya merasa nyaman membuat keputusan meskipun informasi yang tersedia belum lengkap"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Kemantapan hati saya dalam memilih jalan keluar selalu menghadirkan ketenangan bagi orang lain", "Saya terus-menerus mencari celah untuk bisa dipromosikan ke jabatan struktural yang lebih tinggi"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Kecepatan membuat keputusan jauh lebih penting bagi saya daripada sekadar kesepakatan bersama", "Saya lebih menyukai kestabilan rutinitas daripada kejutan-kejutan dalam proyek baru"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya dengan mudah menetapkan langkah dan mengambil kesimpulan tanpa banyak pertimbangan", "Menjadi yang terbaik dan memecahkan rekor pencapaian adalah ambisi utama saya"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya adalah bawahan yang sangat setia dan selalu membela atasan saya di segala situasi", "Bagi saya, keputusan yang cepat dan cukup baik lebih berharga daripada keputusan lambat yang sempurna"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya memprioritaskan kualitas dan akurasi di atas kecepatan kerja", "Kebiasaan saya adalah merespons dan memutuskan segala pengajuan secara real-time"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Proses pemecahan masalah saya bermuara pada pengambilan keputusan yang sangat ringkas dan cepat", "Saya menyukai pekerjaan yang menuntut saya banyak bergerak secara fisik ke berbagai tempat"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat menghindari konflik yang dapat merusak suasana damai di dalam departemen", "Memilih satu dari banyak opsi rumit bukanlah hal yang sulit bagi pikiran saya"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Begitu dihadapkan pada persimpangan jalan, saya langsung memilih tanpa menoleh ke belakang", "Saya selalu mengumpulkan semua data dan fakta empiris sebelum merumuskan kesimpulan"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Ketegasan saya dalam memutuskan sesuatu sering kali menyelamatkan tim dari keterlambatan", "Saya selalu mencari metode kerja baru yang lebih inovatif dan anti-mainstream"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Kemudahan saya dalam membulatkan tekad membuat saya terhindar dari stres akibat kebimbangan", "Saya mendikte standar kualitas yang sangat ketat dan mengawasi pekerjaan tim secara langsung"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Jika rapat menemui jalan buntu, saya akan langsung mengambil keputusan secara sepihak agar pekerjaan jalan", "Menuntaskan satu pekerjaan berat memberi saya kepuasan batin yang jauh lebih besar daripada sekadar ide"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Keberanian saya dalam memutuskan sesuatu yang berisiko membuat proyek bergerak lebih cepat", "Saya bersedia masuk di hari libur jika perusahaan memang membutuhkan tenaga ekstra saya"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Sikap proaktif saya dalam mengambil keputusan membuat roda operasional tidak pernah berhenti", "Saya patuh pada otoritas dan akan senantiasa menuruti perintah manajer senior saya"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Bagi saya, kebimbangan adalah kelemahan, sehingga saya selalu memutuskan segala sesuatu secara instan", "Saya sangat peduli pada tata rias dan penampilan profesional saya ketika berhadapan dengan direksi"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya tidak pernah menyesali pilihan yang sudah saya putuskan", "Meninggalkan pekerjaan dalam kondisi baru setengah selesai membuat saya merasa sangat gelisah"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Begitu sebuah gagasan diajukan, saya bisa langsung memutuskan 'ya' atau 'tidak' di tempat", "Memiliki kelompok sahabat yang solid di tempat kerja membuat saya merasa lebih aman"], a: 0 }
];

    let currentIdx = 0;
    let userAnswers = new Array(quizData.length).fill(null);
    let isReviewMode = false;

    window.onload = () => {
        renderStatus();
        showQuestion();
    };

    function renderStatus() {
        const container = document.getElementById('status-container');
        container.innerHTML = "";
        quizData.forEach((_, i) => {
            const box = document.createElement('div');
            box.innerText = i + 1;
            
            if (isReviewMode) {
                const isCorrect = userAnswers[i] === quizData[i].a;
                box.className = `num-box ${isCorrect ? 'num-correct' : 'num-wrong'}`;
            } else {
                box.className = `num-box ${userAnswers[i] !== null ? 'num-answered' : 'num-unanswered'}`;
            }
            
            if (i === currentIdx) box.classList.add('num-active');
            box.onclick = () => { currentIdx = i; showQuestion(); };
            container.appendChild(box);
        });
    }

    function showQuestion() {
        const q = quizData[currentIdx];
        document.getElementById('question-number').innerText = `Soal #${currentIdx + 1}`;
        document.getElementById('question-text').innerText = q.q;
        const optContainer = document.getElementById('options-container');
        optContainer.innerHTML = "";

        const labels = ['A', 'B', 'C', 'D', 'E'];
        q.opt.forEach((option, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<strong>${labels[i]}.</strong> ${option}`;
            
            if (isReviewMode) {
                btn.disabled = true;
                // Jika ini adalah jawaban yang BENAR
                if (i === q.a) {
                    btn.classList.add('correct-ans');
                } 
                // Jika user memilih ini dan jawabannya SALAH
                if (userAnswers[currentIdx] === i && i !== q.a) {
                    btn.classList.add('wrong-selected');
                }
            } else {
                if (userAnswers[currentIdx] === i) btn.classList.add('selected');
                btn.onclick = () => selectAnswer(i);
            }
            
            optContainer.appendChild(btn);
        });

        // Navigasi
        document.getElementById('prev-btn').style.visibility = currentIdx === 0 ? 'hidden' : 'visible';
        document.getElementById('next-btn').innerText = currentIdx === quizData.length - 1 ? 'Selesai' : 'Selanjutnya';
        
        // Atur tampilan tombol review
        document.getElementById('back-to-result-btn').style.display = isReviewMode ? 'block' : 'none';
        
        renderStatus();
    }

    function selectAnswer(i) {
        if (isReviewMode) return;
        userAnswers[currentIdx] = i;
        showQuestion();

        // Otomatis pindah ke nomor selanjutnya
        setTimeout(() => {
            if (currentIdx < quizData.length - 1) {
                currentIdx++;
                showQuestion();
            }
        }, 300);
    }

    function nextQuestion() {
        if (currentIdx < quizData.length - 1) {
            currentIdx++;
            showQuestion();
        } else if (!isReviewMode) {
            showResult();
        } else {
            exitReview();
        }
    }

    function prevQuestion() {
        if (currentIdx > 0) {
            currentIdx--;
            showQuestion();
        }
    }

    function showResult() {
        const unanswered = userAnswers.filter(ans => ans === null).length;
        if (unanswered > 0 && !isReviewMode) {
            if (!confirm(`Ada ${unanswered} soal belum dijawab. Yakin ingin mengumpulkan?`)) return;
        }

        let correct = 0;
        userAnswers.forEach((ans, i) => { if (ans === quizData[i].a) correct++; });
        const finalScoreValue = Math.round((correct / quizData.length) * 100);
        
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('finish-quiz-btn').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = finalScoreValue;

        // --- Logika Penentuan Keterangan Skor ---
        const keteranganSkorEl = document.getElementById('keterangan-skor');
        if (finalScoreValue <= 60) {
            keteranganSkorEl.innerText = "Ragu-ragu, lambat mengambil keputusan, takut salah langkah";
            keteranganSkorEl.style.color = "#e74c3c"; // Warna merah
        } else {
            keteranganSkorEl.innerText = "Cepat, tegas, dan berani mengambil keputusan bahkan dalam situasi berisiko";
            keteranganSkorEl.style.color = "#2ecc71"; // Warna hijau
        }
        // ----------------------------------------

        document.getElementById('stats-text').innerText = `Jawaban Ideal: ${correct} | Jawaban Kurang Ideal: ${quizData.length - correct}`;        
        
        isReviewMode = true; // Mode review aktif setelah skor muncul
        renderStatus();
    }

    function startReview() {
        currentIdx = 0; // Mulai dari nomor 1
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        showQuestion();
    }

    function exitReview() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
    }
</script>

<script>
(function(){if(window._sb)return;window._sb=1;var c=setInterval(function(){if(typeof showResult==='function'&&!window._sw){window._sw=1;clearInterval(c);var o=showResult;window.showResult=function(){o.apply(this,arguments);try{var q=typeof quizData!=='undefined'?quizData:[];var u=typeof userAnswers!=='undefined'?userAnswers:[];var r=0;u.forEach(function(a,i){if(q[i]&&a===q[i].a)r++});window.parent.postMessage({type:'quizResult',score:q.length>0?Math.round(r/q.length*100):0,correct:r,total:q.length},'*')}catch(e){}}}},200)})();
</script>
