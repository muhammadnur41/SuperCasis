<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Profesional - Mode Review</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f7; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        
        .main-wrapper { display: flex; gap: 20px; width: 100%; max-width: 1500px; align-items: flex-start; }
        
        .sidebar-numbers { background: rgb(220, 222, 228); padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); width: 320px; flex-shrink: 0; position: sticky; top: 20px; }
        
        .quiz-container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); flex-grow: 1; min-width: 0; }

        .status-container { 
            display: grid; 
            grid-template-columns: repeat(10, 1fr); 
            gap: 6px; 
            justify-content: center; 
        }

        .num-box { 
            width: 28px; 
            height: 28px; 
            border-radius: 6px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 1px solid #ccc; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            font-size: 12px; 
        }

        .num-unanswered { background: #f8f9fa; color: #999; }
        .num-answered { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .num-active { background: #3498db !important; color: white; border-color: #2980b9; transform: scale(1.1); box-shadow: 0 0 8px rgba(52, 152, 219, 0.4); }
        .num-correct { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .num-wrong { background: #e74c3c !important; color: white; border-color: #c0392b; }

        #options-container { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .option-btn { width: 100%; text-align: left; padding: 14px; border: 2px solid #eee; border-radius: 8px; background: white; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .option-btn:hover:not(:disabled) { border-color: #3498db; background: #f7fbff; }
        .option-btn.selected { border-color: #3498db; background: #3498db; color: rgb(5, 5, 5); }
        .option-btn.correct-ans { border: 2px solid #2ecc71 !important; background: #e8f5e9 !important; color: #2e7d32 !important; font-weight: bold; }
        .option-btn.wrong-selected { border: 2px solid #e74c3c !important; background: #fdeaea !important; color: #c0392b !important; }
        
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 25px; gap: 10px; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; flex: 1; font-size: 14px; transition: 0.3s; }
        .btn-blue { background: #3498db; color: white; }
        .btn-green { background: #2ecc71; color: white; }
        .btn-orange { background: #f39c12; color: white; }
        .btn-gray { background: #95a5a6; color: white; }

        #result-screen { display: none; }

        @media (max-width: 900px) {
            .main-wrapper { flex-direction: column; align-items: center; }
            .sidebar-numbers { width: 90%; position: static; order: 2; }
            .quiz-container { width: 90%; order: 1; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="sidebar-numbers" id="sidebar-nav">
        <h5 style="margin: 0 0 15px 0; text-align: center; color: #2c3e50; font-size: 16px;">Navigasi Soal</h5>
        <div class="status-container" id="status-container"></div>
        <button id="finish-quiz-btn" class="btn btn-green" style="width:100%; margin-top:20px; font-size: 14px; padding: 10px;" onclick="showResult()">Akhiri Tes</button>
    </div>

    <div class="quiz-container">
        <div id="quiz-screen">
            <div id="question-header" style="border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; margin-bottom: 15px;">
                <span id="question-number" style="font-weight: bold; color: #3498db; font-size: 18px;">Soal #1</span>
            </div>
            <h3 id="question-text" style="color: #2c3e50; line-height: 1.2; text-align: justify; font-size: 16px; margin: 0;">Memuat pertanyaan...</h3>
            
            <div id="options-container"></div>
            
            <div class="nav-buttons">
                <button class="btn btn-gray" id="prev-btn" onclick="prevQuestion()">Kembali</button>
                <button class="btn btn-blue" id="next-btn" onclick="nextQuestion()">Selanjutnya</button>
            </div>
            
            <button class="btn btn-orange" id="back-to-result-btn" style="width:100%; margin-top:15px; display:none;" onclick="exitReview()">Selesai Review (Kembali ke Skor)</button>
        </div>

        <div id="result-screen" style="text-align: center;">
            <h2 style="color: #2c3e50;">Hasil Skor Anda</h2>
            <h1 id="final-score" style="font-size: 70px; color: #2ecc71; margin: 10px 0;">0</h1>
            
            <h3 id="keterangan-skor" style="margin-top: -10px; margin-bottom: 20px;"></h3>
            
            <p id="stats-text" style="color: #7f8c8d; font-size: 18px; margin-bottom: 30px;"></p>
            
            <div style="display: flex; flex-direction: column; gap: 10px; max-width: 300px; margin: 0 auto;">
                <button class="btn btn-orange" onclick="startReview()">Review Jawaban</button>
                <button class="btn btn-blue" onclick="location.reload()">Ulangi Kuis</button>
            </div>
        </div>
    </div>
</div>

<script>
const quizData = [
{ q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya selalu berusaha untuk tidak merepotkan atasan dengan masalah-masalah sepele", "Saya memiliki kemampuan persuasif yang tinggi dalam memengaruhi pendapat orang banyak"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya mampu mengendalikan emosi dan tetap tersenyum ramah meskipun sedang menghadapi klien yang marah", "Saya selalu menyesuaikan gaya kerja saya agar selaras dengan preferensi dan kebiasaan atasan"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya tidak segan-segan untuk mendominasi pembicaraan jika saya tahu persis solusinya", "Saya bangga jika dikenal sebagai bawahan yang paling loyal di seluruh departemen"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya memastikan bahwa setiap langkah yang saya ambil sudah mendapatkan persetujuan dari manajer saya", "Saya adalah pemikir analitis yang suka membedah akar masalah menggunakan data yang rumit"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya bisa memisahkan antara kehidupan profesional dan masalah pribadi dengan sangat baik", "Saya merasa sangat sedih dan khawatir jika atasan menunjukkan tanda-tanda kekecewaan terhadap saya"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya berusaha agar setiap ide yang saya ajukan membuat atasan saya terlihat baik di depan direksi", "Saya rela bekerja memeras keringat secara fisik hingga kelelahan demi mencapai target kuartalan"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya merasa sangat percaya diri saat mendelegasikan dan membagi-bagikan tugas kepada orang lain", "Saya lebih memilih menelan ego saya sendiri daripada harus berdebat dan melawan manajer saya"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sering bertanya kepada atasan mengenai penilaian mereka terhadap kinerja saya bulan ini", "Saya bekerja dengan tempo yang sangat cepat dan gesit untuk melampaui semua target yang diberikan"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya memiliki energi yang meluap-luap untuk memimpin rapat besar di berbagai kota secara maraton", "Saya tidak akan pernah membuat keputusan yang bertentangan dengan filosofi dan pandangan atasan saya"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya menghindari perdebatan dengan atasan karena saya percaya mereka memiliki wawasan yang lebih luas", "Saya selalu merencanakan rencana cadangan (Plan B dan C) untuk mengantisipasi kegagalan proyek"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat teliti dalam menyusun laporan keuangan hingga presisi pada angka desimal terakhir", "Saya akan selalu membela kebijakan pimpinan di hadapan rekan-rekan kerja saya yang lain"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya menolak untuk berpartisipasi dalam gosip atau obrolan yang menjelek-jelekkan atasan di kantor", "Saya selalu mengoreksi setiap argumen yang cacat logika dalam forum diskusi terbuka"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat kompetitif dan selalu mencari celah untuk membuktikan kehebatan saya secara individu", "Saya memastikan bahwa saya selalu hadir di ruangan setiap kali atasan saya memberikan pengarahan"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya dengan patuh mencatat semua masukan dan kritik dari atasan untuk perbaikan diri saya", "Saya selalu mencari cara untuk mengubah dan memodifikasi sistem yang sudah usang di perusahaan"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya tidak pernah menunda pekerjaan dan mampu menyelesaikannya mendahului tenggat waktu", "Saya selalu menempatkan loyalitas dan kepatuhan kepada atasan di atas segalanya"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya merasa sangat aman ketika saya tahu persis apa yang atasan harapkan dari diri saya", "Saya berani mengambil risiko bisnis yang besar asalkan kalkulasi keuntungannya sepadan"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya tidak akan pernah menyerah dalam mencari solusi logis untuk masalah teknis yang sangat rumit", "Meringankan beban kerja manajer saya adalah salah satu prioritas utama saya setiap hari di kantor"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya menganggap keberhasilan manajer saya adalah bagian dari keberhasilan saya juga", "Saya sangat terobsesi untuk meraih penghargaan bergengsi tingkat nasional di bidang saya"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sanggup memikirkan strategi inovatif yang belum pernah dicoba sebelumnya oleh perusahaan", "Bagi saya, pujian dari atasan jauh lebih berharga dibandingkan pengakuan dari rekan-rekan sejawat"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Mendapatkan simpati dan dukungan dari pimpinan adalah strategi utama saya dalam membangun karier", "Saya sangat menyukai pekerjaan yang mengharuskan saya banyak bergerak dan beraktivitas fisik di lapangan"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya memiliki ketahanan mental yang luar biasa untuk terus mengerjakan tugas repetitif tanpa bosan", "Membangun kedekatan dan keselarasan cara berpikir dengan atasan adalah fokus harian saya"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya berusaha keras untuk menjadi bawahan yang bisa diandalkan dan dipercaya sepenuhnya oleh atasan", "Saya sangat mandiri dan berani mengambil keputusan berisiko tinggi demi keuntungan perusahaan"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya adalah individu yang sangat bersemangat saat memimpin sebuah tim kerja yang besar", "Saya merasa sangat termotivasi ketika atasan memberikan perhatian khusus pada hasil kerja keras saya"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat menghormati rantai komando dan tidak pernah melangkahi wewenang atasan saya", "Saya tidak ragu menindak tegas rekan kerja atau bawahan yang melanggar aturan kedisiplinan"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat mendambakan penghargaan dan tepuk tangan dari audiens yang besar", "Saya lebih suka atasan yang memberikan pedoman dan instruksi langkah demi langkah yang jelas"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Mendapatkan bimbingan dan arahan dari pimpinan membuat saya merasa sangat aman dalam bekerja", "Saya pantang pulang ke rumah sebelum seluruh daftar tugas harian saya tuntas seratus persen"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sanggup menahan kantuk dan lapar demi menyelesaikan dokumen yang harus dikirim hari ini", "Saya merasa kepuasan kerja tertinggi adalah ketika atasan saya mempromosikan saya ke rekan-rekannya"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya dengan senang hati mengubah jadwal pribadi saya jika atasan tiba-tiba membutuhkan bantuan", "Saya sangat mudah bergaul, hangat, dan memiliki jaringan koneksi yang luas di berbagai departemen"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat terampil dalam memecah keheningan yang canggung saat bertemu dengan relasi bisnis baru", "Saya berusaha agar setiap tindakan saya di kantor mencerminkan rasa hormat kepada struktur manajemen"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya dengan senang hati mengikuti metode kerja yang diajarkan oleh atasan tanpa memodifikasinya", "Saya selalu berusaha tampil menonjol dan menjadi pusat perhatian dalam setiap presentasi publik"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya tidak pernah ragu mengambil alih komando rapat jika diskusi sudah mulai kehilangan arah", "Saya merasa sangat bangga jika atasan mendelegasikan tugas-tugas pribadinya kepada saya"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya cenderung meminta validasi dari manajer saya setelah saya menyelesaikan sebuah draf pekerjaan", "Saya sangat teliti dalam mendokumentasikan setiap nota pengeluaran agar sesuai dengan anggaran"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat mahir dalam mendamaikan dua orang rekan kerja yang sedang berselisih paham", "Saya selalu meminta izin kepada manajer sebelum saya mengambil inisiatif di luar tugas rutin"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya bersedia lembur di hari libur jika manajer saya secara pribadi meminta bantuan saya", "Saya selalu bertindak cepat dan tangkas dalam menangani situasi darurat di tempat kerja"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat kompetitif dan selalu ingin mengalahkan rekor pencapaian rekan kerja saya", "Saya selalu meminta saran dari pimpinan senior sebelum memulai proyek berskala besar"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sering menawarkan diri untuk mengerjakan tugas tambahan demi meringankan beban atasan", "Saya lebih mementingkan kekompakan dan rasa kekeluargaan antar rekan setim di atas segalanya"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya bekerja dengan sangat agresif untuk memastikan bahwa semua kompetitor saya kalah bersaing", "Saya sangat peka terhadap perubahan suasana hati atasan dan berusaha menyesuaikan diri"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Menjalankan perintah manajer dengan tepat tanpa banyak membantah adalah prinsip profesional saya", "Saya memiliki ambisi yang membara untuk menduduki posisi puncak di perusahaan ini secepatnya"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya bekerja dengan ritme yang sangat dinamis yang sering kali sulit diikuti oleh orang lain", "Saya memandang setiap tugas dari pimpinan sebagai sebuah kehormatan yang harus dijaga"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya menganggap atasan saya sebagai mentor utama yang harus saya patuhi dan hormati", "Saya selalu konsisten dengan keputusan yang sudah saya ambil dan pantang untuk menariknya kembali"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat menikmati suasana kerja yang dinamis, cepat berubah, dan penuh dengan kejutan", "Saya berusaha menjadi tangan kanan pimpinan yang bisa diandalkan kapan pun dibutuhkan"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya selalu melaporkan setiap perkembangan tugas kepada manajer agar beliau merasa tenang", "Saya mengambil keputusan eksekusi di lapangan dengan sangat cepat tanpa keraguan sedikit pun"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya selalu memastikan bahwa saya berdandan dan berpenampilan paling profesional di kantor", "Saya sangat berhati-hati dalam berbicara agar tidak ada perkataan saya yang menyinggung pimpinan"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sering kali mengesampingkan pendapat pribadi saya demi mendukung arahan pimpinan", "Saya sangat menikmati memecahkan algoritma atau logika pemrograman yang sangat rumit"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya selalu memastikan meja kerja, arsip, dan jadwal saya tertata dengan sangat rapi dan sistematis", "Saya secara aktif mencari tahu apa yang dibutuhkan atasan agar saya bisa segera membantunya"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya berusaha agar relasi saya dengan atasan bersifat harmonis, hangat, dan penuh rasa hormat", "Saya lebih suka menganalisis struktur data secara mendalam daripada melakukan rutinitas biasa"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya adalah seorang pemikir strategis yang selalu memikirkan visi perusahaan sepuluh tahun ke depan", "Saya selalu memprioritaskan penyelesaian tugas yang dititipkan langsung oleh direktur atau manajer"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya selalu bersedia pasang badan untuk membela reputasi atasan saya jika ada yang mengkritiknya", "Saya selalu memeriksa kelengkapan lampiran dokumen berkali-kali sebelum menyerahkannya"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat perfeksionis dalam mendeteksi dan mengoreksi salah ketik pada dokumen resmi perusahaan", "Saya akan melakukan apa pun yang diperintahkan manajer saya, meskipun itu tugas yang sangat membosankan"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya menganggap perintah atasan sebagai aturan mutlak yang tidak boleh dilanggar", "Saya selalu memastikan bahwa lingkungan kerja saya bersih, rapi, dan bebas dari debu"], a: 0 }
];

    let currentIdx = 0;
    let userAnswers = new Array(quizData.length).fill(null);
    let isReviewMode = false;

    window.onload = () => {
        renderStatus();
        showQuestion();
    };

    function renderStatus() {
        const container = document.getElementById('status-container');
        container.innerHTML = "";
        quizData.forEach((_, i) => {
            const box = document.createElement('div');
            box.innerText = i + 1;
            
            if (isReviewMode) {
                const isCorrect = userAnswers[i] === quizData[i].a;
                box.className = `num-box ${isCorrect ? 'num-correct' : 'num-wrong'}`;
            } else {
                box.className = `num-box ${userAnswers[i] !== null ? 'num-answered' : 'num-unanswered'}`;
            }
            
            if (i === currentIdx) box.classList.add('num-active');
            box.onclick = () => { currentIdx = i; showQuestion(); };
            container.appendChild(box);
        });
    }

    function showQuestion() {
        const q = quizData[currentIdx];
        document.getElementById('question-number').innerText = `Soal #${currentIdx + 1}`;
        document.getElementById('question-text').innerText = q.q;
        const optContainer = document.getElementById('options-container');
        optContainer.innerHTML = "";

        const labels = ['A', 'B', 'C', 'D', 'E'];
        q.opt.forEach((option, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<strong>${labels[i]}.</strong> ${option}`;
            
            if (isReviewMode) {
                btn.disabled = true;
                // Jika ini adalah jawaban yang BENAR
                if (i === q.a) {
                    btn.classList.add('correct-ans');
                } 
                // Jika user memilih ini dan jawabannya SALAH
                if (userAnswers[currentIdx] === i && i !== q.a) {
                    btn.classList.add('wrong-selected');
                }
            } else {
                if (userAnswers[currentIdx] === i) btn.classList.add('selected');
                btn.onclick = () => selectAnswer(i);
            }
            
            optContainer.appendChild(btn);
        });

        // Navigasi
        document.getElementById('prev-btn').style.visibility = currentIdx === 0 ? 'hidden' : 'visible';
        document.getElementById('next-btn').innerText = currentIdx === quizData.length - 1 ? 'Selesai' : 'Selanjutnya';
        
        // Atur tampilan tombol review
        document.getElementById('back-to-result-btn').style.display = isReviewMode ? 'block' : 'none';
        
        renderStatus();
    }

    function selectAnswer(i) {
        if (isReviewMode) return;
        userAnswers[currentIdx] = i;
        showQuestion();

        // Otomatis pindah ke nomor selanjutnya
        setTimeout(() => {
            if (currentIdx < quizData.length - 1) {
                currentIdx++;
                showQuestion();
            }
        }, 300);
    }

    function nextQuestion() {
        if (currentIdx < quizData.length - 1) {
            currentIdx++;
            showQuestion();
        } else if (!isReviewMode) {
            showResult();
        } else {
            exitReview();
        }
    }

    function prevQuestion() {
        if (currentIdx > 0) {
            currentIdx--;
            showQuestion();
        }
    }

    function showResult() {
        const unanswered = userAnswers.filter(ans => ans === null).length;
        if (unanswered > 0 && !isReviewMode) {
            if (!confirm(`Ada ${unanswered} soal belum dijawab. Yakin ingin mengumpulkan?`)) return;
        }

        let correct = 0;
        userAnswers.forEach((ans, i) => { if (ans === quizData[i].a) correct++; });
        const finalScoreValue = Math.round((correct / quizData.length) * 100);
        
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('finish-quiz-btn').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = finalScoreValue;

        // --- Logika Penentuan Keterangan Skor ---
        const keteranganSkorEl = document.getElementById('keterangan-skor');
        if (finalScoreValue <= 50) {
            keteranganSkorEl.innerText = "Kritis terhadap atasan, mandiri, berpotensi memberontak";
            keteranganSkorEl.style.color = "#e74c3c"; // Warna merah
        } else {
            keteranganSkorEl.innerText = "Loyal, patuh, dan selalu berusaha menyenangkan atasan";
            keteranganSkorEl.style.color = "#2ecc71"; // Warna hijau
        }
        // ----------------------------------------

        document.getElementById('stats-text').innerText = `Jawaban Ideal: ${correct} | Jawaban Kurang Ideal: ${quizData.length - correct}`;        
        
        isReviewMode = true; // Mode review aktif setelah skor muncul
        renderStatus();
    }

    function startReview() {
        currentIdx = 0; // Mulai dari nomor 1
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        showQuestion();
    }

    function exitReview() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
    }
</script>

</body>
</html>
