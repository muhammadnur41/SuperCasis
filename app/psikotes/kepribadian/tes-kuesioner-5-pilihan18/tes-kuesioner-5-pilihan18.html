<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Profesional - Mode Review</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f7; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        
        .main-wrapper { display: flex; gap: 20px; width: 100%; max-width: 1500px; align-items: flex-start; }
        
        .sidebar-numbers { background: rgb(220, 222, 228); padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); width: 320px; flex-shrink: 0; position: sticky; top: 20px; }
        
        .quiz-container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); flex-grow: 1; min-width: 0; }

        .status-container { 
            display: grid; 
            grid-template-columns: repeat(10, 1fr); 
            gap: 6px; 
            justify-content: center; 
        }

        .num-box { 
            width: 28px; 
            height: 28px; 
            border-radius: 6px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 1px solid #ccc; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            font-size: 12px; 
        }

        .num-unanswered { background: #f8f9fa; color: #999; }
        .num-answered { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .num-active { background: #3498db !important; color: white; border-color: #2980b9; transform: scale(1.1); box-shadow: 0 0 8px rgba(52, 152, 219, 0.4); }
        .num-correct { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .num-wrong { background: #e74c3c !important; color: white; border-color: #c0392b; }

        #options-container { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .option-btn { width: 100%; text-align: left; padding: 14px; border: 2px solid #eee; border-radius: 8px; background: white; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .option-btn:hover:not(:disabled) { border-color: #3498db; background: #f7fbff; }
        .option-btn.selected { border-color: #3498db; background: #3498db; color: rgb(5, 5, 5); }
        .option-btn.correct-ans { border: 2px solid #2ecc71 !important; background: #e8f5e9 !important; color: #2e7d32 !important; font-weight: bold; }
        .option-btn.wrong-selected { border: 2px solid #e74c3c !important; background: #fdeaea !important; color: #c0392b !important; }
        
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 25px; gap: 10px; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; flex: 1; font-size: 14px; transition: 0.3s; }
        .btn-blue { background: #3498db; color: white; }
        .btn-green { background: #2ecc71; color: white; }
        .btn-orange { background: #f39c12; color: white; }
        .btn-gray { background: #95a5a6; color: white; }

        #result-screen { display: none; }

        @media (max-width: 900px) {
            .main-wrapper { flex-direction: column; align-items: center; }
            .sidebar-numbers { width: 90%; position: static; order: 2; }
            .quiz-container { width: 90%; order: 1; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="sidebar-numbers" id="sidebar-nav">
        <h5 style="margin: 0 0 15px 0; text-align: center; color: #2c3e50; font-size: 16px;">Navigasi Soal</h5>
        <div class="status-container" id="status-container"></div>
        <button id="finish-quiz-btn" class="btn btn-green" style="width:100%; margin-top:20px; font-size: 14px; padding: 10px;" onclick="showResult()">Akhiri Tes</button>
    </div>

    <div class="quiz-container">
        <div id="quiz-screen">
            <div id="question-header" style="border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; margin-bottom: 15px;">
                <span id="question-number" style="font-weight: bold; color: #3498db; font-size: 18px;">Soal #1</span>
            </div>
            <h3 id="question-text" style="color: #2c3e50; line-height: 1.2; text-align: justify; font-size: 16px; margin: 0;">Memuat pertanyaan...</h3>
            
            <div id="options-container"></div>
            
            <div class="nav-buttons">
                <button class="btn btn-gray" id="prev-btn" onclick="prevQuestion()">Kembali</button>
                <button class="btn btn-blue" id="next-btn" onclick="nextQuestion()">Selanjutnya</button>
            </div>
            
            <button class="btn btn-orange" id="back-to-result-btn" style="width:100%; margin-top:15px; display:none;" onclick="exitReview()">Selesai Review (Kembali ke Skor)</button>
        </div>

        <div id="result-screen" style="text-align: center;">
            <h2 style="color: #2c3e50;">Hasil Skor Anda</h2>
            <h1 id="final-score" style="font-size: 70px; color: #2ecc71; margin: 10px 0;">0</h1>
            
            <h3 id="keterangan-skor" style="margin-top: -10px; margin-bottom: 20px;"></h3>
            
            <p id="stats-text" style="color: #7f8c8d; font-size: 18px; margin-bottom: 30px;"></p>
            
            <div style="display: flex; flex-direction: column; gap: 10px; max-width: 300px; margin: 0 auto;">
                <button class="btn btn-orange" onclick="startReview()">Review Jawaban</button>
                <button class="btn btn-blue" onclick="location.reload()">Ulangi Kuis</button>
            </div>
        </div>
    </div>
</div>

<script>
const quizData = [
    { q: "Saya merasa termotivasi ketika dihadapkan pada tugas yang dianggap mustahil oleh orang lain.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 0 },
    { q: "Saya sering merasa bingung ketika harus mengambil keputusan tanpa arahan dari atasan.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 4 },
    { q: "Saya akan menunda istirahat jika pekerjaan saya belum selesai dengan sempurna.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 0 },
    { q: "Saya lebih suka bekerja secara individual karena saya tidak bisa mempercayai kualitas kerja orang lain.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 4 },
    { q: "Saya menghargai aturan, tetapi akan melanggarnya sedikit jika keadaan di lapangan sangat mendesak.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 4 },
    { q: "Saya mudah akrab dengan rekan kerja baru di lingkungan instansi tempat saya ditugaskan.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 0 },
    { q: "Saya merasa gugup dan panik saat dipanggil oleh pimpinan secara mendadak.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 4 },
    { q: "Saya akan menerima keputusan mayoritas tim meskipun bertentangan dengan pendapat pribadi saya, selama tidak melanggar aturan.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 0 },
    { q: "Saya terkadang membicarakan keburukan atasan atau institusi kepada rekan sejawat di luar jam kerja.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 4 },
    { q: "Saya yakin bahwa kemampuan saya akan terus berkembang seiring berjalannya waktu dan bertambahnya pengalaman.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 0 },
    { q: "Saya merasa kesulitan untuk menahan emosi ketika berinteraksi dengan warga masyarakat yang bersikap kasar.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 4 },
    { q: "Saya merapikan kembali ruang atau tempat kerja saya setiap kali selesai bertugas.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 0 },
    { q: "Saya mudah terpengaruh oleh isu atau rumor yang belum jelas kebenarannya di lingkungan kantor.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 4 },
    { q: "Saya tidak segan memberikan pujian secara tulus atas keberhasilan yang diraih oleh rekan kerja saya.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 0 },
    { q: "Saya merasa frustrasi dan marah ketika rekan satu tim bekerja lebih lambat dari saya.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 4 },
    { q: "Saya selalu menyusun skala prioritas sebelum memulai serangkaian pekerjaan setiap harinya.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 0 },
    { q: "Saya cenderung mengabaikan panggilan tugas setelah jam dinas selesai, terlepas dari urgensinya.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 4 },
    { q: "Saya bersedia menggantikan jadwal piket atau tugas lapangan rekan yang sedang tertimpa musibah.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 0 },
    { q: "Saya sering merasa kurang percaya diri dengan penampilan fisik saya saat mengenakan seragam dinas.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 4 },
    { q: "Saya lebih suka menyerahkan tugas yang sulit kepada orang lain agar terhindar dari risiko kegagalan.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 4 },
    { q: "Saya merasa tertantang untuk mempelajari hal-hal di luar bidang kemampuan utama saya.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 0 },
    { q: "Saya akan memprioritaskan pelayanan untuk kerabat atau teman dekat jika mereka membutuhkan bantuan dinas saya.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 4 },
    { q: "Saya selalu memastikan instruksi yang saya berikan dipahami dengan jelas oleh rekan atau bawahan saya.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 0 },
    { q: "Saya cenderung diam saja saat melihat ada rekan kerja yang melakukan pungutan liar atau pelanggaran kecil.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 4 },
    { q: "Saya mampu menjaga intonasi suara tetap datar dan sopan meskipun di dalam hati saya sedang sangat marah.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 0 },
    { q: "Saya memandang mutasi kerja ke daerah tertinggal atau perbatasan sebagai sebuah hukuman.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 4 },
    { q: "Saya selalu memverifikasi data dan kebenaran sebuah informasi sebelum menyampaikannya kepada pimpinan.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 0 },
    { q: "Saya merasa iri atau demotivasi jika saya tidak ditunjuk dalam satuan tugas (Satgas) bergengsi oleh atasan.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 4 },
    { q: "Saya antusias mengikuti rutinitas apel pagi sebagai bentuk kesiapan fisik, mental, dan koordinasi tim.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 0 },
    { q: "Saya merasa tidak perlu menyesuaikan diri dengan norma budaya lokal tempat saya bertugas karena saya aparat penegak hukum.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 4 },
    { q: "Saya berani meminta maaf secara terbuka jika saya membuat kelalaian dalam pelaksanaan tugas.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 0 },
    { q: "Saya menghargai dan menjamin perlakuan setara bagi individu dari segala latar belakang agama dan suku.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 0 },
    { q: "Saya mudah merasa jengkel bila harus menunggu proses birokrasi atau instruksi yang memakan waktu lama.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 4 },
    { q: "Saya secara tegas menolak bingkisan, uang, atau fasilitas dari pihak yang saya bantu dalam pelaksanaan tugas.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 0 },
    { q: "Saya enggan bertegur sapa dengan rekan kerja yang pernah berkonflik keras dengan saya di masa lalu.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 4 },
    { q: "Saya secara berkala melakukan evaluasi mandiri (introspeksi) terhadap kesalahan-kesalahan yang saya buat.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 0 },
    { q: "Saya lebih menyukai pekerjaan mekanis yang hanya disuruh-suruh, ketimbang diminta merumuskan inisiatif/ide baru.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 4 },
    { q: "Saya bersedia tetap bekerja pada hari raya keagamaan besar apabila negara memanggil untuk pengamanan.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 0 },
    { q: "Saya menganggap atasan sebagai musuh ketika mereka menegur keras hasil pekerjaan saya.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 4 },
    { q: "Saya tidak akan membocorkan data operasional atau taktik instansi kepada siapa pun meskipun ditawari imbalan materi.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 0 },
    { q: "Saya cepat terbawa emosi dan membalas argumen ketika merasa pendapat saya disepelekan dalam forum diskusi.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 4 },
    { q: "Saya mampu bekerja sama sama baiknya dengan orang yang baru saya temui hari ini maupun kawan lama saya.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 0 },
    { q: "Saya menghindari kesempatan menjadi pimpinan regu semata-mata agar terhindar dari beban tanggung jawab besar.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 4 },
    { q: "Saya memastikan bahwa keluarga mengerti, menerima, dan mendukung penuh profesi saya yang menuntut jam kerja tak beraturan.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 0 },
    { q: "Saya akan mendahulukan menolong warga masyarakat yang mengalami kecelakaan medis darurat dibandingkan tugas administrasi kantor.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 0 },
    { q: "Saya percaya bahwa kesuksesan sebuah misi besar adalah hasil jerih payah tim, bukan semata kehebatan individu saya.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 0 },
    { q: "Saya akan menggunakan aset dan kendaraan dinas institusi untuk keperluan liburan keluarga jika sedang tidak digunakan.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 4 },
    { q: "Saya merespons panggilan darurat masyarakat dengan sikap empati, bukan menganggapnya sebagai gangguan kerja.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 0 },
    { q: "Saya cenderung fokus pada solusi dibanding terus-menerus meratapi masalah yang sedang terjadi di lapangan.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 0 },
    { q: "Saya siap menerima sanksi teguran hingga pemecatan dari institusi apabila saya terbukti melanggar kode etik secara berat.", opt: ["Sangat Setuju", "Setuju", "Netral", "Tidak Setuju", "Sangat Tidak Setuju"], a: 0 }
];

    let currentIdx = 0;
    let userAnswers = new Array(quizData.length).fill(null);
    let isReviewMode = false;

    window.onload = () => {
        renderStatus();
        showQuestion();
    };

    function renderStatus() {
        const container = document.getElementById('status-container');
        container.innerHTML = "";
        quizData.forEach((_, i) => {
            const box = document.createElement('div');
            box.innerText = i + 1;
            
            if (isReviewMode) {
                const isCorrect = userAnswers[i] === quizData[i].a;
                box.className = `num-box ${isCorrect ? 'num-correct' : 'num-wrong'}`;
            } else {
                box.className = `num-box ${userAnswers[i] !== null ? 'num-answered' : 'num-unanswered'}`;
            }
            
            if (i === currentIdx) box.classList.add('num-active');
            box.onclick = () => { currentIdx = i; showQuestion(); };
            container.appendChild(box);
        });
    }

    function showQuestion() {
        const q = quizData[currentIdx];
        document.getElementById('question-number').innerText = `Soal #${currentIdx + 1}`;
        document.getElementById('question-text').innerText = q.q;
        const optContainer = document.getElementById('options-container');
        optContainer.innerHTML = "";

        const labels = ['A', 'B', 'C', 'D', 'E'];
        q.opt.forEach((option, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<strong>${labels[i]}.</strong> ${option}`;
            
            if (isReviewMode) {
                btn.disabled = true;
                // Jika ini adalah jawaban yang BENAR
                if (i === q.a) {
                    btn.classList.add('correct-ans');
                } 
                // Jika user memilih ini dan jawabannya SALAH
                if (userAnswers[currentIdx] === i && i !== q.a) {
                    btn.classList.add('wrong-selected');
                }
            } else {
                if (userAnswers[currentIdx] === i) btn.classList.add('selected');
                btn.onclick = () => selectAnswer(i);
            }
            
            optContainer.appendChild(btn);
        });

        // Navigasi
        document.getElementById('prev-btn').style.visibility = currentIdx === 0 ? 'hidden' : 'visible';
        document.getElementById('next-btn').innerText = currentIdx === quizData.length - 1 ? 'Selesai' : 'Selanjutnya';
        
        // Atur tampilan tombol review
        document.getElementById('back-to-result-btn').style.display = isReviewMode ? 'block' : 'none';
        
        renderStatus();
    }

    function selectAnswer(i) {
        if (isReviewMode) return;
        userAnswers[currentIdx] = i;
        showQuestion();

        // Otomatis pindah ke nomor selanjutnya
        setTimeout(() => {
            if (currentIdx < quizData.length - 1) {
                currentIdx++;
                showQuestion();
            }
        }, 300);
    }

    function nextQuestion() {
        if (currentIdx < quizData.length - 1) {
            currentIdx++;
            showQuestion();
        } else if (!isReviewMode) {
            showResult();
        } else {
            exitReview();
        }
    }

    function prevQuestion() {
        if (currentIdx > 0) {
            currentIdx--;
            showQuestion();
        }
    }

    function showResult() {
        const unanswered = userAnswers.filter(ans => ans === null).length;
        if (unanswered > 0 && !isReviewMode) {
            if (!confirm(`Ada ${unanswered} soal belum dijawab. Yakin ingin mengumpulkan?`)) return;
        }

        let correct = 0;
        userAnswers.forEach((ans, i) => { if (ans === quizData[i].a) correct++; });
        const finalScoreValue = Math.round((correct / quizData.length) * 100);
        
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('finish-quiz-btn').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = finalScoreValue;

        // --- Logika Penentuan Keterangan Skor ---
        const keteranganSkorEl = document.getElementById('keterangan-skor');
        if (finalScoreValue <= 50) {
            keteranganSkorEl.innerText = "KURANG IDEAL";
            keteranganSkorEl.style.color = "#e74c3c"; // Warna merah
        } else {
            keteranganSkorEl.innerText = "IDEAL";
            keteranganSkorEl.style.color = "#2ecc71"; // Warna hijau
        }
        // ----------------------------------------

        document.getElementById('stats-text').innerText = `Benar: ${correct} | Salah: ${quizData.length - correct}`;
        
        isReviewMode = true; // Mode review aktif setelah skor muncul
        renderStatus();
    }

    function startReview() {
        currentIdx = 0; // Mulai dari nomor 1
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        showQuestion();
    }

    function exitReview() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
    }
</script>

</body>
</html>
