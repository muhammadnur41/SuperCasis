<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Profesional - Mode Review</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f7; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        
        .main-wrapper { display: flex; gap: 20px; width: 100%; max-width: 1500px; align-items: flex-start; }
        
        .sidebar-numbers { background: rgb(220, 222, 228); padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); width: 320px; flex-shrink: 0; position: sticky; top: 20px; }
        
        .quiz-container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); flex-grow: 1; min-width: 0; }

        .status-container { 
            display: grid; 
            grid-template-columns: repeat(10, 1fr); 
            gap: 6px; 
            justify-content: center; 
        }

        .num-box { 
            width: 28px; 
            height: 28px; 
            border-radius: 6px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 1px solid #ccc; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            font-size: 12px; 
        }

        .num-unanswered { background: #f8f9fa; color: #999; }
        .num-answered { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .num-active { background: #3498db !important; color: white; border-color: #2980b9; transform: scale(1.1); box-shadow: 0 0 8px rgba(52, 152, 219, 0.4); }
        .num-correct { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .num-wrong { background: #e74c3c !important; color: white; border-color: #c0392b; }

        #options-container { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .option-btn { width: 100%; text-align: left; padding: 14px; border: 2px solid #eee; border-radius: 8px; background: white; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .option-btn:hover:not(:disabled) { border-color: #3498db; background: #f7fbff; }
        .option-btn.selected { border-color: #3498db; background: #3498db; color: rgb(5, 5, 5); }
        .option-btn.correct-ans { border: 2px solid #2ecc71 !important; background: #e8f5e9 !important; color: #2e7d32 !important; font-weight: bold; }
        .option-btn.wrong-selected { border: 2px solid #e74c3c !important; background: #fdeaea !important; color: #c0392b !important; }
        
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 25px; gap: 10px; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; flex: 1; font-size: 14px; transition: 0.3s; }
        .btn-blue { background: #3498db; color: white; }
        .btn-green { background: #2ecc71; color: white; }
        .btn-orange { background: #f39c12; color: white; }
        .btn-gray { background: #95a5a6; color: white; }

        #result-screen { display: none; }

        @media (max-width: 900px) {
            .main-wrapper { flex-direction: column; align-items: center; }
            .sidebar-numbers { width: 90%; position: static; order: 2; }
            .quiz-container { width: 90%; order: 1; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="sidebar-numbers" id="sidebar-nav">
        <h5 style="margin: 0 0 15px 0; text-align: center; color: #2c3e50; font-size: 16px;">Navigasi Soal</h5>
        <div class="status-container" id="status-container"></div>
        <button id="finish-quiz-btn" class="btn btn-green" style="width:100%; margin-top:20px; font-size: 14px; padding: 10px;" onclick="showResult()">Akhiri Tes</button>
    </div>

    <div class="quiz-container">
        <div id="quiz-screen">
            <div id="question-header" style="border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; margin-bottom: 15px;">
                <span id="question-number" style="font-weight: bold; color: #3498db; font-size: 18px;">Soal #1</span>
            </div>
            <h3 id="question-text" style="color: #2c3e50; line-height: 1.2; text-align: justify; font-size: 16px; margin: 0;">Memuat pertanyaan...</h3>
            
            <div id="options-container"></div>
            
            <div class="nav-buttons">
                <button class="btn btn-gray" id="prev-btn" onclick="prevQuestion()">Kembali</button>
                <button class="btn btn-blue" id="next-btn" onclick="nextQuestion()">Selanjutnya</button>
            </div>
            
            <button class="btn btn-orange" id="back-to-result-btn" style="width:100%; margin-top:15px; display:none;" onclick="exitReview()">Selesai Review (Kembali ke Skor)</button>
        </div>

        <div id="result-screen" style="text-align: center;">
            <h2 style="color: #2c3e50;">Hasil Skor Anda</h2>
            <h1 id="final-score" style="font-size: 70px; color: #2ecc71; margin: 10px 0;">0</h1>
            
            <h3 id="keterangan-skor" style="margin-top: -10px; margin-bottom: 20px;"></h3>
            
            <p id="stats-text" style="color: #7f8c8d; font-size: 18px; margin-bottom: 30px;"></p>
            
            <div style="display: flex; flex-direction: column; gap: 10px; max-width: 300px; margin: 0 auto;">
                <button class="btn btn-orange" onclick="startReview()">Review Jawaban</button>
                <button class="btn btn-blue" onclick="location.reload()">Ulangi Kuis</button>
            </div>
        </div>
    </div>
</div>

<script>
const quizData = [
    { q: "Saya akan memproses kasus secara adil meskipun tersangka adalah pejabat tinggi.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 3 },
    { q: "Saya sering membeda-bedakan perlakuan berdasarkan latar belakang sosial.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 0 },
    { q: "Saya bersedia menjadi saksi dalam kasus korupsi yang melibatkan rekan sendiri.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 3 },
    { q: "Saya akan tetap objektif meskipun tersangka adalah saudara kandung.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 3 },
    { q: "Saya sering menggunakan kewenangan untuk mempermudah urusan pribadi.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 0 },
    { q: "Saya akan menolak intervensi dari pihak manapun dalam proses hukum.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 3 },
    { q: "Saya bersedia mengakui kekeliruan dalam putusan yang telah saya buat.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 3 },
    { q: "Saya lebih percaya pada bukti daripada pada testimoni saksi yang tidak jelas.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 3 },
    { q: "Saya pernah menerima hadiah dari pihak yang sedang saya tangani perkaranya.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 0 },
    { q: "Saya akan tetap profesional meskipun diperlakukan kasar oleh tersangka.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 3 },
    { q: "Saya sering menunda-nunda penyelesaian kasus karena malas.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 0 },
    { q: "Saya mampu menjaga kerahasiaan penyidikan meskipun ditekan oleh media.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 3 },
    { q: "Saya akan memeriksa semua bukti secara teliti tanpa terburu-buru.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 3 },
    { q: "Saya cenderung menerima kesimpulan yang mudah tanpa verifikasi lebih lanjut.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 0 },
    { q: "Saya bersedia direlokasi ke daerah rawan konflik jika dibutuhkan.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 3 },
    { q: "Saya akan tetap tenang saat dihadapkan pada ancaman fisik dari preman.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 3 },
    { q: "Saya sering menggunakan kekerasan berlebihan saat mengamankan demonstrasi.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 0 },
    { q: "Saya mampu bernegosiasi dengan kelompok radikal tanpa kehilangan prinsip.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 3 },
    { q: "Saya lebih suka menyelesaikan perkara secara damai di luar hukum.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 0 },
    { q: "Saya akan tetap menegakkan hukum meskipun banyak yang meminta keringanan.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 3 },
    { q: "Saya sering memanfaatkan celah hukum untuk keuntungan pribadi.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 0 },
    { q: "Saya bersedia mempelajari peraturan baru meskipun sudah sangat sibuk.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 3 },
    { q: "Saya lebih percaya pada intuisi daripada data dalam penyidikan.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 0 },
    { q: "Saya akan tetap ramah kepada masyarakat meskipun mereka memusuhi saya.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 3 },
    { q: "Saya sering mengabaikan protokol karena menganggapnya tidak penting.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 0 },
    { q: "Saya mampu menjaga emosi saat dihina oleh korban yang kecewa.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 3 },
    { q: "Saya akan tetap melayani masyarakat dengan tulus meskipun tanpa imbalan.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 3 },
    { q: "Saya sering mangkir dari piket malam dengan alasan sakit.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 0 },
    { q: "Saya bersedia menjadi bagian dari tim antikorupsi meskipun berbahaya.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 3 },
    { q: "Saya akan tetap bekerja keras meskipun tidak ada yang mengawasi.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 3 },
    { q: "Saya sering memotivasi diri sendiri dengan target yang tidak realistis.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 0 },
    { q: "Saya mampu menerima keputusan pimpinan meskipun tidak sesuai harapan saya.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 3 },
    { q: "Saya akan tetap jujur dalam laporan keuangan meskipun akan mengurangi anggaran unit.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 3 },
    { q: "Saya sering mencampuradukkan urusan dinas dengan bisnis pribadi.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 0 },
    { q: "Saya mampu bekerja secara sistematis meskipun tanpa pengawasan langsung.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 3 },
    { q: "Saya akan tetap rendah hati meskipun mendapat penghargaan tinggi.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 3 },
    { q: "Saya sering kali menyalahgunakan wewenang untuk menekan tersangka.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 0 },
    { q: "Saya bersedia mengikuti pendidikan lanjutan meskipun harus meninggalkan keluarga.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 3 },
    { q: "Saya akan tetap menegur rekan yang merokok di area terlarang.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 3 },
    { q: "Saya sering menggunakan telepon dinas untuk urusan pribadi.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 0 },
    { q: "Saya mampu mengatur prioritas dengan baik saat banyak tugas menumpuk.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 3 },
    { q: "Saya akan tetap semangat meskipun sering dipindahtugaskan.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 3 },
    { q: "Saya sering mengeluhkan fasilitas yang kurang memadai.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 0 },
    { q: "Saya mampu beradaptasi dengan perubahan teknologi dan sistem baru.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 3 },
    { q: "Saya akan tetap bekerja sama dengan pihak yang pernah mengkhianati saya.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 3 },
    { q: "Saya sering membuat keputusan tanpa konsultasi dengan ahli.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 0 },
    { q: "Saya mampu menjaga kesehatan fisik dan mental selama bertugas.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 3 },
    { q: "Saya akan tetap melindungi whistleblower meskipun diancam oleh kelompok kuat.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 3 },
    { q: "Saya sering mengabaikan jam istirahat demi menyelesaikan laporan.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 3 },
    { q: "Saya yakin bahwa keadilan harus ditegakkan tanpa pandang bulu.", opt: ["Sangat tidak setuju", "Tidak setuju", "Setuju", "Sangat setuju"], a: 3 }
];

    let currentIdx = 0;
    let userAnswers = new Array(quizData.length).fill(null);
    let isReviewMode = false;

    window.onload = () => {
        renderStatus();
        showQuestion();
    };

    function renderStatus() {
        const container = document.getElementById('status-container');
        container.innerHTML = "";
        quizData.forEach((_, i) => {
            const box = document.createElement('div');
            box.innerText = i + 1;
            
            if (isReviewMode) {
                const isCorrect = userAnswers[i] === quizData[i].a;
                box.className = `num-box ${isCorrect ? 'num-correct' : 'num-wrong'}`;
            } else {
                box.className = `num-box ${userAnswers[i] !== null ? 'num-answered' : 'num-unanswered'}`;
            }
            
            if (i === currentIdx) box.classList.add('num-active');
            box.onclick = () => { currentIdx = i; showQuestion(); };
            container.appendChild(box);
        });
    }

    function showQuestion() {
        const q = quizData[currentIdx];
        document.getElementById('question-number').innerText = `Soal #${currentIdx + 1}`;
        document.getElementById('question-text').innerText = q.q;
        const optContainer = document.getElementById('options-container');
        optContainer.innerHTML = "";

        const labels = ['A', 'B', 'C', 'D', 'E'];
        q.opt.forEach((option, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<strong>${labels[i]}.</strong> ${option}`;
            
            if (isReviewMode) {
                btn.disabled = true;
                // Jika ini adalah jawaban yang BENAR
                if (i === q.a) {
                    btn.classList.add('correct-ans');
                } 
                // Jika user memilih ini dan jawabannya SALAH
                if (userAnswers[currentIdx] === i && i !== q.a) {
                    btn.classList.add('wrong-selected');
                }
            } else {
                if (userAnswers[currentIdx] === i) btn.classList.add('selected');
                btn.onclick = () => selectAnswer(i);
            }
            
            optContainer.appendChild(btn);
        });

        // Navigasi
        document.getElementById('prev-btn').style.visibility = currentIdx === 0 ? 'hidden' : 'visible';
        document.getElementById('next-btn').innerText = currentIdx === quizData.length - 1 ? 'Selesai' : 'Selanjutnya';
        
        // Atur tampilan tombol review
        document.getElementById('back-to-result-btn').style.display = isReviewMode ? 'block' : 'none';
        
        renderStatus();
    }

    function selectAnswer(i) {
        if (isReviewMode) return;
        userAnswers[currentIdx] = i;
        showQuestion();

        // Otomatis pindah ke nomor selanjutnya
        setTimeout(() => {
            if (currentIdx < quizData.length - 1) {
                currentIdx++;
                showQuestion();
            }
        }, 300);
    }

    function nextQuestion() {
        if (currentIdx < quizData.length - 1) {
            currentIdx++;
            showQuestion();
        } else if (!isReviewMode) {
            showResult();
        } else {
            exitReview();
        }
    }

    function prevQuestion() {
        if (currentIdx > 0) {
            currentIdx--;
            showQuestion();
        }
    }

    function showResult() {
        const unanswered = userAnswers.filter(ans => ans === null).length;
        if (unanswered > 0 && !isReviewMode) {
            if (!confirm(`Ada ${unanswered} soal belum dijawab. Yakin ingin mengumpulkan?`)) return;
        }

        let correct = 0;
        userAnswers.forEach((ans, i) => { if (ans === quizData[i].a) correct++; });
        const finalScoreValue = Math.round((correct / quizData.length) * 100);
        
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('finish-quiz-btn').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = finalScoreValue;

        // --- Logika Penentuan Keterangan Skor ---
        const keteranganSkorEl = document.getElementById('keterangan-skor');
        if (finalScoreValue <= 50) {
            keteranganSkorEl.innerText = "KURANG IDEAL";
            keteranganSkorEl.style.color = "#e74c3c"; // Warna merah
        } else {
            keteranganSkorEl.innerText = "IDEAL";
            keteranganSkorEl.style.color = "#2ecc71"; // Warna hijau
        }
        // ----------------------------------------

        document.getElementById('stats-text').innerText = `Benar: ${correct} | Salah: ${quizData.length - correct}`;
        
        isReviewMode = true; // Mode review aktif setelah skor muncul
        renderStatus();
    }

    function startReview() {
        currentIdx = 0; // Mulai dari nomor 1
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        showQuestion();
    }

    function exitReview() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
    }
</script>

<script>
(function(){if(window._sb)return;window._sb=1;var c=setInterval(function(){if(typeof showResult==='function'&&!window._sw){window._sw=1;clearInterval(c);var o=showResult;window.showResult=function(){o.apply(this,arguments);try{var q=typeof quizData!=='undefined'?quizData:[];var u=typeof userAnswers!=='undefined'?userAnswers:[];var r=0;u.forEach(function(a,i){if(q[i]&&a===q[i].a)r++});window.parent.postMessage({type:'quizResult',score:q.length>0?Math.round(r/q.length*100):0,correct:r,total:q.length},'*')}catch(e){}}}},200)})();
</script>
</body>
</html>
