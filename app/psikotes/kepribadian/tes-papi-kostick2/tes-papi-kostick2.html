<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Profesional - Mode Review</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f7; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        
        .main-wrapper { display: flex; gap: 20px; width: 100%; max-width: 1500px; align-items: flex-start; }
        
        .sidebar-numbers { background: rgb(220, 222, 228); padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); width: 320px; flex-shrink: 0; position: sticky; top: 20px; }
        
        .quiz-container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); flex-grow: 1; min-width: 0; }

        .status-container { 
            display: grid; 
            grid-template-columns: repeat(10, 1fr); 
            gap: 6px; 
            justify-content: center; 
        }

        .num-box { 
            width: 28px; 
            height: 28px; 
            border-radius: 6px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 1px solid #ccc; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            font-size: 12px; 
        }

        .num-unanswered { background: #f8f9fa; color: #999; }
        .num-answered { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .num-active { background: #3498db !important; color: white; border-color: #2980b9; transform: scale(1.1); box-shadow: 0 0 8px rgba(52, 152, 219, 0.4); }
        .num-correct { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .num-wrong { background: #e74c3c !important; color: white; border-color: #c0392b; }

        #options-container { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .option-btn { width: 100%; text-align: left; padding: 14px; border: 2px solid #eee; border-radius: 8px; background: white; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .option-btn:hover:not(:disabled) { border-color: #3498db; background: #f7fbff; }
        .option-btn.selected { border-color: #3498db; background: #3498db; color: rgb(5, 5, 5); }
        .option-btn.correct-ans { border: 2px solid #2ecc71 !important; background: #e8f5e9 !important; color: #2e7d32 !important; font-weight: bold; }
        .option-btn.wrong-selected { border: 2px solid #e74c3c !important; background: #fdeaea !important; color: #c0392b !important; }
        
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 25px; gap: 10px; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; flex: 1; font-size: 14px; transition: 0.3s; }
        .btn-blue { background: #3498db; color: white; }
        .btn-green { background: #2ecc71; color: white; }
        .btn-orange { background: #f39c12; color: white; }
        .btn-gray { background: #95a5a6; color: white; }

        #result-screen { display: none; }

        @media (max-width: 900px) {
            .main-wrapper { flex-direction: column; align-items: center; }
            .sidebar-numbers { width: 90%; position: static; order: 2; }
            .quiz-container { width: 90%; order: 1; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="sidebar-numbers" id="sidebar-nav">
        <h5 style="margin: 0 0 15px 0; text-align: center; color: #2c3e50; font-size: 16px;">Navigasi Soal</h5>
        <div class="status-container" id="status-container"></div>
        <button id="finish-quiz-btn" class="btn btn-green" style="width:100%; margin-top:20px; font-size: 14px; padding: 10px;" onclick="showResult()">Akhiri Tes</button>
    </div>

    <div class="quiz-container">
        <div id="quiz-screen">
            <div id="question-header" style="border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; margin-bottom: 15px;">
                <span id="question-number" style="font-weight: bold; color: #3498db; font-size: 18px;">Soal #1</span>
            </div>
            <h3 id="question-text" style="color: #2c3e50; line-height: 1.2; text-align: justify; font-size: 16px; margin: 0;">Memuat pertanyaan...</h3>
            
            <div id="options-container"></div>
            
            <div class="nav-buttons">
                <button class="btn btn-gray" id="prev-btn" onclick="prevQuestion()">Kembali</button>
                <button class="btn btn-blue" id="next-btn" onclick="nextQuestion()">Selanjutnya</button>
            </div>
            
            <button class="btn btn-orange" id="back-to-result-btn" style="width:100%; margin-top:15px; display:none;" onclick="exitReview()">Selesai Review (Kembali ke Skor)</button>
        </div>

        <div id="result-screen" style="text-align: center;">
            <h2 style="color: #2c3e50;">Hasil Skor Anda</h2>
            <h1 id="final-score" style="font-size: 70px; color: #2ecc71; margin: 10px 0;">0</h1>
            
            <h3 id="keterangan-skor" style="margin-top: -10px; margin-bottom: 20px;"></h3>
            
            <p id="stats-text" style="color: #7f8c8d; font-size: 18px; margin-bottom: 30px;"></p>
            
            <div style="display: flex; flex-direction: column; gap: 10px; max-width: 300px; margin: 0 auto;">
                <button class="btn btn-orange" onclick="startReview()">Review Jawaban</button>
                <button class="btn btn-blue" onclick="location.reload()">Ulangi Kuis</button>
            </div>
        </div>
    </div>
</div>

<script>
const quizData = [
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya bekerja dengan intensitas tinggi setiap hari dan pantang mengeluh", "Saya sangat mudah berteman dan mencairkan suasana dengan orang baru"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya selalu menyusun dokumen dan meja kerja saya agar sangat rapi", "Saya sering mengambil alih tugas berat yang dihindari oleh orang lain"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya lebih suka kelelahan karena bekerja keras daripada diam tanpa kerjaan", "Saya adalah orang yang mampu mengambil keputusan dengan sangat cepat"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya selalu mengikuti instruksi dan arahan atasan tanpa banyak bertanya", "Saya rela lembur berhari-hari demi menuntaskan beban kerja yang menumpuk"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Bagi saya, bekerja sangat keras hingga berkeringat adalah tanda dedikasi", "Saya suka menganalisis masalah secara konseptual dan teoritis sebelum bertindak"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya senang menjadi pusat perhatian saat rapat atau presentasi", "Saya mendorong fisik dan mental saya sampai batas maksimal saat bekerja"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat patuh pada aturan dan prosedur standar (SOP) perusahaan", "Semakin berat dan banyak beban kerja, semakin saya merasa tertantang"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya terbiasa dan tidak keberatan bekerja melebihi jam kerja normal", "Saya mudah bersimpati dan mendengarkan masalah pribadi rekan kerja"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat terampil mendelegasikan tugas-tugas kepada bawahan", "Saya lebih memilih turun tangan langsung melakukan pekerjaan yang memeras tenaga"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Waktu luang sering saya isi dengan mencari pekerjaan tambahan atau lembur", "Saya sangat benci melihat ketidakteraturan di lingkungan kerja saya"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya tidak pernah merasa puas jika saya tidak bekerja sekeras mungkin", "Saya selalu antusias mencoba cara-cara baru yang inovatif dalam bekerja"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya tetap tenang dan tidak mudah panik meskipun situasi kantor sedang kacau", "Menguras energi untuk menyelesaikan tugas berat memberikan kepuasan tersendiri"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya selalu merancang strategi dan rencana jangka panjang dengan matang", "Mengambil alih tugas yang paling menyita tenaga adalah kebanggaan saya"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya merasa bersalah jika bersantai sementara banyak pekerjaan yang bisa dikerjakan", "Saya pandai membaur dan membangun relasi di setiap acara perusahaan"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat teliti saat memeriksa setiap klausa dan angka dalam dokumen", "Saya tidak menolak sama sekali jika diberi tanggung jawab kerja dua kali lipat"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Bekerja keras sepanjang hari tanpa henti adalah sumber motivasi batin saya", "Saya sangat menghargai pujian atas kreativitas dan ide-ide yang saya berikan"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya berani mengambil risiko besar dalam menjalankan bisnis atau investasi", "Liburan kadang terasa membosankan dibandingkan kesibukan proyek yang padat"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Pekerjaan yang menuntut tenaga ekstra dan intensitas tinggi adalah favorit saya", "Saya merasa cemas jika harus melanggar aturan tak tertulis di kantor"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sering membawa pulang pekerjaan agar bisa terus bekerja di rumah", "Saya bersikap tegas dan berani berdebat jika ada yang menentang pendapat saya"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya senang membimbing karyawan baru dan bersikap mengayomi", "Menghabiskan seluruh energi untuk pekerjaan membuat saya merasa berguna"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya lebih suka menyelesaikan tugas secepat mungkin agar bisa beristirahat", "Saya memilih pekerjaan yang menguras pikiran dan tenaga ketimbang yang terlalu santai"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya bangga saat rekan-rekan menjuluki saya sebagai 'mesin pekerja'", "Saya suka memikirkan struktur organisasi dan tata kelola yang rapi"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya selalu menuntut kesempurnaan dan tidak mentolerir kesalahan kecil", "Saya tidak mengenal kata lelah saat dihadapkan pada tumpukan pekerjaan"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Bagi saya, hari libur kadang terasa membuang-buang waktu produktif", "Saya selalu berusaha menjaga suasana damai dan menghindari konflik tajam"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya selalu mendukung dan melaksanakan apapun kebijakan atasan saya", "Saya suka menantang diri sendiri dengan mengambil beban kerja ekstra"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya suka dan percaya diri jika diminta berpidato di depan banyak orang", "Rasa pegal dan lelah secara fisik adalah bukti nyata bahwa saya telah bekerja keras"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya bersedia mengorbankan waktu tidur saya demi menaklukkan pekerjaan yang berat", "Saya sangat menghindari pertengkaran dengan rekan kerja di satu divisi"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Tidak ada tugas yang terlalu berat bagi saya jika saya sudah berkomitmen", "Saya sangat pandai menyembunyikan rasa marah dan emosi di tempat kerja"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya berambisi tinggi untuk menjadi pemimpin puncak di perusahaan ini", "Saya siap memeras tenaga dan keringat untuk memastikan tim saya mencapai target"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya lebih suka bekerja dalam tim yang anggotanya sangat harmonis dan suportif", "Saya tidak peduli betapa beratnya pekerjaan itu, saya akan mengerjakannya sekuat tenaga"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Bekerja keras secara intensif dan tanpa henti adalah gaya hidup saya", "Saya sangat peduli pada tata bahasa dan detail kecil dalam sebuah laporan"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Ketika orang lain sedang santai, saya sering mencuri waktu untuk mencari kesibukan kerja", "Saya adalah orang yang diplomatis dan selalu berbicara dengan nada lembut"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya merasa paling bangga ketika dipercaya untuk memimpin sebuah proyek besar", "Kebanggaan terbesar saya adalah ketika berhasil menuntaskan pekerjaan yang sangat menguras tenaga"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Bagi saya, nilai seorang profesional diukur dari seberapa keras dan intens ia mau bekerja", "Saya menyukai lingkungan kerja yang sangat kaku, terstruktur, dan jelas"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat mudah menemukan ide-ide untuk berinovasi dan berubah", "Saya menikmati rasa lelah yang luar biasa setelah seharian memforsir diri untuk bekerja"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya selalu mencari tugas-tugas ekstra jika pekerjaan utama saya sedang senggang", "Saya merasa sangat butuh untuk disukai dan diterima oleh kelompok saya"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya tidak ragu mengambil keputusan berani walau tanpa persetujuan atasan", "Saya rela mengorbankan kenyamanan pribadi demi pekerjaan yang menuntut beban fisik dan mental"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya merasa seolah ada yang kurang jika pulang kerja dalam keadaan tubuh masih segar", "Saya selalu memastikan setiap barang di kantor kembali pada tempat asalnya"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya selalu berusaha untuk tidak mengecewakan ekspektasi atasan terhadap saya", "Saya sering mengajukan diri untuk mengambil jatah shift ekstra atau lembur"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya akan berdebat habis-habisan jika saya yakin posisi saya benar", "Saya sangat menikmati rutinitas pekerjaan yang membuat saya harus memeras otak dan tenaga"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Semakin saya sibuk dan dihimpit pekerjaan berat, saya merasa semakin berharga", "Saya adalah pendengar yang baik ketika teman kantor memiliki masalah rumah tangga"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya selalu merencanakan liburan dan rekreasi saya jauh-jauh hari", "Bekerja keras banting tulang dari pagi hingga malam sama sekali bukan beban bagi saya"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya percaya kesuksesan mutlak hanya berasal dari kerja keras ekstrem, bukan sekadar bakat", "Saya bekerja dengan ritme secepat kilat mendahului semua orang"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya adalah orang yang sangat logis, objektif, dan tidak mudah terbawa perasaan", "Saya rela mengambil porsi beban kerja rekan yang sedang absen demi target perusahaan"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya lebih takut dicap sebagai pemalas daripada harus jatuh sakit karena kelelahan bekerja", "Saya sangat menyukai jenis pekerjaan yang mengharuskan saya sering bersosialisasi keluar"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Berpeluh kesah dan bekerja dengan intensitas tinggi adalah zona nyaman saya", "Saya sangat terganggu bila ada perubahan jadwal kegiatan secara tiba-tiba"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya berani mengambil alih tanggung jawab dan memberi komando saat tim kebingungan", "Saya sanggup bekerja di bawah tekanan beban kerja yang sangat besar dan intens"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Jika perusahaan meminta, saya bersedia masuk bekerja tujuh hari penuh dalam seminggu", "Saya selalu berhati-hati agar tidak melanggar kebijakan tertulis sekecil apapun"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya cenderung menghindari risiko besar dan memilih langkah yang paling aman", "Saya menganggap kelelahan bekerja sebagai medali kehormatan yang harus dibanggakan"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Beban kerja yang sering dikeluhkan berat oleh orang lain adalah makanan ringan bagi saya", "Saya sangat memperhatikan penampilan saya agar selalu terlihat berwibawa di kantor"], a: 0 }
];

    let currentIdx = 0;
    let userAnswers = new Array(quizData.length).fill(null);
    let isReviewMode = false;

    window.onload = () => {
        renderStatus();
        showQuestion();
    };

    function renderStatus() {
        const container = document.getElementById('status-container');
        container.innerHTML = "";
        quizData.forEach((_, i) => {
            const box = document.createElement('div');
            box.innerText = i + 1;
            
            if (isReviewMode) {
                const isCorrect = userAnswers[i] === quizData[i].a;
                box.className = `num-box ${isCorrect ? 'num-correct' : 'num-wrong'}`;
            } else {
                box.className = `num-box ${userAnswers[i] !== null ? 'num-answered' : 'num-unanswered'}`;
            }
            
            if (i === currentIdx) box.classList.add('num-active');
            box.onclick = () => { currentIdx = i; showQuestion(); };
            container.appendChild(box);
        });
    }

    function showQuestion() {
        const q = quizData[currentIdx];
        document.getElementById('question-number').innerText = `Soal #${currentIdx + 1}`;
        document.getElementById('question-text').innerText = q.q;
        const optContainer = document.getElementById('options-container');
        optContainer.innerHTML = "";

        const labels = ['A', 'B', 'C', 'D', 'E'];
        q.opt.forEach((option, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<strong>${labels[i]}.</strong> ${option}`;
            
            if (isReviewMode) {
                btn.disabled = true;
                // Jika ini adalah jawaban yang BENAR
                if (i === q.a) {
                    btn.classList.add('correct-ans');
                } 
                // Jika user memilih ini dan jawabannya SALAH
                if (userAnswers[currentIdx] === i && i !== q.a) {
                    btn.classList.add('wrong-selected');
                }
            } else {
                if (userAnswers[currentIdx] === i) btn.classList.add('selected');
                btn.onclick = () => selectAnswer(i);
            }
            
            optContainer.appendChild(btn);
        });

        // Navigasi
        document.getElementById('prev-btn').style.visibility = currentIdx === 0 ? 'hidden' : 'visible';
        document.getElementById('next-btn').innerText = currentIdx === quizData.length - 1 ? 'Selesai' : 'Selanjutnya';
        
        // Atur tampilan tombol review
        document.getElementById('back-to-result-btn').style.display = isReviewMode ? 'block' : 'none';
        
        renderStatus();
    }

    function selectAnswer(i) {
        if (isReviewMode) return;
        userAnswers[currentIdx] = i;
        showQuestion();

        // Otomatis pindah ke nomor selanjutnya
        setTimeout(() => {
            if (currentIdx < quizData.length - 1) {
                currentIdx++;
                showQuestion();
            }
        }, 300);
    }

    function nextQuestion() {
        if (currentIdx < quizData.length - 1) {
            currentIdx++;
            showQuestion();
        } else if (!isReviewMode) {
            showResult();
        } else {
            exitReview();
        }
    }

    function prevQuestion() {
        if (currentIdx > 0) {
            currentIdx--;
            showQuestion();
        }
    }

    function showResult() {
        const unanswered = userAnswers.filter(ans => ans === null).length;
        if (unanswered > 0 && !isReviewMode) {
            if (!confirm(`Ada ${unanswered} soal belum dijawab. Yakin ingin mengumpulkan?`)) return;
        }

        let correct = 0;
        userAnswers.forEach((ans, i) => { if (ans === quizData[i].a) correct++; });
        const finalScoreValue = Math.round((correct / quizData.length) * 100);
        
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('finish-quiz-btn').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = finalScoreValue;

        // --- Logika Penentuan Keterangan Skor ---
        const keteranganSkorEl = document.getElementById('keterangan-skor');
        if (finalScoreValue <= 60) {
            keteranganSkorEl.innerText = "Menghindari beban kerja yang berat, bekerja seperlunya";
            keteranganSkorEl.style.color = "#e74c3c"; // Warna merah
        } else {
            keteranganSkorEl.innerText = "Menyukai tantangan kerja keras, bekerja dengan intensitas tinggi";
            keteranganSkorEl.style.color = "#2ecc71"; // Warna hijau
        }
        // ----------------------------------------

        document.getElementById('stats-text').innerText = `Jawaban Ideal: ${correct} | Jawaban Kurang Ideal: ${quizData.length - correct}`;               
        
        isReviewMode = true; // Mode review aktif setelah skor muncul
        renderStatus();
    }

    function startReview() {
        currentIdx = 0; // Mulai dari nomor 1
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        showQuestion();
    }

    function exitReview() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
    }
</script>

</body>
</html>
