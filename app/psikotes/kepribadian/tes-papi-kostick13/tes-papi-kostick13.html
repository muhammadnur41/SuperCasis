<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Profesional - Mode Review</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f7; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        
        .main-wrapper { display: flex; gap: 20px; width: 100%; max-width: 1500px; align-items: flex-start; }
        
        .sidebar-numbers { background: rgb(220, 222, 228); padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); width: 320px; flex-shrink: 0; position: sticky; top: 20px; }
        
        .quiz-container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); flex-grow: 1; min-width: 0; }

        .status-container { 
            display: grid; 
            grid-template-columns: repeat(10, 1fr); 
            gap: 6px; 
            justify-content: center; 
        }

        .num-box { 
            width: 28px; 
            height: 28px; 
            border-radius: 6px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 1px solid #ccc; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            font-size: 12px; 
        }

        .num-unanswered { background: #f8f9fa; color: #999; }
        .num-answered { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .num-active { background: #3498db !important; color: white; border-color: #2980b9; transform: scale(1.1); box-shadow: 0 0 8px rgba(52, 152, 219, 0.4); }
        .num-correct { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .num-wrong { background: #e74c3c !important; color: white; border-color: #c0392b; }

        #options-container { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .option-btn { width: 100%; text-align: left; padding: 14px; border: 2px solid #eee; border-radius: 8px; background: white; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .option-btn:hover:not(:disabled) { border-color: #3498db; background: #f7fbff; }
        .option-btn.selected { border-color: #3498db; background: #3498db; color: rgb(5, 5, 5); }
        .option-btn.correct-ans { border: 2px solid #2ecc71 !important; background: #e8f5e9 !important; color: #2e7d32 !important; font-weight: bold; }
        .option-btn.wrong-selected { border: 2px solid #e74c3c !important; background: #fdeaea !important; color: #c0392b !important; }
        
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 25px; gap: 10px; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; flex: 1; font-size: 14px; transition: 0.3s; }
        .btn-blue { background: #3498db; color: white; }
        .btn-green { background: #2ecc71; color: white; }
        .btn-orange { background: #f39c12; color: white; }
        .btn-gray { background: #95a5a6; color: white; }

        #result-screen { display: none; }

        @media (max-width: 900px) {
            .main-wrapper { flex-direction: column; align-items: center; }
            .sidebar-numbers { width: 90%; position: static; order: 2; }
            .quiz-container { width: 90%; order: 1; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="sidebar-numbers" id="sidebar-nav">
        <h5 style="margin: 0 0 15px 0; text-align: center; color: #2c3e50; font-size: 16px;">Navigasi Soal</h5>
        <div class="status-container" id="status-container"></div>
        <button id="finish-quiz-btn" class="btn btn-green" style="width:100%; margin-top:20px; font-size: 14px; padding: 10px;" onclick="showResult()">Akhiri Tes</button>
    </div>

    <div class="quiz-container">
        <div id="quiz-screen">
            <div id="question-header" style="border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; margin-bottom: 15px;">
                <span id="question-number" style="font-weight: bold; color: #3498db; font-size: 18px;">Soal #1</span>
            </div>
            <h3 id="question-text" style="color: #2c3e50; line-height: 1.2; text-align: justify; font-size: 16px; margin: 0;">Memuat pertanyaan...</h3>
            
            <div id="options-container"></div>
            
            <div class="nav-buttons">
                <button class="btn btn-gray" id="prev-btn" onclick="prevQuestion()">Kembali</button>
                <button class="btn btn-blue" id="next-btn" onclick="nextQuestion()">Selanjutnya</button>
            </div>
            
            <button class="btn btn-orange" id="back-to-result-btn" style="width:100%; margin-top:15px; display:none;" onclick="exitReview()">Selesai Review (Kembali ke Skor)</button>
        </div>

        <div id="result-screen" style="text-align: center;">
            <h2 style="color: #2c3e50;">Hasil Skor Anda</h2>
            <h1 id="final-score" style="font-size: 70px; color: #2ecc71; margin: 10px 0;">0</h1>
            
            <h3 id="keterangan-skor" style="margin-top: -10px; margin-bottom: 20px;"></h3>
            
            <p id="stats-text" style="color: #7f8c8d; font-size: 18px; margin-bottom: 30px;"></p>
            
            <div style="display: flex; flex-direction: column; gap: 10px; max-width: 300px; margin: 0 auto;">
                <button class="btn btn-orange" onclick="startReview()">Review Jawaban</button>
                <button class="btn btn-blue" onclick="location.reload()">Ulangi Kuis</button>
            </div>
        </div>
    </div>
</div>

<script>
const quizData = [
{ q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya bekerja dengan ritme yang sangat cepat agar produktivitas tetap tinggi", "Saya lebih tertarik pada alasan ilmiah di balik sebuah kegagalan daripada sekadar memperbaikinya"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya lebih suka memformulasikan teori baru daripada hanya menjalankan prosedur yang sudah ada", "Saya bekerja tanpa henti hingga tugas yang paling berat sekalipun selesai"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya memastikan seluruh arsip dan dokumen saya tersusun dengan sistematis", "Saya sangat menikmati proses membedah masalah yang sangat kompleks secara intelektual"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Memikirkan strategi jangka panjang sepuluh tahun ke depan adalah kegemaran saya", "Saya selalu mengambil inisiatif untuk memimpin kelompok dalam situasi kritis"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya tidak pernah ragu untuk menegur bawahan yang bekerja tidak efisien", "Saya lebih suka membaca jurnal ilmiah atau literatur teknis daripada melakukan pekerjaan manual"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya senang menganalisis data statistik yang rumit untuk menemukan pola tersembunyi", "Saya mudah bergaul dan menjalin hubungan akrab dengan siapa saja di kantor"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya memiliki ambisi yang sangat besar untuk menduduki posisi Direktur", "Saya merasa puas jika berhasil menyusun model konseptual yang solid untuk perusahaan"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya cenderung melihat gambaran besar dan kaitan teoritis antar departemen", "Saya sangat teliti dalam memeriksa setiap angka untuk menghindari kesalahan fatal"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya senang membantu rekan kerja yang sedang mengalami kesulitan pribadi", "Saya ingin diakui sebagai orang yang paling cerdas secara intelektual di tim saya"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Menghabiskan waktu berjam-jam untuk merenungkan solusi abstrak adalah hal yang menyenangkan", "Saya adalah orang yang sangat praktis dan lebih suka langsung bertindak"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya selalu patuh pada perintah atasan tanpa perlu mempertanyakan teorinya", "Saya sering mempertanyakan logika di balik kebijakan perusahaan yang tidak masuk akal"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya lebih menyukai tantangan mental yang berat daripada tantangan fisik yang melelahkan", "Saya memiliki ketahanan fisik yang luar biasa untuk bekerja di lapangan"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya lebih tertarik pada pengembangan visi strategis daripada urusan operasional harian", "Saya sangat pandai dalam mencairkan suasana kaku saat rapat berlangsung"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat menjaga penampilan dan citra diri saya di depan klien", "Saya mengutamakan objektivitas ilmiah dalam mengambil setiap keputusan penting"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya senang menghubungkan berbagai ide yang tampak tidak berkaitan menjadi satu teori utuh", "Saya bekerja dengan sangat rapi dan mengikuti urutan yang sudah ditetapkan"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya rela bekerja lembur setiap hari demi mencapai target bonus perusahaan", "Saya memiliki rasa ingin tahu yang sangat besar terhadap cara kerja sistem yang rumit"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya lebih suka menjadi penasihat strategis daripada menjadi manajer operasional", "Saya senang memberikan perintah dan melihat orang lain melaksanakannya dengan tepat"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya lebih suka menggunakan pendekatan analitis daripada pendekatan emosional", "Saya sangat peka terhadap perasaan orang lain yang sedang merasa sedih"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya memastikan tidak ada satu pun peraturan perusahaan yang saya langgar", "Mengembangkan hipotesis tentang tren pasar masa depan adalah kekuatan utama saya"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya merasa bosan jika harus mengerjakan hal rutin tanpa ada unsur pemikiran mendalam", "Saya bekerja dengan tempo yang stabil dan terencana dengan baik"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat teliti dalam mendokumentasikan setiap langkah kerja yang saya ambil", "Saya sangat menikmati diskusi filosofis tentang arah dan tujuan perusahaan"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya lebih suka memecahkan masalah dengan logika matematika daripada dengan intuisi", "Saya ingin semua orang di kantor menyukai kepribadian saya yang hangat"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat kompetitif dan ingin selalu menjadi nomor satu dalam pencapaian target", "Saya sering membaca buku di luar bidang pekerjaan saya untuk memperluas cakrawala berpikir"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya senang menganalisis akar penyebab suatu masalah secara mendetail dan teoritis", "Saya memiliki kontrol diri yang baik dan jarang menunjukkan kemarahan di kantor"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya bekerja keras demi keamanan finansial dan masa depan keluarga saya", "Saya ingin ide-ide brilian saya didengar dan diterapkan oleh jajaran manajemen"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya lebih tertarik pada proses penemuan ide daripada proses implementasi ide tersebut", "Saya selalu menyelesaikan apa yang sudah saya mulai, apa pun rintangannya"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat disiplin dalam mengikuti jadwal rapat yang sudah ditentukan", "Saya senang membangun kerangka berpikir yang baru untuk menyelesaikan masalah lama"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya menganggap data dan fakta jauh lebih berharga daripada opini orang banyak", "Saya senang menjadi pusat perhatian dalam setiap acara sosial perusahaan"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya selalu siap pasang badan untuk membela anggota tim saya yang disalahkan", "Saya lebih suka bekerja di laboratorium atau ruang analisis daripada di garis depan"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya lebih tertarik pada aspek intelektual dari pekerjaan saya daripada aspek kekuasaannya", "Saya sangat otoriter dalam memastikan pekerjaan selesai tepat pada waktunya"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya senang membedah struktur organisasi untuk mencari celah efisiensi secara teoritis", "Saya sangat teliti dalam menyusun anggaran biaya agar tidak terjadi pemborosan"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya bekerja dengan sangat cepat dan tangkas dalam segala situasi", "Saya cenderung diam dan berpikir sebelum memberikan tanggapan dalam sebuah diskusi"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya senang bereksperimen dengan konsep-konsep baru yang belum pernah dicoba", "Saya sangat patuh pada tradisi dan cara kerja lama yang sudah terbukti berhasil"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya adalah pendengar yang sangat empati bagi rekan kerja yang butuh curhat", "Saya memiliki daya konsentrasi yang sangat tinggi untuk mempelajari hal-hal sulit"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya ingin dikenal sebagai pakar atau ahli di bidang spesifik yang saya tekuni", "Saya mendambakan posisi jabatan yang memberi saya banyak fasilitas mewah"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya bekerja dengan sangat energik dan menularkan semangat pada orang lain", "Saya lebih suka memikirkan 'mengapa' sesuatu terjadi daripada 'bagaimana' cara cepat mengatasinya"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya senang melakukan riset mendalam sebelum memberikan satu saran kecil sekalipun", "Saya sangat rapi dalam berpakaian dan menjaga tata krama di tempat kerja"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sering merasa bahwa teori yang kuat adalah pondasi dari setiap keberhasilan praktis", "Saya lebih suka langsung terjun ke lapangan untuk melihat kondisi yang sebenarnya"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya senang bertukar pikiran dengan orang-orang yang memiliki kecerdasan di atas rata-rata", "Saya sangat mandiri dalam menyelesaikan tugas-tugas yang diberikan atasan"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat berhati-hati dalam mengambil risiko yang dapat merugikan perusahaan", "Saya mengandalkan analisis probabilitas untuk memprediksi hasil dari sebuah proyek"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya lebih suka bekerja dengan angka dan konsep daripada dengan manusia", "Saya merasa sangat bahagia jika bisa menjadi bagian dari kelompok yang solid"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya senang memecahkan algoritma atau logika pemrograman yang sangat rumit", "Saya selalu berusaha untuk tidak bergantung pada perasaan dalam bekerja"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat gigih dalam mengejar target penjualan yang diberikan setiap bulan", "Saya ingin prestasi intelektual saya diakui secara luas di industri ini"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya lebih menyukai instruksi yang bersifat umum agar saya bisa mengembangkan konsep sendiri", "Saya lebih suka instruksi yang sangat detail agar saya tidak perlu berpikir lagi"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya senang mengkritik sebuah ide jika dasar teorinya terasa lemah atau cacat", "Saya sangat taat pada norma sosial yang berlaku di lingkungan kantor"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya memiliki energi fisik untuk melakukan perjalanan dinas ke luar kota setiap minggu", "Saya memiliki stamina mental untuk membaca laporan teknis yang sangat tebal"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya lebih fokus pada validitas argumen saya daripada pada kemenangan debat", "Saya sangat dominan dalam memengaruhi pendapat orang lain di dalam rapat"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya senang memetakan hubungan sebab-akibat dari setiap kebijakan yang diambil", "Saya sangat peduli pada kenyamanan fasilitas kerja yang disediakan perusahaan"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya senang mempelajari sistem berpikir (systems thinking) untuk memahami organisasi secara utuh", "Saya bekerja dengan tingkat ketelitian yang sangat tinggi pada setiap detail kecil"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya lebih memilih profesi sebagai eksekutor lapangan atau manajer operasional", "Saya lebih memilih profesi sebagai peneliti atau analis strategis"], a: 1 }
];

    let currentIdx = 0;
    let userAnswers = new Array(quizData.length).fill(null);
    let isReviewMode = false;

    window.onload = () => {
        renderStatus();
        showQuestion();
    };

    function renderStatus() {
        const container = document.getElementById('status-container');
        container.innerHTML = "";
        quizData.forEach((_, i) => {
            const box = document.createElement('div');
            box.innerText = i + 1;
            
            if (isReviewMode) {
                const isCorrect = userAnswers[i] === quizData[i].a;
                box.className = `num-box ${isCorrect ? 'num-correct' : 'num-wrong'}`;
            } else {
                box.className = `num-box ${userAnswers[i] !== null ? 'num-answered' : 'num-unanswered'}`;
            }
            
            if (i === currentIdx) box.classList.add('num-active');
            box.onclick = () => { currentIdx = i; showQuestion(); };
            container.appendChild(box);
        });
    }

    function showQuestion() {
        const q = quizData[currentIdx];
        document.getElementById('question-number').innerText = `Soal #${currentIdx + 1}`;
        document.getElementById('question-text').innerText = q.q;
        const optContainer = document.getElementById('options-container');
        optContainer.innerHTML = "";

        const labels = ['A', 'B', 'C', 'D', 'E'];
        q.opt.forEach((option, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<strong>${labels[i]}.</strong> ${option}`;
            
            if (isReviewMode) {
                btn.disabled = true;
                // Jika ini adalah jawaban yang BENAR
                if (i === q.a) {
                    btn.classList.add('correct-ans');
                } 
                // Jika user memilih ini dan jawabannya SALAH
                if (userAnswers[currentIdx] === i && i !== q.a) {
                    btn.classList.add('wrong-selected');
                }
            } else {
                if (userAnswers[currentIdx] === i) btn.classList.add('selected');
                btn.onclick = () => selectAnswer(i);
            }
            
            optContainer.appendChild(btn);
        });

        // Navigasi
        document.getElementById('prev-btn').style.visibility = currentIdx === 0 ? 'hidden' : 'visible';
        document.getElementById('next-btn').innerText = currentIdx === quizData.length - 1 ? 'Selesai' : 'Selanjutnya';
        
        // Atur tampilan tombol review
        document.getElementById('back-to-result-btn').style.display = isReviewMode ? 'block' : 'none';
        
        renderStatus();
    }

    function selectAnswer(i) {
        if (isReviewMode) return;
        userAnswers[currentIdx] = i;
        showQuestion();

        // Otomatis pindah ke nomor selanjutnya
        setTimeout(() => {
            if (currentIdx < quizData.length - 1) {
                currentIdx++;
                showQuestion();
            }
        }, 300);
    }

    function nextQuestion() {
        if (currentIdx < quizData.length - 1) {
            currentIdx++;
            showQuestion();
        } else if (!isReviewMode) {
            showResult();
        } else {
            exitReview();
        }
    }

    function prevQuestion() {
        if (currentIdx > 0) {
            currentIdx--;
            showQuestion();
        }
    }

    function showResult() {
        const unanswered = userAnswers.filter(ans => ans === null).length;
        if (unanswered > 0 && !isReviewMode) {
            if (!confirm(`Ada ${unanswered} soal belum dijawab. Yakin ingin mengumpulkan?`)) return;
        }

        let correct = 0;
        userAnswers.forEach((ans, i) => { if (ans === quizData[i].a) correct++; });
        const finalScoreValue = Math.round((correct / quizData.length) * 100);
        
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('finish-quiz-btn').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = finalScoreValue;

        // --- Logika Penentuan Keterangan Skor ---
        const keteranganSkorEl = document.getElementById('keterangan-skor');
        if (finalScoreValue <= 50) {
            keteranganSkorEl.innerText = "Praktis, berorientasi pada tindakan langsung (eksekutor)";
            keteranganSkorEl.style.color = "#e74c3c"; // Warna merah
        } else {
            keteranganSkorEl.innerText = "Pemikir konseptual, analitis, suka merencanakan dan memikirkan strategi (kreator/perencana)";
            keteranganSkorEl.style.color = "#2ecc71"; // Warna hijau
        }
        // ----------------------------------------

        document.getElementById('stats-text').innerText = `Jawaban Ideal: ${correct} | Jawaban Kurang Ideal: ${quizData.length - correct}`;        
        
        isReviewMode = true; // Mode review aktif setelah skor muncul
        renderStatus();
    }

    function startReview() {
        currentIdx = 0; // Mulai dari nomor 1
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        showQuestion();
    }

    function exitReview() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
    }
</script>
