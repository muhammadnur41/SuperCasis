<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Profesional - Mode Review</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f7; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        
        .main-wrapper { display: flex; gap: 20px; width: 100%; max-width: 1500px; align-items: flex-start; }
        
        .sidebar-numbers { background: rgb(220, 222, 228); padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); width: 320px; flex-shrink: 0; position: sticky; top: 20px; }
        
        .quiz-container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); flex-grow: 1; min-width: 0; }

        .status-container { 
            display: grid; 
            grid-template-columns: repeat(10, 1fr); 
            gap: 6px; 
            justify-content: center; 
        }

        .num-box { 
            width: 28px; 
            height: 28px; 
            border-radius: 6px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 1px solid #ccc; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            font-size: 12px; 
        }

        .num-unanswered { background: #f8f9fa; color: #999; }
        .num-answered { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .num-active { background: #3498db !important; color: white; border-color: #2980b9; transform: scale(1.1); box-shadow: 0 0 8px rgba(52, 152, 219, 0.4); }
        .num-correct { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .num-wrong { background: #e74c3c !important; color: white; border-color: #c0392b; }

        #options-container { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .option-btn { width: 100%; text-align: left; padding: 14px; border: 2px solid #eee; border-radius: 8px; background: white; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .option-btn:hover:not(:disabled) { border-color: #3498db; background: #f7fbff; }
        .option-btn.selected { border-color: #3498db; background: #3498db; color: rgb(5, 5, 5); }
        .option-btn.correct-ans { border: 2px solid #2ecc71 !important; background: #e8f5e9 !important; color: #2e7d32 !important; font-weight: bold; }
        .option-btn.wrong-selected { border: 2px solid #e74c3c !important; background: #fdeaea !important; color: #c0392b !important; }
        
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 25px; gap: 10px; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; flex: 1; font-size: 14px; transition: 0.3s; }
        .btn-blue { background: #3498db; color: white; }
        .btn-green { background: #2ecc71; color: white; }
        .btn-orange { background: #f39c12; color: white; }
        .btn-gray { background: #95a5a6; color: white; }

        #result-screen { display: none; }

        @media (max-width: 900px) {
            .main-wrapper { flex-direction: column; align-items: center; }
            .sidebar-numbers { width: 90%; position: static; order: 2; }
            .quiz-container { width: 90%; order: 1; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="sidebar-numbers" id="sidebar-nav">
        <h5 style="margin: 0 0 15px 0; text-align: center; color: #2c3e50; font-size: 16px;">Navigasi Soal</h5>
        <div class="status-container" id="status-container"></div>
        <button id="finish-quiz-btn" class="btn btn-green" style="width:100%; margin-top:20px; font-size: 14px; padding: 10px;" onclick="showResult()">Akhiri Tes</button>
    </div>

    <div class="quiz-container">
        <div id="quiz-screen">
            <div id="question-header" style="border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; margin-bottom: 15px;">
                <span id="question-number" style="font-weight: bold; color: #3498db; font-size: 18px;">Soal #1</span>
            </div>
            <h3 id="question-text" style="color: #2c3e50; line-height: 1.2; text-align: justify; font-size: 16px; margin: 0;">Memuat pertanyaan...</h3>
            
            <div id="options-container"></div>
            
            <div class="nav-buttons">
                <button class="btn btn-gray" id="prev-btn" onclick="prevQuestion()">Kembali</button>
                <button class="btn btn-blue" id="next-btn" onclick="nextQuestion()">Selanjutnya</button>
            </div>
            
            <button class="btn btn-orange" id="back-to-result-btn" style="width:100%; margin-top:15px; display:none;" onclick="exitReview()">Selesai Review (Kembali ke Skor)</button>
        </div>

        <div id="result-screen" style="text-align: center;">
            <h2 style="color: #2c3e50;">Hasil Skor Anda</h2>
            <h1 id="final-score" style="font-size: 70px; color: #2ecc71; margin: 10px 0;">0</h1>
            
            <h3 id="keterangan-skor" style="margin-top: -10px; margin-bottom: 20px;"></h3>
            
            <p id="stats-text" style="color: #7f8c8d; font-size: 18px; margin-bottom: 30px;"></p>
            
            <div style="display: flex; flex-direction: column; gap: 10px; max-width: 300px; margin: 0 auto;">
                <button class="btn btn-orange" onclick="startReview()">Review Jawaban</button>
                <button class="btn btn-blue" onclick="location.reload()">Ulangi Kuis</button>
            </div>
        </div>
    </div>
</div>

<script>
const quizData = [
{ q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya memastikan semua prosedur perusahaan saya ikuti dengan sangat disiplin", "Saya ingin semua orang di departemen menganggap saya sebagai bagian dari 'keluarga' mereka"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya merasa sangat tenang jika tahu bahwa rekan kerja mendukung setiap langkah saya", "Saya lebih suka bekerja secara mandiri tanpa perlu banyak berdiskusi dengan orang lain"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya memiliki ambisi besar untuk segera dipromosikan menjadi manajer senior", "Menjadi bagian yang tak terpisahkan dari tim adalah tujuan utama saya bekerja"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya merasa sangat sedih jika saya tidak dilibatkan dalam kegiatan santai kelompok", "Saya selalu memeriksa ulang laporan saya hingga tidak ada satu pun kesalahan kecil"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya cenderung menyesuaikan pendapat saya agar selaras dengan pandangan mayoritas tim", "Saya tidak ragu untuk mengambil keputusan yang berisiko tinggi demi kemajuan perusahaan"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya selalu bekerja dengan tempo yang sangat cepat untuk melampaui target waktu", "Saya merasa lebih bersemangat saat bekerja dalam sebuah kelompok yang solid"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Diterima dan disukai oleh lingkungan kerja adalah hal yang sangat krusial bagi saya", "Saya lebih suka memberikan instruksi daripada harus mengikuti arahan orang lain"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat teliti dalam menyusun detail teknis sebuah proyek yang rumit", "Saya sering kali merasa cemas jika rekan kerja menunjukkan sikap tidak ramah kepada saya"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya ingin diakui secara publik sebagai karyawan dengan performa terbaik tahun ini", "Saya merasa puas jika kontribusi saya membuat kelompok kami menjadi lebih kompak"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya lebih suka menghabiskan waktu istirahat bersama rekan kerja daripada sendirian", "Saya memiliki ketahanan fisik yang luar biasa untuk bekerja di lapangan seharian"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya akan merasa terasing jika ide-ide saya sering ditolak oleh anggota kelompok lainnya", "Saya berani melakukan konfrontasi jika ada rekan kerja yang melanggar aturan"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya selalu menyusun rencana cadangan yang sangat detail untuk setiap tugas saya", "Menjaga hubungan harmonis dalam kelompok lebih penting bagi saya daripada kompetisi individu"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya ingin nama saya dikenal luas oleh jajaran direksi karena prestasi saya", "Saya merasa lebih aman ketika bekerja dalam tim yang sudah saya kenal dengan baik"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat menikmati peran sebagai pendukung kelompok yang bisa diandalkan", "Saya sering mengambil alih kendali rapat jika pemimpinnya terlihat ragu-ragu"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya butuh konfirmasi dari rekan kerja bahwa saya telah melakukan pekerjaan dengan benar", "Saya sangat patuh pada instruksi atasan tanpa banyak memberikan interupsi"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya lebih fokus pada penyelesaian tugas daripada memikirkan hubungan antarmanusia", "Saya merasa sangat senang jika diajak bergabung dalam diskusi informal di kantor"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya selalu bekerja keras untuk membuktikan bahwa saya layak berada di tim ini", "Saya sangat teliti dalam mendokumentasikan setiap proses kerja yang saya lakukan"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya adalah individu yang sangat mandiri dan tidak butuh bantuan orang lain", "Saya cenderung menghindari konflik yang bisa merusak kekompakan kelompok kami"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya ingin selalu dianggap sebagai anggota tim yang loyal dan kooperatif", "Saya bekerja dengan ritme yang sangat dinamis dan sulit diikuti oleh orang lain"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya menetapkan standar yang sangat tinggi bagi diri saya dan bawahan saya", "Saya sering merasa khawatir jika saya melakukan sesuatu yang menyinggung perasaan kelompok"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya lebih suka menjadi pengikut yang baik dalam sebuah tim yang sudah mapan", "Saya mendambakan posisi di mana saya bisa memegang otoritas penuh"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat fokus pada pencapaian bonus dan insentif berdasarkan target pribadi", "Saya merasa sangat dihargai ketika rekan kerja meminta saya untuk bergabung dalam proyek mereka"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya merasa lebih nyaman jika tugas-tugas saya dikerjakan bersama dengan rekan lainnya", "Saya memastikan penampilan saya selalu profesional agar terlihat menarik di depan umum"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sanggup menyelesaikan masalah teknis yang sangat sulit tanpa bantuan siapa pun", "Saya sangat ingin menjadi orang kepercayaan di dalam kelompok kerja saya"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya selalu mengikuti tren atau kebiasaan yang dilakukan oleh tim saya di kantor", "Saya sangat keras kepala dalam mempertahankan pendapat yang saya yakini benar"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya selalu mengecek setiap detail dokumen untuk memastikan akurasi data", "Saya merasa kehilangan motivasi jika harus bekerja dalam isolasi dalam waktu lama"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya lebih suka mencari kesepakatan bersama daripada memaksakan kehendak pribadi", "Saya sangat ambisius untuk menjadi orang nomor satu di departemen saya"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya lebih suka bekerja di belakang layar tanpa perlu banyak berinteraksi", "Saya merasa bangga jika kelompok kami berhasil mencapai target secara kolektif"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat peduli pada opini orang lain mengenai posisi saya di dalam tim", "Saya memiliki energi fisik yang sangat besar untuk menyelesaikan tugas lapangan"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat disiplin dalam mematuhi jam kerja dan peraturan perusahaan", "Saya berusaha menjadi orang yang paling pertama membantu jika rekan setim butuh bantuan"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sering kali merasa butuh pujian dari kelompok agar merasa percaya diri", "Saya sangat dominan dalam memberikan arahan kepada anggota tim yang lain"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya lebih mementingkan hasil akhir pekerjaan daripada proses interaksi sosial", "Saya merasa sangat puas jika bisa berkolaborasi dengan banyak orang sekaligus"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya cenderung mengikuti cara kerja kelompok meskipun saya punya ide yang berbeda", "Saya sangat teliti dalam merencanakan setiap langkah karier saya di masa depan"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya bekerja dengan tempo yang sangat cepat dan laju yang tinggi", "Saya merasa cemas jika ada anggota kelompok yang tidak menyukai gaya kerja saya"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya ingin selalu dilibatkan dalam setiap pengambilan keputusan kelompok", "Saya lebih suka bekerja secara individual daripada harus banyak berkompromi"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya tidak pernah ragu untuk memberikan kritik pedas demi kualitas pekerjaan", "Saya merasa sangat terbantu jika rekan kerja memberikan umpan balik yang positif"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya lebih suka menjadi bagian dari kerumunan daripada harus tampil menonjol sendirian", "Saya ingin diakui sebagai inovator yang paling cerdas di perusahaan ini"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya selalu mematuhi instruksi tertulis tanpa perlu banyak bertanya", "Saya merasa sangat nyaman jika lingkungan kerja saya penuh dengan persahabatan"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya cenderung merasa bersalah jika saya tidak bisa berkontribusi maksimal bagi tim", "Saya sangat percaya pada kemampuan saya sendiri untuk memimpin proyek besar"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya lebih suka mengerjakan tugas yang membutuhkan kerja sama antar departemen", "Saya sangat fokus pada ketelitian data dan menghindari interaksi yang tidak perlu"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya lebih suka menggunakan waktu istirahat untuk mempelajari hal-hal baru secara mandiri", "Saya sangat menghargai kebersamaan saat makan siang bersama tim setiap hari"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya merasa tenang jika rekan-rekan di kantor memiliki nilai-nilai yang sama dengan saya", "Saya sangat gigih dalam mengejar kenaikan jabatan di setiap kesempatan yang ada"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya memiliki gaya kepemimpinan yang sangat otoriter dan tegas", "Saya merasa lebih kuat jika saya didukung penuh oleh seluruh anggota tim"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat mandiri dalam mengelola seluruh beban kerja yang diberikan kepada saya", "Saya sering bertanya kepada rekan kerja tentang pendapat mereka terhadap hasil kerja saya"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya ingin dianggap sebagai orang yang sangat kooperatif oleh semua rekan kerja", "Saya lebih fokus pada detail-detail kecil yang sering dilewatkan oleh orang lain"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya selalu bertindak berdasarkan logika murni tanpa mempertimbangkan perasaan orang lain", "Saya merasa sangat sedih jika tim saya mengalami kegagalan meskipun itu bukan salah saya"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat menikmati suasana kantor yang penuh dengan kolaborasi dan obrolan", "Saya lebih menyukai lingkungan kerja yang tenang dan sangat formal"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat bangga jika saya bisa menyelesaikan tugas lebih cepat dari orang lain", "Saya berusaha keras agar saya selalu selaras dengan norma-norma yang ada di kelompok"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya merasa sangat dihargai jika diajak bergabung dalam proyek penting oleh tim", "Saya ingin memegang kendali penuh atas jalannya operasional di departemen saya"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat teliti dalam memastikan tidak ada satu pun prosedur yang dilanggar", "Bagi saya, diterima dalam lingkungan kerja adalah dasar dari segala kesuksesan"], a: 1 }
];

    let currentIdx = 0;
    let userAnswers = new Array(quizData.length).fill(null);
    let isReviewMode = false;

    window.onload = () => {
        renderStatus();
        showQuestion();
    };

    function renderStatus() {
        const container = document.getElementById('status-container');
        container.innerHTML = "";
        quizData.forEach((_, i) => {
            const box = document.createElement('div');
            box.innerText = i + 1;
            
            if (isReviewMode) {
                const isCorrect = userAnswers[i] === quizData[i].a;
                box.className = `num-box ${isCorrect ? 'num-correct' : 'num-wrong'}`;
            } else {
                box.className = `num-box ${userAnswers[i] !== null ? 'num-answered' : 'num-unanswered'}`;
            }
            
            if (i === currentIdx) box.classList.add('num-active');
            box.onclick = () => { currentIdx = i; showQuestion(); };
            container.appendChild(box);
        });
    }

    function showQuestion() {
        const q = quizData[currentIdx];
        document.getElementById('question-number').innerText = `Soal #${currentIdx + 1}`;
        document.getElementById('question-text').innerText = q.q;
        const optContainer = document.getElementById('options-container');
        optContainer.innerHTML = "";

        const labels = ['A', 'B', 'C', 'D', 'E'];
        q.opt.forEach((option, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<strong>${labels[i]}.</strong> ${option}`;
            
            if (isReviewMode) {
                btn.disabled = true;
                // Jika ini adalah jawaban yang BENAR
                if (i === q.a) {
                    btn.classList.add('correct-ans');
                } 
                // Jika user memilih ini dan jawabannya SALAH
                if (userAnswers[currentIdx] === i && i !== q.a) {
                    btn.classList.add('wrong-selected');
                }
            } else {
                if (userAnswers[currentIdx] === i) btn.classList.add('selected');
                btn.onclick = () => selectAnswer(i);
            }
            
            optContainer.appendChild(btn);
        });

        // Navigasi
        document.getElementById('prev-btn').style.visibility = currentIdx === 0 ? 'hidden' : 'visible';
        document.getElementById('next-btn').innerText = currentIdx === quizData.length - 1 ? 'Selesai' : 'Selanjutnya';
        
        // Atur tampilan tombol review
        document.getElementById('back-to-result-btn').style.display = isReviewMode ? 'block' : 'none';
        
        renderStatus();
    }

    function selectAnswer(i) {
        if (isReviewMode) return;
        userAnswers[currentIdx] = i;
        showQuestion();

        // Otomatis pindah ke nomor selanjutnya
        setTimeout(() => {
            if (currentIdx < quizData.length - 1) {
                currentIdx++;
                showQuestion();
            }
        }, 300);
    }

    function nextQuestion() {
        if (currentIdx < quizData.length - 1) {
            currentIdx++;
            showQuestion();
        } else if (!isReviewMode) {
            showResult();
        } else {
            exitReview();
        }
    }

    function prevQuestion() {
        if (currentIdx > 0) {
            currentIdx--;
            showQuestion();
        }
    }

    function showResult() {
        const unanswered = userAnswers.filter(ans => ans === null).length;
        if (unanswered > 0 && !isReviewMode) {
            if (!confirm(`Ada ${unanswered} soal belum dijawab. Yakin ingin mengumpulkan?`)) return;
        }

        let correct = 0;
        userAnswers.forEach((ans, i) => { if (ans === quizData[i].a) correct++; });
        const finalScoreValue = Math.round((correct / quizData.length) * 100);
        
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('finish-quiz-btn').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = finalScoreValue;

        // --- Logika Penentuan Keterangan Skor ---
        const keteranganSkorEl = document.getElementById('keterangan-skor');
        if (finalScoreValue <= 50) {
            keteranganSkorEl.innerText = "Sangat mandiri, penyendiri, tidak butuh pengakuan, serta tidak suka bekerja dalam team";
            keteranganSkorEl.style.color = "#e74c3c"; // Warna merah
        } else {
            keteranganSkorEl.innerText = "Suka bekerja dalam kelompok/team, terkadang ingin selalu dilibatkan dan disukai rekan kerja";
            keteranganSkorEl.style.color = "#2ecc71"; // Warna hijau
        }
        // ----------------------------------------

        document.getElementById('stats-text').innerText = `Jawaban Ideal: ${correct} | Jawaban Kurang Ideal: ${quizData.length - correct}`;        
        
        isReviewMode = true; // Mode review aktif setelah skor muncul
        renderStatus();
    }

    function startReview() {
        currentIdx = 0; // Mulai dari nomor 1
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        showQuestion();
    }

    function exitReview() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
    }
</script>
