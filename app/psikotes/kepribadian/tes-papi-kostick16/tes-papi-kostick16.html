<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Profesional - Mode Review</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f7; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        
        .main-wrapper { display: flex; gap: 20px; width: 100%; max-width: 1500px; align-items: flex-start; }
        
        .sidebar-numbers { background: rgb(220, 222, 228); padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); width: 320px; flex-shrink: 0; position: sticky; top: 20px; }
        
        .quiz-container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); flex-grow: 1; min-width: 0; }

        .status-container { 
            display: grid; 
            grid-template-columns: repeat(10, 1fr); 
            gap: 6px; 
            justify-content: center; 
        }

        .num-box { 
            width: 28px; 
            height: 28px; 
            border-radius: 6px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 1px solid #ccc; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            font-size: 12px; 
        }

        .num-unanswered { background: #f8f9fa; color: #999; }
        .num-answered { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .num-active { background: #3498db !important; color: white; border-color: #2980b9; transform: scale(1.1); box-shadow: 0 0 8px rgba(52, 152, 219, 0.4); }
        .num-correct { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .num-wrong { background: #e74c3c !important; color: white; border-color: #c0392b; }

        #options-container { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .option-btn { width: 100%; text-align: left; padding: 14px; border: 2px solid #eee; border-radius: 8px; background: white; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .option-btn:hover:not(:disabled) { border-color: #3498db; background: #f7fbff; }
        .option-btn.selected { border-color: #3498db; background: #3498db; color: rgb(5, 5, 5); }
        .option-btn.correct-ans { border: 2px solid #2ecc71 !important; background: #e8f5e9 !important; color: #2e7d32 !important; font-weight: bold; }
        .option-btn.wrong-selected { border: 2px solid #e74c3c !important; background: #fdeaea !important; color: #c0392b !important; }
        
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 25px; gap: 10px; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; flex: 1; font-size: 14px; transition: 0.3s; }
        .btn-blue { background: #3498db; color: white; }
        .btn-green { background: #2ecc71; color: white; }
        .btn-orange { background: #f39c12; color: white; }
        .btn-gray { background: #95a5a6; color: white; }

        #result-screen { display: none; }

        @media (max-width: 900px) {
            .main-wrapper { flex-direction: column; align-items: center; }
            .sidebar-numbers { width: 90%; position: static; order: 2; }
            .quiz-container { width: 90%; order: 1; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="sidebar-numbers" id="sidebar-nav">
        <h5 style="margin: 0 0 15px 0; text-align: center; color: #2c3e50; font-size: 16px;">Navigasi Soal</h5>
        <div class="status-container" id="status-container"></div>
        <button id="finish-quiz-btn" class="btn btn-green" style="width:100%; margin-top:20px; font-size: 14px; padding: 10px;" onclick="showResult()">Akhiri Tes</button>
    </div>

    <div class="quiz-container">
        <div id="quiz-screen">
            <div id="question-header" style="border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; margin-bottom: 15px;">
                <span id="question-number" style="font-weight: bold; color: #3498db; font-size: 18px;">Soal #1</span>
            </div>
            <h3 id="question-text" style="color: #2c3e50; line-height: 1.2; text-align: justify; font-size: 16px; margin: 0;">Memuat pertanyaan...</h3>
            
            <div id="options-container"></div>
            
            <div class="nav-buttons">
                <button class="btn btn-gray" id="prev-btn" onclick="prevQuestion()">Kembali</button>
                <button class="btn btn-blue" id="next-btn" onclick="nextQuestion()">Selanjutnya</button>
            </div>
            
            <button class="btn btn-orange" id="back-to-result-btn" style="width:100%; margin-top:15px; display:none;" onclick="exitReview()">Selesai Review (Kembali ke Skor)</button>
        </div>

        <div id="result-screen" style="text-align: center;">
            <h2 style="color: #2c3e50;">Hasil Skor Anda</h2>
            <h1 id="final-score" style="font-size: 70px; color: #2ecc71; margin: 10px 0;">0</h1>
            
            <h3 id="keterangan-skor" style="margin-top: -10px; margin-bottom: 20px;"></h3>
            
            <p id="stats-text" style="color: #7f8c8d; font-size: 18px; margin-bottom: 30px;"></p>
            
            <div style="display: flex; flex-direction: column; gap: 10px; max-width: 300px; margin: 0 auto;">
                <button class="btn btn-orange" onclick="startReview()">Review Jawaban</button>
                <button class="btn btn-blue" onclick="location.reload()">Ulangi Kuis</button>
            </div>
        </div>
    </div>
</div>

<script>
const quizData = [
{ q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya selalu mencari cara-cara baru yang berbeda dalam menyelesaikan pekerjaan saya", "Saya merasa sangat puas jika bisa menyelesaikan tugas rutin tanpa kesalahan"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya lebih suka bekerja di satu lokasi yang tetap agar bisa fokus sepenuhnya", "Saya sangat menikmati tugas-tugas yang mengharuskan saya sering bepergian ke luar kota"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya memastikan semua dokumen saya tersusun rapi sesuai urutan abjad", "Saya sangat menyukai variasi tugas yang berubah-ubah setiap harinya"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya cepat merasa bosan jika harus mengerjakan hal yang sama dalam waktu lama", "Saya bekerja dengan sangat keras hingga melampaui batas kemampuan saya"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya selalu mematuhi instruksi atasan tanpa banyak bertanya", "Saya merasa tertantang jika harus beradaptasi dengan lingkungan kerja yang baru"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya lebih memilih pindah divisi daripada bertahan di posisi yang monoton", "Saya adalah orang yang sangat teliti dalam memeriksa detail angka-angka"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya menyukai pekerjaan yang penuh dengan kejutan dan perubahan mendadak", "Saya memiliki ambisi besar untuk menduduki posisi puncak di perusahaan ini"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya senang mencoba metode kerja yang belum pernah diterapkan sebelumnya", "Saya selalu merencanakan jadwal harian saya secara terperinci dan kaku"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat menjaga keharmonisan hubungan dengan rekan-rekan kerja saya", "Saya merasa lebih produktif jika berada di tengah situasi yang dinamis dan berubah"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sanggup bertahan pada satu jenis pekerjaan teknis selama bertahun-tahun", "Saya selalu mencari pengalaman baru yang berbeda dari apa yang saya kuasai sekarang"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya senang menangani beberapa tugas berbeda dalam waktu yang bersamaan", "Saya lebih suka mengerjakan satu proyek besar hingga benar-benar tuntas"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya bekerja dengan tempo yang stabil dan tidak terburu-buru", "Saya sangat menikmati momen saat sistem kerja di kantor mengalami perombakan total"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya merasa bersemangat jika diberikan tanggung jawab di bidang yang asing bagi saya", "Saya sangat disiplin dalam mengikuti rutinitas pagi di kantor"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya ingin diakui sebagai ahli yang paling kompeten di bidang spesifik saya", "Saya senang memperkenalkan inovasi yang mengubah kebiasaan lama di tim"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat menyukai tantangan untuk menghidupkan kembali proyek yang stagnan", "Saya lebih memilih lingkungan kerja yang tenang dan dapat diprediksi"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya memeriksa laporan berkali-kali untuk menjamin kualitas nol kesalahan", "Saya sering merasa jenuh jika tidak ada perubahan suasana di ruang kantor"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat fleksibel dalam menyesuaikan diri dengan peraturan baru yang drastis", "Saya adalah pemimpin yang sangat dominan dan suka mengatur orang lain"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya merasa segar kembali setelah melakukan perjalanan dinas yang melelahkan", "Saya lebih suka bekerja di balik meja daripada harus berinteraksi dengan banyak orang"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya merasa senang jika mendapatkan kesempatan untuk mempelajari teknologi terbaru", "Saya memastikan seluruh alat kerja saya berada pada posisi yang tetap setiap hari"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya cenderung mencari cara yang paling aman dalam mengambil keputusan bisnis", "Saya sering kali mengusulkan perubahan prosedur agar kerja tidak membosankan"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya memiliki ketahanan fisik yang kuat untuk bekerja lembur setiap malam", "Saya sangat menikmati keragaman karakter orang-orang baru yang saya temui"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya bekerja paling baik di bawah tekanan perubahan yang menuntut kreativitas", "Saya bekerja paling baik ketika segala sesuatunya sudah terorganisir dengan rapi"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya merasa bangga jika bisa mempertahankan tradisi sukses perusahaan selama ini", "Saya senang menjadi orang yang pertama kali mencoba sistem baru di kantor"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya lebih suka diberikan kebebasan untuk bereksperimen dengan ide-ide baru", "Saya lebih suka instruksi yang sangat mendetail agar tidak terjadi kekeliruan"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat menjaga kedisiplinan waktu dalam setiap janji temu saya", "Saya merasa sangat antusias ketika harus pindah domisili demi pekerjaan"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat mudah merasa tidak tenang jika pekerjaan saya terasa terlalu statis", "Saya adalah orang yang sangat patuh pada etika dan norma sosial perusahaan"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya senang beralih dari satu jenis tugas ke tugas lain agar pikiran tetap segar", "Saya senang membedah masalah yang kompleks dengan analisis yang mendalam"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya lebih suka menjadi orang yang memastikan sistem lama berjalan lancar", "Saya lebih suka menjadi orang yang merancang perubahan sistem di perusahaan"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya merasa sangat puas jika target tahunan saya tercapai sesuai rencana awal", "Saya merasa hidup saya lebih bermakna jika setiap hari ada hal baru yang saya pelajari"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat teliti dalam mendokumentasikan setiap proses administrasi", "Saya menyukai pekerjaan lapangan yang memungkinkan saya berpindah-pindah tempat"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya senang memodifikasi gaya presentasi saya agar audiens tidak merasa bosan", "Saya memastikan draf laporan saya memiliki format yang seragam setiap bulan"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya adalah individu yang sangat mandiri dan tidak suka diganggu saat bekerja", "Saya bekerja dengan sangat tangkas dalam situasi darurat yang berubah-ubah"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya lebih memilih karir yang penuh risiko namun menawarkan banyak variasi", "Saya lebih memilih karir yang stabil meskipun kenaikan jabatannya lambat"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat peka terhadap kebutuhan dan perasaan orang-orang di tim saya", "Saya sangat cepat dalam menyesuaikan gaya kerja dengan atasan yang baru"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya merasa tertinggal jika perusahaan tidak segera melakukan modernisasi", "Saya merasa lelah jika harus terus-menerus menghadapi perubahan aturan"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya selalu meletakkan barang-barang kembali pada tempatnya semula", "Saya sangat menikmati proses re-organisasi dalam struktur departemen saya"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya mengutamakan eksplorasi terhadap peluang-peluang baru yang muncul", "Saya mengutamakan objektivitas dan logika dalam setiap tindakan saya"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat menghargai rekan kerja yang setia dan konsisten selama bertahun-tahun", "Saya sangat menghargai rekan kerja yang berani membawa ide-ide revolusioner"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat fokus pada ketelitian data dan menghindari eksperimen yang berisiko", "Saya merasa tertantang untuk mengubah kelemahan tim menjadi kekuatan baru"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya senang jika jadwal saya hari ini benar-benar berbeda dengan jadwal kemarin", "Saya sangat disiplin dalam menjaga rutinitas istirahat dan makan siang saya"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya lebih suka mengambil tugas baru meskipun saya harus belajar dari nol lagi", "Saya lebih suka bekerja pada tugas yang sudah saya kuasai dengan sempurna"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat terbuka terhadap perubahan tren industri yang sangat cepat", "Saya sangat teliti dalam memeriksa validitas setiap sumber informasi"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya merasa sangat nyaman dengan lingkungan kerja yang kekeluargaan", "Saya merasa sangat nyaman dengan lingkungan kerja yang serba cepat dan inovatif"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya selalu berusaha untuk memperbarui cara saya dalam memengaruhi orang lain", "Saya selalu berusaha untuk tampil menonjol dan menjadi pusat perhatian"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya merasa sangat gembira jika saya berhasil memimpin tim dengan tangan besi", "Saya merasa sangat gembira jika mendapatkan promosi ke luar negeri"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya lebih menyukai instruksi yang bersifat umum agar saya bisa berimprovisasi", "Saya lebih menyukai instruksi yang pasti agar hasil kerja saya terjamin kualitasnya"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya senang mencari supplier atau mitra baru untuk menyegarkan kerjasama", "Saya selalu mengecek inventaris kantor agar tetap lengkap dan teratur"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya merasa sangat puas jika semua target administratif saya tercapai tepat waktu", "Saya merasa sangat bosan jika harus duduk di depan komputer sepanjang hari"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya memiliki stamina fisik untuk berpindah dari satu lokasi proyek ke lokasi lain", "Saya memiliki stamina mental untuk mengerjakan perhitungan matematis yang rumit"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Bagi saya, perubahan adalah satu-satunya cara untuk tetap relevan di masa depan", "Bagi saya, kestabilan adalah pondasi dari keamanan masa depan"], a: 0 }
];

    let currentIdx = 0;
    let userAnswers = new Array(quizData.length).fill(null);
    let isReviewMode = false;

    window.onload = () => {
        renderStatus();
        showQuestion();
    };

    function renderStatus() {
        const container = document.getElementById('status-container');
        container.innerHTML = "";
        quizData.forEach((_, i) => {
            const box = document.createElement('div');
            box.innerText = i + 1;
            
            if (isReviewMode) {
                const isCorrect = userAnswers[i] === quizData[i].a;
                box.className = `num-box ${isCorrect ? 'num-correct' : 'num-wrong'}`;
            } else {
                box.className = `num-box ${userAnswers[i] !== null ? 'num-answered' : 'num-unanswered'}`;
            }
            
            if (i === currentIdx) box.classList.add('num-active');
            box.onclick = () => { currentIdx = i; showQuestion(); };
            container.appendChild(box);
        });
    }

    function showQuestion() {
        const q = quizData[currentIdx];
        document.getElementById('question-number').innerText = `Soal #${currentIdx + 1}`;
        document.getElementById('question-text').innerText = q.q;
        const optContainer = document.getElementById('options-container');
        optContainer.innerHTML = "";

        const labels = ['A', 'B', 'C', 'D', 'E'];
        q.opt.forEach((option, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<strong>${labels[i]}.</strong> ${option}`;
            
            if (isReviewMode) {
                btn.disabled = true;
                // Jika ini adalah jawaban yang BENAR
                if (i === q.a) {
                    btn.classList.add('correct-ans');
                } 
                // Jika user memilih ini dan jawabannya SALAH
                if (userAnswers[currentIdx] === i && i !== q.a) {
                    btn.classList.add('wrong-selected');
                }
            } else {
                if (userAnswers[currentIdx] === i) btn.classList.add('selected');
                btn.onclick = () => selectAnswer(i);
            }
            
            optContainer.appendChild(btn);
        });

        // Navigasi
        document.getElementById('prev-btn').style.visibility = currentIdx === 0 ? 'hidden' : 'visible';
        document.getElementById('next-btn').innerText = currentIdx === quizData.length - 1 ? 'Selesai' : 'Selanjutnya';
        
        // Atur tampilan tombol review
        document.getElementById('back-to-result-btn').style.display = isReviewMode ? 'block' : 'none';
        
        renderStatus();
    }

    function selectAnswer(i) {
        if (isReviewMode) return;
        userAnswers[currentIdx] = i;
        showQuestion();

        // Otomatis pindah ke nomor selanjutnya
        setTimeout(() => {
            if (currentIdx < quizData.length - 1) {
                currentIdx++;
                showQuestion();
            }
        }, 300);
    }

    function nextQuestion() {
        if (currentIdx < quizData.length - 1) {
            currentIdx++;
            showQuestion();
        } else if (!isReviewMode) {
            showResult();
        } else {
            exitReview();
        }
    }

    function prevQuestion() {
        if (currentIdx > 0) {
            currentIdx--;
            showQuestion();
        }
    }

    function showResult() {
        const unanswered = userAnswers.filter(ans => ans === null).length;
        if (unanswered > 0 && !isReviewMode) {
            if (!confirm(`Ada ${unanswered} soal belum dijawab. Yakin ingin mengumpulkan?`)) return;
        }

        let correct = 0;
        userAnswers.forEach((ans, i) => { if (ans === quizData[i].a) correct++; });
        const finalScoreValue = Math.round((correct / quizData.length) * 100);
        
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('finish-quiz-btn').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = finalScoreValue;

        // --- Logika Penentuan Keterangan Skor ---
        const keteranganSkorEl = document.getElementById('keterangan-skor');
        if (finalScoreValue <= 60) {
            keteranganSkorEl.innerText = "Status quo, dan enggan mencoba hal baru";
            keteranganSkorEl.style.color = "#e74c3c"; // Warna merah
        } else {
            keteranganSkorEl.innerText = "Adaptif, dan selalu mencari inovasi";
            keteranganSkorEl.style.color = "#2ecc71"; // Warna hijau
        }
        // ----------------------------------------

        document.getElementById('stats-text').innerText = `Jawaban Ideal: ${correct} | Jawaban Kurang Ideal: ${quizData.length - correct}`;        
        
        isReviewMode = true; // Mode review aktif setelah skor muncul
        renderStatus();
    }

    function startReview() {
        currentIdx = 0; // Mulai dari nomor 1
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        showQuestion();
    }

    function exitReview() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
    }
</script>

</body>
</html>
