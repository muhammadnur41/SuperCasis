<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Profesional - Mode Review</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f7; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        
        .main-wrapper { display: flex; gap: 20px; width: 100%; max-width: 1500px; align-items: flex-start; }
        
        .sidebar-numbers { background: rgb(220, 222, 228); padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); width: 320px; flex-shrink: 0; position: sticky; top: 20px; }
        
        .quiz-container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); flex-grow: 1; min-width: 0; }

        .status-container { 
            display: grid; 
            grid-template-columns: repeat(10, 1fr); 
            gap: 6px; 
            justify-content: center; 
        }

        .num-box { 
            width: 28px; 
            height: 28px; 
            border-radius: 6px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 1px solid #ccc; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            font-size: 12px; 
        }

        .num-unanswered { background: #f8f9fa; color: #999; }
        .num-answered { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .num-active { background: #3498db !important; color: white; border-color: #2980b9; transform: scale(1.1); box-shadow: 0 0 8px rgba(52, 152, 219, 0.4); }
        .num-correct { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .num-wrong { background: #e74c3c !important; color: white; border-color: #c0392b; }

        #options-container { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .option-btn { width: 100%; text-align: left; padding: 14px; border: 2px solid #eee; border-radius: 8px; background: white; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .option-btn:hover:not(:disabled) { border-color: #3498db; background: #f7fbff; }
        .option-btn.selected { border-color: #3498db; background: #3498db; color: rgb(5, 5, 5); }
        .option-btn.correct-ans { border: 2px solid #2ecc71 !important; background: #e8f5e9 !important; color: #2e7d32 !important; font-weight: bold; }
        .option-btn.wrong-selected { border: 2px solid #e74c3c !important; background: #fdeaea !important; color: #c0392b !important; }
        
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 25px; gap: 10px; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; flex: 1; font-size: 14px; transition: 0.3s; }
        .btn-blue { background: #3498db; color: white; }
        .btn-green { background: #2ecc71; color: white; }
        .btn-orange { background: #f39c12; color: white; }
        .btn-gray { background: #95a5a6; color: white; }

        #result-screen { display: none; }

        @media (max-width: 900px) {
            .main-wrapper { flex-direction: column; align-items: center; }
            .sidebar-numbers { width: 90%; position: static; order: 2; }
            .quiz-container { width: 90%; order: 1; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="sidebar-numbers" id="sidebar-nav">
        <h5 style="margin: 0 0 15px 0; text-align: center; color: #2c3e50; font-size: 16px;">Navigasi Soal</h5>
        <div class="status-container" id="status-container"></div>
        <button id="finish-quiz-btn" class="btn btn-green" style="width:100%; margin-top:20px; font-size: 14px; padding: 10px;" onclick="showResult()">Akhiri Tes</button>
    </div>

    <div class="quiz-container">
        <div id="quiz-screen">
            <div id="question-header" style="border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; margin-bottom: 15px;">
                <span id="question-number" style="font-weight: bold; color: #3498db; font-size: 18px;">Soal #1</span>
            </div>
            <h3 id="question-text" style="color: #2c3e50; line-height: 1.2; text-align: justify; font-size: 16px; margin: 0;">Memuat pertanyaan...</h3>
            
            <div id="options-container"></div>
            
            <div class="nav-buttons">
                <button class="btn btn-gray" id="prev-btn" onclick="prevQuestion()">Kembali</button>
                <button class="btn btn-blue" id="next-btn" onclick="nextQuestion()">Selanjutnya</button>
            </div>
            
            <button class="btn btn-orange" id="back-to-result-btn" style="width:100%; margin-top:15px; display:none;" onclick="exitReview()">Selesai Review (Kembali ke Skor)</button>
        </div>

        <div id="result-screen" style="text-align: center;">
            <h2 style="color: #2c3e50;">Hasil Skor Anda</h2>
            <h1 id="final-score" style="font-size: 70px; color: #2ecc71; margin: 10px 0;">0</h1>
            
            <h3 id="keterangan-skor" style="margin-top: -10px; margin-bottom: 20px;"></h3>
            
            <p id="stats-text" style="color: #7f8c8d; font-size: 18px; margin-bottom: 30px;"></p>
            
            <div style="display: flex; flex-direction: column; gap: 10px; max-width: 300px; margin: 0 auto;">
                <button class="btn btn-orange" onclick="startReview()">Review Jawaban</button>
                <button class="btn btn-blue" onclick="location.reload()">Ulangi Kuis</button>
            </div>
        </div>
    </div>
</div>

<script>
const quizData = [
{ q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya adalah orang yang mengutamakan kecepatan luar biasa dalam mengeksekusi rencana", "Saya menekan rasa marah dan ego saya dalam-dalam demi menjaga keharmonisan tim"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya memiliki stamina fisik yang luar biasa untuk mobilitas pekerjaan lapangan yang intens", "Saya memilih diam sejenak untuk meredakan emosi daripada melontarkan kata-kata kasar"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya selalu menyiapkan tiga rencana cadangan sekaligus untuk mengantisipasi setiap risiko kegagalan", "Saya memiliki filter emosi yang sangat baik sehingga kebal terhadap persaingan politik kantor yang kotor"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya meneliti setiap angka dalam laporan keuangan agar tidak ada kesalahan sekecil apa pun", "Saya mampu menyembunyikan rasa frustrasi saya dengan baik saat proyek besar dibatalkan"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya bekerja keras tiada henti untuk membuktikan bahwa kemampuan saya lebih baik dari orang lain", "Meskipun dikritik secara tidak adil, saya tetap merespons dengan nada bicara yang pelan dan sopan"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya tetap tersenyum ramah meskipun saat itu saya sedang menghadapi tekanan mental yang berat", "Saya rela mengorbankan seluruh waktu akhir pekan saya untuk mengejar target penjualan kuartal ini"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya selalu berpikir logis dan mematikan sisi emosional saya saat mengambil keputusan sulit", "Saya dengan cepat membuat keputusan strategis dan berisiko dalam situasi darurat"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya dapat menahan dorongan untuk mengeluh meskipun harus mengerjakan tugas rekan yang malas", "Saya sangat menikmati pekerjaan fisik yang menguras keringat daripada sekadar duduk di meja"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat peduli pada perasaan dan sering mendengarkan keluh kesah pribadi rekan kerja saya", "Saya tidak pernah membiarkan perasaan pribadi memengaruhi penilaian profesional saya"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya selalu mengikuti semua aturan tertulis dan prosedur standar perusahaan tanpa pengecualian", "Saya menolak keras untuk terlibat dalam drama emosional atau gosip di lingkungan kantor"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya jarang memperlihatkan kekecewaan atau kepanikan saya di depan rekan kerja", "Saya akan langsung mengambil alih kendali saat tim sedang kehilangan arah"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya lebih memilih menelan harga diri dan ego saya daripada memicu pertengkaran verbal di kantor", "Saya akan terus menerus mencoba memecahkan satu masalah sampai saya mendapatkan hasil yang sempurna"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya mampu menahan amarah yang meledak-ledak meskipun dituduh atas kesalahan yang tidak saya buat", "Saya sangat pandai mencairkan suasana kaku di kantor dengan humor dan obrolan hangat"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saat perdebatan memanas, saya adalah orang pertama yang mengambil napas panjang dan menenangkan diri", "Saya suka memberikan arahan yang tegas dan menuntut tingkat kepatuhan yang tinggi dari bawahan"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Kesabaran saya sangat panjang dalam menghadapi klien yang terus-menerus mengubah pikiran", "Saya selalu ingin menjadi pusat perhatian dan 'bintang' dalam setiap presentasi perusahaan"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya selalu menempatkan barang dan dokumen kembali pada tempat asalnya", "Saya tidak mudah tersinggung atau terbawa emosi oleh komentar pedas dari klien"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya mengupayakan segala cara agar profil saya dikenal dan disukai oleh dewan direksi", "Saya tidak akan memperlihatkan wajah cemberut meskipun saya tersinggung oleh lelucon rekan kerja"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya memeriksa draf kontrak berulang kali hingga format dan isinya benar-benar sempurna", "Saya sanggup menelan kata-kata sarkastis ketika sedang berselisih paham dengan kolega"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya memiliki rencana yang sangat agresif untuk meraih promosi jabatan secepat mungkin", "Ketenangan emosi saya memampukan saya untuk berpikir jernih di saat semua orang panik"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat mudah bersimpati dan terharu oleh penderitaan orang-orang di sekitar saya", "Saya mampu bersikap sangat dingin dan rasional saat harus memberikan surat peringatan (SP)"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sanggup bekerja lembur hingga larut malam demi menyelesaikan beban kerja departemen", "Saya tidak membiarkan provokasi memancing amarah saya di tempat kerja"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Pengendalian amarah yang luar biasa adalah prinsip utama saya dalam mendefinisikan profesionalisme", "Menjadi bagian yang dicintai dan diterima dengan baik oleh rekan satu tim adalah prioritas utama saya"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya tidak mudah terpancing provokasi emosional dari pesaing atau rekan kerja yang iri", "Saya memiliki ambisi kuat untuk memimpin divisi ini dalam dua tahun ke depan"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya bekerja dengan ritme yang sangat cepat namun tetap mempertahankan produktivitas tinggi", "Saya dapat mengontrol nada suara saya agar tetap datar saat sedang berdebat panas"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat membutuhkan dukungan moril dan kasih sayang dari rekan-rekan terdekat saya", "Saya menahan keluh kesah pribadi saya agar tidak membebani pikiran orang lain di kantor"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya selalu menjaga ekspresi wajah tetap netral saat berhadapan dengan atasan yang tidak rasional", "Saya ingin selalu tampil menonjol dan diperhatikan oleh jajaran manajemen atas"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya dapat mengendalikan detak jantung dan menyembunyikan rasa gugup saat diinterogasi atasan", "Saya mengambil alih komando pemberian instruksi ketika manajer saya tidak hadir"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Menjaga wajah tetap tegar seolah tidak terjadi apa-apa saat perusahaan krisis adalah keahlian saya", "Saya bekerja dengan laju produktivitas yang sangat tinggi yang sulit ditandingi oleh karyawan biasa"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya lebih memilih menahan diri dan mengevaluasi situasi sebelum meluapkan kekesalan", "Saya berani menentang kebijakan manajemen yang menurut saya tidak efisien"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat menyukai pekerjaan yang mengharuskan saya terus bergerak aktif ke luar kota", "Saya tidak pernah membanting barang, menggebrak meja, atau memaki saat sedang marah besar"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Ketahanan emosional saya membuat saya tidak mudah diintimidasi oleh gertakan negosiator lawan", "Saya sangat antusias untuk segera menguji coba perangkat lunak atau sistem kerja yang benar-benar baru"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya selalu menetapkan target karir yang sangat tinggi dan ambisius", "Saya tetap berkepala dingin meskipun berada di bawah tekanan tenggat waktu yang tidak masuk akal"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya mengendalikan kekecewaan saya dengan sangat elegan saat ide saya ditolak mentah-mentah", "Saya senang bergaul dan secara proaktif memperluas jaringan sosial di industri ini"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat perfeksionis dalam menata ruang kerja agar semuanya simetris dan rapi", "Saya memiliki kontrol diri yang kuat sehingga saya hampir tidak pernah meledak marah di depan umum"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya merasa sangat perlu untuk diterima dan diakui sebagai bagian dari sebuah tim yang solid", "Menjaga kestabilan emosi adalah kekuatan utama saya dalam menghadapi konflik internal"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya adalah orang yang sangat supel, humoris, dan mudah mencairkan suasana di berbagai kesempatan", "Saya mampu menyembunyikan kegembiraan saya agar tidak menyinggung rekan kompetitor yang gagal"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Ketegangan dan kepanikan jarang sekali terlihat di raut wajah saya saat situasi krisis", "Saya suka memegang otoritas penuh atas proyek-proyek penting di perusahaan"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya mencurahkan 100% energi, ambisi, dan pikiran saya untuk mencapai posisi jabatan tertinggi", "Saya bisa mempertahankan intonasi bicara agar tetap pelan dan stabil saat dimaki oleh pelanggan yang marah"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya selalu membuat jadwal kerja harian yang sangat terstruktur dan menaatinya dengan kaku", "Saya tidak bereaksi panik atau histeris saat sistem jaringan perusahaan tiba-tiba mati total"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya memastikan setiap baris kode atau data dihitung dengan tingkat presisi yang mutlak", "Saya tidak pernah membalas hinaan personal dengan hinaan balik di lingkungan kerja"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya mengolah rasa sakit hati akibat kritikan tajam menjadi energi kerja secara diam-diam", "Saya merasa sangat bangga jika bawahan saya mengakui saya sebagai pemimpin yang berani"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya meredam emosi negatif saya sekuat tenaga agar tidak merusak atmosfer rapat", "Saya lebih suka memformulasikan konsep bisnis baru daripada mengurus rutinitas operasional"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya lebih suka menganalisis masalah dari sudut pandang teoretis dan strategis jangka panjang", "Ketenangan batin saya tidak mudah goyah oleh perubahan peraturan yang mendadak"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya merasa sangat sedih dan kehilangan motivasi jika saya dikucilkan dari pergaulan kantor", "Saya mampu bersikap sangat objektif dan tidak melibatkan perasaan saat menilai kinerja teman sendiri"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya tidak mudah kehilangan kesabaran saat harus melatih staf baru yang lambat memahami instruksi", "Saya selalu patuh pada perintah atasan meskipun instruksi tersebut bertentangan dengan kata hati saya"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Kemampuan saya mematikan sisi emosional sering menyelamatkan perusahaan dari keputusan gegabah", "Saya sangat mahir mengambil keputusan kilat di lapangan tanpa perlu menunggu persetujuan atasan"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya akan terus memikirkan satu masalah teknis sampai solusinya benar-benar ditemukan", "Saya jarang menunjukkan rasa gugup agar tim saya tetap merasa aman dan percaya diri"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya menghabiskan waktu luang saya untuk menganalisis tren pasar masa depan secara teoretis", "Saya memilih untuk pergi menjauh sejenak demi mendinginkan kepala saat tensi konflik memuncak"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya tidak akan pulang sebelum seluruh daftar pekerjaan harian saya tuntas dikerjakan", "Saya menahan diri untuk tidak meledak marah saat bawahan melakukan kesalahan fatal"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya tidak membiarkan suasana hati (mood) buruk di rumah merusak profesionalisme saya di kantor", "Saya merasa sangat cemas dan tidak tenang jika ada tugas yang ditinggalkan setengah jalan"], a: 0 }
];

    let currentIdx = 0;
    let userAnswers = new Array(quizData.length).fill(null);
    let isReviewMode = false;

    window.onload = () => {
        renderStatus();
        showQuestion();
    };

    function renderStatus() {
        const container = document.getElementById('status-container');
        container.innerHTML = "";
        quizData.forEach((_, i) => {
            const box = document.createElement('div');
            box.innerText = i + 1;
            
            if (isReviewMode) {
                const isCorrect = userAnswers[i] === quizData[i].a;
                box.className = `num-box ${isCorrect ? 'num-correct' : 'num-wrong'}`;
            } else {
                box.className = `num-box ${userAnswers[i] !== null ? 'num-answered' : 'num-unanswered'}`;
            }
            
            if (i === currentIdx) box.classList.add('num-active');
            box.onclick = () => { currentIdx = i; showQuestion(); };
            container.appendChild(box);
        });
    }

    function showQuestion() {
        const q = quizData[currentIdx];
        document.getElementById('question-number').innerText = `Soal #${currentIdx + 1}`;
        document.getElementById('question-text').innerText = q.q;
        const optContainer = document.getElementById('options-container');
        optContainer.innerHTML = "";

        const labels = ['A', 'B', 'C', 'D', 'E'];
        q.opt.forEach((option, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<strong>${labels[i]}.</strong> ${option}`;
            
            if (isReviewMode) {
                btn.disabled = true;
                // Jika ini adalah jawaban yang BENAR
                if (i === q.a) {
                    btn.classList.add('correct-ans');
                } 
                // Jika user memilih ini dan jawabannya SALAH
                if (userAnswers[currentIdx] === i && i !== q.a) {
                    btn.classList.add('wrong-selected');
                }
            } else {
                if (userAnswers[currentIdx] === i) btn.classList.add('selected');
                btn.onclick = () => selectAnswer(i);
            }
            
            optContainer.appendChild(btn);
        });

        // Navigasi
        document.getElementById('prev-btn').style.visibility = currentIdx === 0 ? 'hidden' : 'visible';
        document.getElementById('next-btn').innerText = currentIdx === quizData.length - 1 ? 'Selesai' : 'Selanjutnya';
        
        // Atur tampilan tombol review
        document.getElementById('back-to-result-btn').style.display = isReviewMode ? 'block' : 'none';
        
        renderStatus();
    }

    function selectAnswer(i) {
        if (isReviewMode) return;
        userAnswers[currentIdx] = i;
        showQuestion();

        // Otomatis pindah ke nomor selanjutnya
        setTimeout(() => {
            if (currentIdx < quizData.length - 1) {
                currentIdx++;
                showQuestion();
            }
        }, 300);
    }

    function nextQuestion() {
        if (currentIdx < quizData.length - 1) {
            currentIdx++;
            showQuestion();
        } else if (!isReviewMode) {
            showResult();
        } else {
            exitReview();
        }
    }

    function prevQuestion() {
        if (currentIdx > 0) {
            currentIdx--;
            showQuestion();
        }
    }

    function showResult() {
        const unanswered = userAnswers.filter(ans => ans === null).length;
        if (unanswered > 0 && !isReviewMode) {
            if (!confirm(`Ada ${unanswered} soal belum dijawab. Yakin ingin mengumpulkan?`)) return;
        }

        let correct = 0;
        userAnswers.forEach((ans, i) => { if (ans === quizData[i].a) correct++; });
        const finalScoreValue = Math.round((correct / quizData.length) * 100);
        
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('finish-quiz-btn').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = finalScoreValue;

        // --- Logika Penentuan Keterangan Skor ---
        const keteranganSkorEl = document.getElementById('keterangan-skor');
        if (finalScoreValue <= 60) {
            keteranganSkorEl.innerText = "Ekspresif, mudah meledak, emosi mudah terbaca (terbuka).";
            keteranganSkorEl.style.color = "#e74c3c"; // Warna merah
        } else {
            keteranganSkorEl.innerText = "Sangat tenang, mampu mengendalikan diri, dan menyembunyikan perasaannya";
            keteranganSkorEl.style.color = "#2ecc71"; // Warna hijau
        }
        // ----------------------------------------

        document.getElementById('stats-text').innerText = `Jawaban Ideal: ${correct} | Jawaban Kurang Ideal: ${quizData.length - correct}`;        
        
        isReviewMode = true; // Mode review aktif setelah skor muncul
        renderStatus();
    }

    function startReview() {
        currentIdx = 0; // Mulai dari nomor 1
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        showQuestion();
    }

    function exitReview() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
    }
</script>

</body>
</html>
