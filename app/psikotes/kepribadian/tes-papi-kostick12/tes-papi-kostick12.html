<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Profesional - Mode Review</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f7; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        
        .main-wrapper { display: flex; gap: 20px; width: 100%; max-width: 1500px; align-items: flex-start; }
        
        .sidebar-numbers { background: rgb(220, 222, 228); padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); width: 320px; flex-shrink: 0; position: sticky; top: 20px; }
        
        .quiz-container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); flex-grow: 1; min-width: 0; }

        .status-container { 
            display: grid; 
            grid-template-columns: repeat(10, 1fr); 
            gap: 6px; 
            justify-content: center; 
        }

        .num-box { 
            width: 28px; 
            height: 28px; 
            border-radius: 6px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 1px solid #ccc; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            font-size: 12px; 
        }

        .num-unanswered { background: #f8f9fa; color: #999; }
        .num-answered { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .num-active { background: #3498db !important; color: white; border-color: #2980b9; transform: scale(1.1); box-shadow: 0 0 8px rgba(52, 152, 219, 0.4); }
        .num-correct { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .num-wrong { background: #e74c3c !important; color: white; border-color: #c0392b; }

        #options-container { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .option-btn { width: 100%; text-align: left; padding: 14px; border: 2px solid #eee; border-radius: 8px; background: white; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .option-btn:hover:not(:disabled) { border-color: #3498db; background: #f7fbff; }
        .option-btn.selected { border-color: #3498db; background: #3498db; color: rgb(5, 5, 5); }
        .option-btn.correct-ans { border: 2px solid #2ecc71 !important; background: #e8f5e9 !important; color: #2e7d32 !important; font-weight: bold; }
        .option-btn.wrong-selected { border: 2px solid #e74c3c !important; background: #fdeaea !important; color: #c0392b !important; }
        
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 25px; gap: 10px; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; flex: 1; font-size: 14px; transition: 0.3s; }
        .btn-blue { background: #3498db; color: white; }
        .btn-green { background: #2ecc71; color: white; }
        .btn-orange { background: #f39c12; color: white; }
        .btn-gray { background: #95a5a6; color: white; }

        #result-screen { display: none; }

        @media (max-width: 900px) {
            .main-wrapper { flex-direction: column; align-items: center; }
            .sidebar-numbers { width: 90%; position: static; order: 2; }
            .quiz-container { width: 90%; order: 1; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="sidebar-numbers" id="sidebar-nav">
        <h5 style="margin: 0 0 15px 0; text-align: center; color: #2c3e50; font-size: 16px;">Navigasi Soal</h5>
        <div class="status-container" id="status-container"></div>
        <button id="finish-quiz-btn" class="btn btn-green" style="width:100%; margin-top:20px; font-size: 14px; padding: 10px;" onclick="showResult()">Akhiri Tes</button>
    </div>

    <div class="quiz-container">
        <div id="quiz-screen">
            <div id="question-header" style="border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; margin-bottom: 15px;">
                <span id="question-number" style="font-weight: bold; color: #3498db; font-size: 18px;">Soal #1</span>
            </div>
            <h3 id="question-text" style="color: #2c3e50; line-height: 1.2; text-align: justify; font-size: 16px; margin: 0;">Memuat pertanyaan...</h3>
            
            <div id="options-container"></div>
            
            <div class="nav-buttons">
                <button class="btn btn-gray" id="prev-btn" onclick="prevQuestion()">Kembali</button>
                <button class="btn btn-blue" id="next-btn" onclick="nextQuestion()">Selanjutnya</button>
            </div>
            
            <button class="btn btn-orange" id="back-to-result-btn" style="width:100%; margin-top:15px; display:none;" onclick="exitReview()">Selesai Review (Kembali ke Skor)</button>
        </div>

        <div id="result-screen" style="text-align: center;">
            <h2 style="color: #2c3e50;">Hasil Skor Anda</h2>
            <h1 id="final-score" style="font-size: 70px; color: #2ecc71; margin: 10px 0;">0</h1>
            
            <h3 id="keterangan-skor" style="margin-top: -10px; margin-bottom: 20px;"></h3>
            
            <p id="stats-text" style="color: #7f8c8d; font-size: 18px; margin-bottom: 30px;"></p>
            
            <div style="display: flex; flex-direction: column; gap: 10px; max-width: 300px; margin: 0 auto;">
                <button class="btn btn-orange" onclick="startReview()">Review Jawaban</button>
                <button class="btn btn-blue" onclick="location.reload()">Ulangi Kuis</button>
            </div>
        </div>
    </div>
</div>

<script>
const quizData = [
{ q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya selalu berusaha untuk tidak bergantung pada perasaan orang lain saat bekerja", "Saya sangat menikmati suasana kantor yang penuh dengan tawa dan keakraban"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya ingin diperlakukan dengan penuh kelembutan oleh atasan saya", "Saya tidak butuh simpati dari orang lain asalkan target saya tercapai"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat teliti dalam mendeteksi kesalahan kecil dalam laporan proyek", "Hubungan yang tulus dan jujur dengan atasan sangat penting bagi kenyamanan saya"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya memeriksa setiap detail laporan untuk memastikan tidak ada kesalahan sekecil apa pun", "Saya sangat menikmati momen memberikan dukungan emosional kepada anggota tim"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat bangga dengan kemampuan saya memimpin tim dengan tangan besi", "Saya merasa hampa jika bekerja di lingkungan yang komunikasinya hanya soal tugas"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya merasa sangat nyaman jika bisa berbagi cerita pribadi dengan teman sekantor", "Saya tidak akan berhenti bekerja sebelum seluruh tugas saya selesai dengan sempurna"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya bekerja paling baik jika saya diberikan instruksi yang sangat jelas dan teknis", "Saya ingin memiliki hubungan yang mendalam dengan orang-orang yang bekerja dengan saya"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sering kali mengutamakan keharmonisan perasaan di dalam tim daripada hasil kerja", "Saya sangat teliti dalam menyusun rencana kerja jangka panjang yang strategis"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya selalu memantau pekerjaan bawahan saya dengan sangat ketat dan otoriter", "Kehangatan dalam berinteraksi adalah kunci kesuksesan saya dalam bekerja"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat peka terhadap perubahan suasana hati orang-orang di sekitar saya", "Saya selalu mematuhi setiap prosedur dan aturan perusahaan secara kaku"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat mudah memaafkan kesalahan orang lain demi menjaga kedekatan", "Saya sangat disiplin dalam mengikuti tata tertib yang berlaku di perusahaan"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya lebih suka bekerja secara mandiri tanpa perlu bergantung pada bantuan orang lain", "Saya merasa sangat puas jika bisa membantu rekan kerja menyelesaikan masalah pribadinya"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya lebih suka menjaga jarak profesional agar pekerjaan tidak terganggu urusan perasaan", "Saya merasa sedih jika hubungan saya dengan rekan kerja menjadi dingin atau kaku"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya adalah tipe pekerja yang sangat tangguh dan tidak mudah goyah oleh kritik", "Saya merasa sangat terpukul jika salah satu rekan kerja saya membenci saya"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya berusaha menciptakan suasana kerja yang penuh kasih sayang dan kehangatan", "Saya selalu mengambil keputusan secara cepat dan tegas tanpa keraguan"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sering meluangkan waktu untuk mendengarkan keluh kesah teman di kantor", "Saya sangat fokus pada efisiensi kerja dan mengabaikan obrolan yang tidak penting"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya adalah orang yang sangat keras kepala jika sudah memiliki satu keyakinan", "Saya sangat menghargai rekan kerja yang mau mendengarkan sisi emosional saya"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat berambisi untuk mengalahkan pencapaian rekan kerja yang lain", "Saya merasa lebih hidup jika pekerjaan saya melibatkan banyak sentuhan kemanusiaan"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya selalu mengingat hari ulang tahun atau momen penting rekan kerja saya", "Saya sangat teliti dalam mengikuti instruksi teknis yang diberikan manajer"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat proaktif dalam mendamaikan hubungan rekan kerja yang sedang retak", "Saya sangat proaktif dalam mengambil alih tanggung jawab yang berat"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya ingin rekan kerja menganggap saya sebagai sahabat karib, bukan sekadar kolega", "Menjadi pemimpin yang ditakuti lebih efektif daripada menjadi pemimpin yang disukai"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya lebih suka menjadi pengamat yang diam daripada terlibat dalam percakapan", "Saya adalah tipe orang yang sangat setia kawan dalam situasi apa pun"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat kompetitif dalam memperebutkan bonus atau penghargaan tahunan", "Saya lebih suka mengalah daripada harus merusak hubungan baik dengan kolega"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya selalu menunjukkan keramahan yang hangat kepada siapa pun yang saya temui", "Saya memastikan seluruh area kerja saya tertata dengan sangat rapi dan sistematis"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya adalah individu yang sangat disiplin dalam mengatur waktu dan jadwal harian", "Saya ingin orang lain merasa nyaman untuk bersandar dan bercerita kepada saya"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat menghindari perkataan yang dapat melukai perasaan rekan kerja saya", "Saya berani melakukan konfrontasi keras jika ada yang menghalangi pekerjaan saya"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sering kali menunjukkan rasa sayang dan apresiasi saya kepada rekan setim", "Saya sangat pandai menyembunyikan emosi saya di depan orang lain"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya selalu berusaha bersikap netral dan tidak melibatkan perasaan dalam konflik", "Saya sangat peka jika ada rekan kerja yang sedang merasa tidak nyaman atau sedih"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat lihai dalam berdebat dan memenangkan argumen di depan umum", "Kepekaan emosional saya membantu saya memahami kebutuhan tersembunyi tim"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya lebih suka memendam masalah saya sendiri daripada merepotkan orang lain", "Saya cenderung mencari dukungan emosional dari teman saat saya merasa tertekan"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya memiliki energi fisik yang sangat besar untuk bekerja di lapangan seharian", "Saya sering merasa cemas jika ada rekan kerja yang menjauh dari saya"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya selalu menggunakan analisis data sebelum menentukan pilihan", "Saya bertindak berdasarkan intuisi dan perasaan saya terhadap orang lain"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya selalu ingin tampil menonjol dan menjadi pusat perhatian dalam setiap rapat", "Saya mendambakan lingkungan kerja yang terasa seperti keluarga sendiri"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya memastikan seluruh area kerja saya tertata dengan sangat rapi dan sistematis", "Saya selalu berusaha menunjukkan keramahan yang hangat kepada siapa pun yang saya temui"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat peduli pada perasaan rekan kerja ketika mereka sedang menghadapi masalah", "Saya selalu mengutamakan logika dan fakta objektif dalam setiap diskusi"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat fleksibel dalam bekerja demi membantu teman yang sedang kewalahan", "Saya bekerja dengan sangat kaku dan terorganisir sesuai dengan rencana semula"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya merasa sangat bahagia jika bisa membuat orang lain tersenyum di kantor", "Saya menetapkan target yang sangat tinggi bagi diri saya dan harus mencapainya"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya lebih suka mengerjakan tugas-tugas yang bersifat teknis dan rumit sendirian", "Saya merasa sangat bangga jika saya dianggap sebagai 'kakak' atau 'pelindung' di kantor"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya senang memberikan perhatian-perhatian kecil yang menyentuh hati rekan kerja", "Saya memisahkan dengan tegas antara urusan kantor dan urusan pertemanan"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat butuh kepastian bahwa rekan kerja saya benar-benar menyukai saya", "Saya bekerja dengan tempo yang stabil dan tidak terburu-buru"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat tulus dalam menunjukkan simpati kepada orang yang sedang kesulitan", "Saya memiliki ambisi besar untuk menduduki jabatan tertinggi di perusahaan ini"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya menganggap pergantian anggota tim sebagai hal biasa dalam dunia bisnis", "Saya merasa sangat sedih jika tim saya bubar atau ada anggota yang pindah"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya ingin diakui sebagai orang yang paling peduli dan empati di kantor saya", "Saya ingin diakui sebagai orang yang paling cerdas di bidang pekerjaan saya"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya selalu menghindari pembicaraan yang melibatkan perasaan di kantor", "Saya sangat menghargai kejujuran emosional meskipun itu terasa menyakitkan"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya merasa sangat tenang jika dikelilingi oleh rekan kerja yang ramah dan penuh perhatian", "Saya lebih mementingkan pencapaian angka penjualan daripada hubungan antar staf"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat senang ketika rekan kerja mempercayakan rahasia mereka kepada saya", "Saya selalu mengecek dokumen berkali-kali untuk menjamin kualitas nol kesalahan"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Mengetahui bahwa saya dicintai dan dihargai oleh lingkungan kerja membuat saya bahagia", "Mendapatkan pujian atas prestasi kerja saya adalah motivasi utama saya"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya lebih suka menjaga jarak fisik yang sopan dan formal di tempat kerja", "Saya merasa sangat nyaman saat harus memberikan pelukan atau jabat tangan yang hangat"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Bagi saya, disiplin dan kerja keras adalah bensin utama dalam produktivitas kerja", "Bagi saya, kedekatan antarmanusia adalah bensin utama dalam produktivitas kerja"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya bekerja dengan tempo yang sangat cepat untuk melampaui target harian", "Membangun hubungan yang akrab dan personal dengan rekan kerja adalah hal penting bagi saya"], a: 1 }
];

    let currentIdx = 0;
    let userAnswers = new Array(quizData.length).fill(null);
    let isReviewMode = false;

    window.onload = () => {
        renderStatus();
        showQuestion();
    };

    function renderStatus() {
        const container = document.getElementById('status-container');
        container.innerHTML = "";
        quizData.forEach((_, i) => {
            const box = document.createElement('div');
            box.innerText = i + 1;
            
            if (isReviewMode) {
                const isCorrect = userAnswers[i] === quizData[i].a;
                box.className = `num-box ${isCorrect ? 'num-correct' : 'num-wrong'}`;
            } else {
                box.className = `num-box ${userAnswers[i] !== null ? 'num-answered' : 'num-unanswered'}`;
            }
            
            if (i === currentIdx) box.classList.add('num-active');
            box.onclick = () => { currentIdx = i; showQuestion(); };
            container.appendChild(box);
        });
    }

    function showQuestion() {
        const q = quizData[currentIdx];
        document.getElementById('question-number').innerText = `Soal #${currentIdx + 1}`;
        document.getElementById('question-text').innerText = q.q;
        const optContainer = document.getElementById('options-container');
        optContainer.innerHTML = "";

        const labels = ['A', 'B', 'C', 'D', 'E'];
        q.opt.forEach((option, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<strong>${labels[i]}.</strong> ${option}`;
            
            if (isReviewMode) {
                btn.disabled = true;
                // Jika ini adalah jawaban yang BENAR
                if (i === q.a) {
                    btn.classList.add('correct-ans');
                } 
                // Jika user memilih ini dan jawabannya SALAH
                if (userAnswers[currentIdx] === i && i !== q.a) {
                    btn.classList.add('wrong-selected');
                }
            } else {
                if (userAnswers[currentIdx] === i) btn.classList.add('selected');
                btn.onclick = () => selectAnswer(i);
            }
            
            optContainer.appendChild(btn);
        });

        // Navigasi
        document.getElementById('prev-btn').style.visibility = currentIdx === 0 ? 'hidden' : 'visible';
        document.getElementById('next-btn').innerText = currentIdx === quizData.length - 1 ? 'Selesai' : 'Selanjutnya';
        
        // Atur tampilan tombol review
        document.getElementById('back-to-result-btn').style.display = isReviewMode ? 'block' : 'none';
        
        renderStatus();
    }

    function selectAnswer(i) {
        if (isReviewMode) return;
        userAnswers[currentIdx] = i;
        showQuestion();

        // Otomatis pindah ke nomor selanjutnya
        setTimeout(() => {
            if (currentIdx < quizData.length - 1) {
                currentIdx++;
                showQuestion();
            }
        }, 300);
    }

    function nextQuestion() {
        if (currentIdx < quizData.length - 1) {
            currentIdx++;
            showQuestion();
        } else if (!isReviewMode) {
            showResult();
        } else {
            exitReview();
        }
    }

    function prevQuestion() {
        if (currentIdx > 0) {
            currentIdx--;
            showQuestion();
        }
    }

    function showResult() {
        const unanswered = userAnswers.filter(ans => ans === null).length;
        if (unanswered > 0 && !isReviewMode) {
            if (!confirm(`Ada ${unanswered} soal belum dijawab. Yakin ingin mengumpulkan?`)) return;
        }

        let correct = 0;
        userAnswers.forEach((ans, i) => { if (ans === quizData[i].a) correct++; });
        const finalScoreValue = Math.round((correct / quizData.length) * 100);
        
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('finish-quiz-btn').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = finalScoreValue;

        // --- Logika Penentuan Keterangan Skor ---
        const keteranganSkorEl = document.getElementById('keterangan-skor');
        if (finalScoreValue <= 55) {
            keteranganSkorEl.innerText = "Sangat menjaga jarak, objektif, dan dingin dalam hubungan profesional";
            keteranganSkorEl.style.color = "#e74c3c"; // Warna merah
        } else {
            keteranganSkorEl.innerText = "Peka, butuh dukungan emosional dari rekan atau atasan";
            keteranganSkorEl.style.color = "#2ecc71"; // Warna hijau
        }
        // ----------------------------------------

        document.getElementById('stats-text').innerText = `Jawaban Ideal: ${correct} | Jawaban Kurang Ideal: ${quizData.length - correct}`;        
        
        isReviewMode = true; // Mode review aktif setelah skor muncul
        renderStatus();
    }

    function startReview() {
        currentIdx = 0; // Mulai dari nomor 1
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        showQuestion();
    }

    function exitReview() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
    }
</script>

<script>
