<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Profesional - Mode Review</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f7; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        
        .main-wrapper { display: flex; gap: 20px; width: 100%; max-width: 1500px; align-items: flex-start; }
        
        .sidebar-numbers { background: rgb(220, 222, 228); padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); width: 320px; flex-shrink: 0; position: sticky; top: 20px; }
        
        .quiz-container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); flex-grow: 1; min-width: 0; }

        .status-container { 
            display: grid; 
            grid-template-columns: repeat(10, 1fr); 
            gap: 6px; 
            justify-content: center; 
        }

        .num-box { 
            width: 28px; 
            height: 28px; 
            border-radius: 6px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 1px solid #ccc; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            font-size: 12px; 
        }

        .num-unanswered { background: #f8f9fa; color: #999; }
        .num-answered { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .num-active { background: #3498db !important; color: white; border-color: #2980b9; transform: scale(1.1); box-shadow: 0 0 8px rgba(52, 152, 219, 0.4); }
        .num-correct { background: #2ecc71 !important; color: white; border-color: #27ae60; }
        .num-wrong { background: #e74c3c !important; color: white; border-color: #c0392b; }

        #options-container { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .option-btn { width: 100%; text-align: left; padding: 14px; border: 2px solid #eee; border-radius: 8px; background: white; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .option-btn:hover:not(:disabled) { border-color: #3498db; background: #f7fbff; }
        .option-btn.selected { border-color: #3498db; background: #3498db; color: rgb(5, 5, 5); }
        .option-btn.correct-ans { border: 2px solid #2ecc71 !important; background: #e8f5e9 !important; color: #2e7d32 !important; font-weight: bold; }
        .option-btn.wrong-selected { border: 2px solid #e74c3c !important; background: #fdeaea !important; color: #c0392b !important; }
        
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 25px; gap: 10px; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; flex: 1; font-size: 14px; transition: 0.3s; }
        .btn-blue { background: #3498db; color: white; }
        .btn-green { background: #2ecc71; color: white; }
        .btn-orange { background: #f39c12; color: white; }
        .btn-gray { background: #95a5a6; color: white; }

        #result-screen { display: none; }

        @media (max-width: 900px) {
            .main-wrapper { flex-direction: column; align-items: center; }
            .sidebar-numbers { width: 90%; position: static; order: 2; }
            .quiz-container { width: 90%; order: 1; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="sidebar-numbers" id="sidebar-nav">
        <h5 style="margin: 0 0 15px 0; text-align: center; color: #2c3e50; font-size: 16px;">Navigasi Soal</h5>
        <div class="status-container" id="status-container"></div>
        <button id="finish-quiz-btn" class="btn btn-green" style="width:100%; margin-top:20px; font-size: 14px; padding: 10px;" onclick="showResult()">Akhiri Tes</button>
    </div>

    <div class="quiz-container">
        <div id="quiz-screen">
            <div id="question-header" style="border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; margin-bottom: 15px;">
                <span id="question-number" style="font-weight: bold; color: #3498db; font-size: 18px;">Soal #1</span>
            </div>
            <h3 id="question-text" style="color: #2c3e50; line-height: 1.2; text-align: justify; font-size: 16px; margin: 0;">Memuat pertanyaan...</h3>
            
            <div id="options-container"></div>
            
            <div class="nav-buttons">
                <button class="btn btn-gray" id="prev-btn" onclick="prevQuestion()">Kembali</button>
                <button class="btn btn-blue" id="next-btn" onclick="nextQuestion()">Selanjutnya</button>
            </div>
            
            <button class="btn btn-orange" id="back-to-result-btn" style="width:100%; margin-top:15px; display:none;" onclick="exitReview()">Selesai Review (Kembali ke Skor)</button>
        </div>

        <div id="result-screen" style="text-align: center;">
            <h2 style="color: #2c3e50;">Hasil Skor Anda</h2>
            <h1 id="final-score" style="font-size: 70px; color: #2ecc71; margin: 10px 0;">0</h1>
            
            <h3 id="keterangan-skor" style="margin-top: -10px; margin-bottom: 20px;"></h3>
            
            <p id="stats-text" style="color: #7f8c8d; font-size: 18px; margin-bottom: 30px;"></p>
            
            <div style="display: flex; flex-direction: column; gap: 10px; max-width: 300px; margin: 0 auto;">
                <button class="btn btn-orange" onclick="startReview()">Review Jawaban</button>
                <button class="btn btn-blue" onclick="location.reload()">Ulangi Kuis</button>
            </div>
        </div>
    </div>
</div>

<script>
const quizData = [
{ q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya tahan mengerjakan pekerjaan yang membosankan asalkan bisa selesai", "Saya mengambil keputusan dengan sangat cepat tanpa ragu-ragu"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Memiliki banyak teman dan relasi bisnis adalah kunci kesuksesan saya", "Reputasi sebagai 'orang yang selalu menyelesaikan tugas' sangat penting bagi saya"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat peduli pada kerapian meja dan dokumen kerja saya", "Saya mengorbankan waktu istirahat saya agar target hari ini selesai"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Pekerjaan yang tuntas adalah bukti nyata dari tanggung jawab seorang profesional", "Saya sangat tenang dan jarang menunjukkan emosi saya yang sebenarnya"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya senang menceritakan pengalaman saya kepada rekan kerja", "Saya tidak akan pulang sebelum pekerjaan harian saya tuntas"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya merasa bersalah jika harus melempar tanggung jawab penyelesaian ke orang lain", "Saya suka mengatur ruangan kerja saya agar selalu terlihat sistematis dan terstruktur"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya tidak akan beralih ke tugas B sebelum tugas A benar-benar selesai", "Saya adalah orang yang sangat teliti mengurus angka dan data kecil"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya tidak ragu menindak tegas rekan kerja yang melanggar kedisiplinan", "Fokus utama saya setiap masuk kantor adalah menuntaskan pekerjaan yang kemarin belum beres"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya merasa paling puas ketika melihat hasil akhir dari pekerjaan yang saya rintis", "Saya pandai memengaruhi orang lain untuk menyetujui ide saya"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya bekerja sangat keras, bahkan untuk pekerjaan fisik yang berat sekalipun", "Saya benci meninggalkan tugas yang baru selesai separuh jalan"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya membutuhkan kebebasan penuh dalam menentukan cara saya bekerja", "Saya akan membawa pekerjaan ke rumah jika itu satu-satunya cara untuk menyelesaikannya tepat waktu"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya suka menganalisis teori dan konsep sebelum bertindak", "Saya memiliki daftar to-do list dan tidak tenang sebelum semuanya dicoret"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya bersikeras untuk mengeksekusi ide yang ada sampai menjadi produk yang nyata dan selesai", "Saya memiliki banyak ide brilian yang inovatif"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya menyusun jadwal harian sedemikian rupa agar semua target hari itu rampung", "Saya sering meminta saran dan dukungan emosional dari atasan saya"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya menyukai pekerjaan yang selalu berubah-ubah setiap harinya", "Saya pantang menyerah saat dihadapkan pada kebuntuan dalam proyek"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya mengunci pintu ruangan atau memakai headset agar fokus saya menuntaskan tugas tidak terganggu", "Saya sangat menikmati kompetisi dan bertekad untuk selalu menang"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya mudah meledak jika ada orang yang menghalangi jalan saya", "Saya akan mengulang pekerjaan yang salah sampai hasilnya benar-benar sempurna"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya senang memberikan instruksi kepada orang lain tentang apa yang harus mereka lakukan", "Saya merasa hari ini sia-sia jika tidak ada satu pun tugas yang berhasil saya selesaikan"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Menyelesaikan apa yang sudah saya mulai adalah prinsip utama saya dalam bekerja", "Saya suka berdebat untuk mempertahankan pendapat saya yang benar"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["'Tuntas 100%' adalah satu-satunya standar yang saya terima dari diri saya sendiri", "Saya sangat menghindari melanggar peraturan perusahaan"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Target utama saya adalah mendapatkan promosi ke posisi manajerial", "Target utama saya adalah menyelesaikan pekerjaan yang diberikan kepada saya"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Membiarkan masalah menggantung tanpa penyelesaian membuat saya stres", "Saya lebih suka menjadi anggota tim yang baik daripada menjadi pemimpin"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat menyukai pekerjaan yang mengharuskan saya sering bepergian ke luar kota", "Saya menolak untuk menunda pekerjaan yang bisa saya selesaikan hari ini juga"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya selalu memastikan setiap detail tugas dikerjakan sampai selesai", "Saya berani mengambil alih kendali saat tim sedang kebingungan"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Pekerjaan yang belum selesai adalah beban pikiran terbesar bagi saya", "Berada di tengah-tengah banyak orang memberi saya energi tambahan"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sering menjadi pusat perhatian di pesta atau pertemuan kantor", "Motivasi saya tidak akan turun meskipun harus mengerjakan proyek yang sangat panjang"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya ingin atasan saya selalu tahu dan memperhatikan hasil kerja keras saya", "Keinginan terbesar saya adalah melihat semua kotak pada ceklis pekerjaan saya telah dicentang"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya mengabaikan notifikasi ponsel saya ketika sedang mengejar deadline pekerjaan", "Saya adalah orang yang selalu membuat rencana jangka panjang"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sangat peduli pada detail-detail kecil seperti tanda baca dan format dokumen", "Gangguan kecil tidak akan menghentikan langkah saya menyelesaikan proyek"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya gigih menyelesaikan masalah sesulit apa pun sampai tuntas", "Saya mudah beradaptasi dengan perubahan mendadak di kantor"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya selalu patuh pada perintah atasan meskipun saya tidak setuju", "Kepuasan saya diukur dari berapa banyak tugas yang berhasil saya tuntaskan hari ini"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya adalah pemikir yang abstrak dan kreatif", "Saya tidak akan tidur nyenyak jika masih ada laporan yang belum saya kirimkan"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya bisa fokus bekerja berjam-jam mengabaikan gangguan demi selesainya tugas", "Saya berusaha keras agar orang lain menyukai dan menerima saya di kelompok"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Bagi saya, sebuah komitmen kerja berarti menyelesaikannya dari A sampai Z", "Saya sangat terampil dalam menyusun strategi pemasaran jangka panjang"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya selalu bekerja dengan tempo yang sangat cepat dan gesit", "Saya lebih suka mengerjakan satu tugas sampai tuntas daripada banyak tugas sekaligus"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya berusaha menghindari konflik sebisa mungkin agar suasana damai", "Saya akan mengulik sebuah error pada sistem sampai menemukan jalan keluarnya"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya akan membaca dokumen beratus-ratus halaman tanpa melewatkan satu bab pun sampai selesai", "Saya suka mengkritik kebijakan yang menurut saya tidak masuk akal"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya bersedia lembur agar tidak ada pekerjaan yang tertunda untuk besok", "Saya selalu bersikap sangat sopan dan ramah kepada siapa saja"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya pandai mengatur jadwal orang lain dan mengawasi pekerjaan mereka", "Saya menolak untuk istirahat jika tugas saya tinggal sedikit lagi untuk selesai"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya mudah merasa iba dan bersimpati pada kesulitan rekan kerja saya", "Ketekunan dan kegigihan menyambung pekerjaan dari hari ke hari adalah kekuatan saya"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya rela membatalkan acara pribadi jika ada pekerjaan kantor yang mendesak dan belum selesai", "Saya ingin orang lain mengakui kehebatan dan bakat yang saya miliki"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya lebih suka pekerjaan yang mengharuskan saya banyak bergerak", "Meninggalkan pekerjaan setengah jalan membuat saya merasa sangat tidak nyaman"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya selalu menemukan cara untuk menyelesaikan pekerjaan meskipun fasilitasnya terbatas", "Saya bekerja dengan santai dan tidak suka diburu-buru waktu"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Kualitas hasil akhir dan ketuntasan pekerjaan adalah prioritas nomor satu saya", "Saya cepat merasa bosan jika mengerjakan hal yang sama berulang kali"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya butuh arahan dan aturan yang sangat jelas dari atasan", "Jika ada proyek jangka panjang, saya akan setia menyelesaikannya sampai akhir"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya memaksakan diri untuk terus bekerja walau lelah, demi tercapainya target", "Saya selalu mendelegasikan tugas-tugas kecil kepada bawahan saya"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya adalah orang yang sangat peduli pada perasaan rekan kerja", "Jika berjanji menyerahkan draf hari ini, saya akan penuhi walau harus bergadang"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya memastikan revisi dari klien dikerjakan sampai klien tersebut sepenuhnya puas", "Saya bekerja secepat kilat untuk mendahului rekan-rekan yang lain"], a: 0 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya adalah orang yang ramah tamah dan mudah tersenyum", "Menuntaskan satu pekerjaan besar jauh lebih membanggakan daripada memulai lima pekerjaan baru"], a: 1 },
    { q: "Pilih Salah Satu dari 2 pernyataan berikut !", opt: ["Saya sering menjadi orang terakhir yang pulang dari kantor karena memastikan semua tuntas", "Saya merasa sangat rileks dan santai menghadapi tekanan pekerjaan"], a: 0 }
];

    let currentIdx = 0;
    let userAnswers = new Array(quizData.length).fill(null);
    let isReviewMode = false;

    window.onload = () => {
        renderStatus();
        showQuestion();
    };

    function renderStatus() {
        const container = document.getElementById('status-container');
        container.innerHTML = "";
        quizData.forEach((_, i) => {
            const box = document.createElement('div');
            box.innerText = i + 1;
            
            if (isReviewMode) {
                const isCorrect = userAnswers[i] === quizData[i].a;
                box.className = `num-box ${isCorrect ? 'num-correct' : 'num-wrong'}`;
            } else {
                box.className = `num-box ${userAnswers[i] !== null ? 'num-answered' : 'num-unanswered'}`;
            }
            
            if (i === currentIdx) box.classList.add('num-active');
            box.onclick = () => { currentIdx = i; showQuestion(); };
            container.appendChild(box);
        });
    }

    function showQuestion() {
        const q = quizData[currentIdx];
        document.getElementById('question-number').innerText = `Soal #${currentIdx + 1}`;
        document.getElementById('question-text').innerText = q.q;
        const optContainer = document.getElementById('options-container');
        optContainer.innerHTML = "";

        const labels = ['A', 'B', 'C', 'D', 'E'];
        q.opt.forEach((option, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<strong>${labels[i]}.</strong> ${option}`;
            
            if (isReviewMode) {
                btn.disabled = true;
                // Jika ini adalah jawaban yang BENAR
                if (i === q.a) {
                    btn.classList.add('correct-ans');
                } 
                // Jika user memilih ini dan jawabannya SALAH
                if (userAnswers[currentIdx] === i && i !== q.a) {
                    btn.classList.add('wrong-selected');
                }
            } else {
                if (userAnswers[currentIdx] === i) btn.classList.add('selected');
                btn.onclick = () => selectAnswer(i);
            }
            
            optContainer.appendChild(btn);
        });

        // Navigasi
        document.getElementById('prev-btn').style.visibility = currentIdx === 0 ? 'hidden' : 'visible';
        document.getElementById('next-btn').innerText = currentIdx === quizData.length - 1 ? 'Selesai' : 'Selanjutnya';
        
        // Atur tampilan tombol review
        document.getElementById('back-to-result-btn').style.display = isReviewMode ? 'block' : 'none';
        
        renderStatus();
    }

    function selectAnswer(i) {
        if (isReviewMode) return;
        userAnswers[currentIdx] = i;
        showQuestion();

        // Otomatis pindah ke nomor selanjutnya
        setTimeout(() => {
            if (currentIdx < quizData.length - 1) {
                currentIdx++;
                showQuestion();
            }
        }, 300);
    }

    function nextQuestion() {
        if (currentIdx < quizData.length - 1) {
            currentIdx++;
            showQuestion();
        } else if (!isReviewMode) {
            showResult();
        } else {
            exitReview();
        }
    }

    function prevQuestion() {
        if (currentIdx > 0) {
            currentIdx--;
            showQuestion();
        }
    }

    function showResult() {
        const unanswered = userAnswers.filter(ans => ans === null).length;
        if (unanswered > 0 && !isReviewMode) {
            if (!confirm(`Ada ${unanswered} soal belum dijawab. Yakin ingin mengumpulkan?`)) return;
        }

        let correct = 0;
        userAnswers.forEach((ans, i) => { if (ans === quizData[i].a) correct++; });
        const finalScoreValue = Math.round((correct / quizData.length) * 100);
        
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('finish-quiz-btn').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = finalScoreValue;

        // --- Logika Penentuan Keterangan Skor ---
        const keteranganSkorEl = document.getElementById('keterangan-skor');
        if (finalScoreValue <= 60) {
            keteranganSkorEl.innerText = "Cenderung mudah teralihkan, menunda pekerjaan, atau kurang tuntas";
            keteranganSkorEl.style.color = "#e74c3c"; // Warna merah
        } else {
            keteranganSkorEl.innerText = "Gigih bahkan sangat gigih, perfeksionis, dan memiliki dorongan kuat untuk menuntaskan apa yang sudah dimulai";
            keteranganSkorEl.style.color = "#2ecc71"; // Warna hijau
        }
        // ----------------------------------------

            document.getElementById('stats-text').innerText = `Jawaban Ideal: ${correct} | Jawaban Kurang Ideal: ${quizData.length - correct}`;           
        
        isReviewMode = true; // Mode review aktif setelah skor muncul
        renderStatus();
    }

    function startReview() {
        currentIdx = 0; // Mulai dari nomor 1
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        showQuestion();
    }

    function exitReview() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
    }
</script>

</body>
</html>
